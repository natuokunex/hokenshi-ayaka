<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#fff"/><rect x="45" y="40" width="1110" height="595" rx="28" fill="#f8fbff" stroke="#e65a00" stroke-width="5"/><text x="600" y="110" text-anchor="middle" font-size="42" font-weight="700" fill="#12326b">寄与危険の計算</text><text x="600" y="210" text-anchor="middle" font-size="32">曝露群: 125人 / 25,000人年 = 5.0</text><text x="600" y="280" text-anchor="middle" font-size="32">非曝露群: 30人 / 30,000人年 = 1.0</text><rect x="210" y="360" width="780" height="110" rx="24" fill="#fff4e9" stroke="#e65a00" stroke-width="4"/><text x="600" y="430" text-anchor="middle" font-size="46" font-weight="700" fill="#e65a00">5.0 − 1.0 = 4.0</text><text x="600" y="535" text-anchor="middle" font-size="30">曝露によって余分に生じた罹患率が寄与危険</text></svg>