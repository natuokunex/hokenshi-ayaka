<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#fff"/><rect x="45" y="40" width="1110" height="595" rx="28" fill="#f8fbff" stroke="#1d63c6" stroke-width="5"/><text x="600" y="110" text-anchor="middle" font-size="42" font-weight="700" fill="#12326b">有病率と陽性的中度</text><text x="300" y="210" text-anchor="middle" font-size="34" font-weight="700" fill="#1d63c6">集団A 有病率1%</text><text x="900" y="210" text-anchor="middle" font-size="34" font-weight="700" fill="#1e8f4a">集団B 有病率20%</text><rect x="120" y="260" width="360" height="170" rx="20" fill="#eef5ff"/><rect x="720" y="260" width="360" height="170" rx="20" fill="#effaf2"/><text x="300" y="350" text-anchor="middle" font-size="30">陽性者に真の陽性が少ない</text><text x="900" y="350" text-anchor="middle" font-size="30">陽性者に真の陽性が多い</text><text x="600" y="500" text-anchor="middle" font-size="36" font-weight="700" fill="#c62828">同じ検査なら、陽性的中度はBが高い</text><text x="600" y="560" text-anchor="middle" font-size="28">感度・特異度は検査の性質。有病率が上がると陽性的中度も上がる。</text></svg>