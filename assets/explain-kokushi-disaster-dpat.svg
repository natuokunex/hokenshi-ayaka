<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#fff"/><rect x="45" y="40" width="1110" height="595" rx="28" fill="#f8fbff" stroke="#2e8b57" stroke-width="5"/><text x="600" y="110" text-anchor="middle" font-size="42" font-weight="700" fill="#12326b">発災9日目の避難所支援</text><text x="240" y="220" text-anchor="middle" font-size="30" font-weight="700" fill="#1d63c6">高齢者・内服薬・車中泊</text><text x="600" y="300" text-anchor="middle" font-size="36" font-weight="700" fill="#d95f02">眠れない・不安の声が増加</text><text x="600" y="390" text-anchor="middle" font-size="46" font-weight="700" fill="#1e8f4a">DPAT巡回を提案</text><text x="600" y="500" text-anchor="middle" font-size="30">既存の避難所支援チームと連携し、こころの専門支援へつなぐ</text></svg>