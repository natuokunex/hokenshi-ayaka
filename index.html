F","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":549,"category":"成人・高齢者保健","question":"A 市は人口 25 万人、高齢化率 31.4 % の中核市で、国民健康保険の加入者は 5 万 5 千人である。医療費分析を行ったところ、人工透析患者が年々増加しており、その約 6 割が糖尿病有病者であった。糖尿病重症化予防対策の評価指標は、健康日本 21（第二次）の目標を参考に設定することにした。糖尿病重症化予防対策の評価指標で適切なのはどれか。","choices":["脂質異常症の減少","適正体重を維持している者の増加","特定健康診査・特定保健指導の実施率の向上","メタボリックシンドロームの該当者および予備群の減少","合併症（糖尿病性腎症による年間新規透析導入患者数）の減少"],"answer":4,"explanation":"正答は5「糖尿病性腎症による年間新規透析導入患者数の減少」。糖尿病重症化予防の最終的な目標は、糖尿病性腎症の進行を防ぎ、新規透析導入を減らすことです。特定健診・保健指導実施率やメタボ該当者減少は関連指標ですが、重症化予防のアウトカムとしては新規透析導入患者数が最も直接的です。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":550,"category":"成人・高齢者保健","question":"糖尿病重症化予防対策のために、国保データベース〈KDB〉で情報を抽出した。その結果、HbA1c 6.5 % 以上、尿蛋白（±）以上、eGFR 60 mL/分/1.73 m2 未満の者の約 8 割が男性で、そのうちの 6 割が未治療だった。A 市では、50 歳代の男性の人工透析患者が急増していた。未治療の 40～50 歳代の男性をターゲットに 3 回コースの糖尿病重症化予防教室への参加を働きかけたところ、40 人の参加申し込みがあった。初回の糖尿病重症化予防教室の内容で最も適切なのはどれか。","choices":["糖尿病性腎症の正しい知識","A 市における人工透析の医療費","40～50 歳代に適した運動の紹介","糖尿病の重症化を予防する食生活"],"answer":0,"explanation":"正答は1「糖尿病性腎症の正しい知識」。未治療で腎機能低下リスクがある40〜50歳代男性が対象です。初回は、なぜ受診・生活改善が必要なのかを理解してもらうことが行動変容の土台になります。運動や食事は重要ですが、まず重症化の意味と予防可能性を共有することが優先です。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":551,"category":"成人・高齢者保健","question":"糖尿病重症化予防教室に参加を申し込んだ 40 人のうち 3 回（全課程）参加したのは 28 人であった。保健師は、参加者が教室終了後も受診を中断せず生活習慣改善に継続して取り組めるよう行動変容の支援が必要と考えた。参加者が継続的に糖尿病重症化予防に取り組むための保健師の支援で最も適切なのはどれか。","choices":["家庭でできる運動の紹介","継続的な情報交換会の開催を提案","教室終了 3 か月後のメールでの励まし","糖尿病重症化予防セミナーの動画配信"],"answer":1,"explanation":"正答は2「継続的な情報交換会の開催を提案」。全課程参加者が教室後も受診と生活改善を続けるには、仲間同士の支え合いと継続的な動機づけが有効です。単発の動画やメールより、継続的な交流の場を作る方が自己管理の維持につながります。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":552,"category":"学校保健","question":"A さん（14 歳、女子、中学 3 年生）は、夏休み明けから遅刻が増えている。本日も遅刻して登校し「登校途中にふらついて転んだ」と訴えて、教室に行かず保健室に来室した。養護教諭が A さんに確認する内容で優先度が高いのはどれか。","choices":["月経の周期","遅刻の原因","昨夜の就寝時間","朝食の摂取状況","頭部打撲の有無"],"answer":4,"explanation":"正答は5「頭部打撲の有無」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":553,"category":"学校保健","question":"その後も A さんはたびたび遅刻し、体調不良を訴えて保健室に来室した。養護教諭が、学級担任に教室での様子を確認したところ、A さんが授業中は無気力で寝ていることもあると分かったため、起立性調節障害の疑いがあると推測した。専門医療機関を受診した A さんは、起立性調節障害と診断された。養護教諭が A さんに行う支援で最も適切なのはどれか。","choices":["A さんの不安を受け止める。","学校生活上の工夫を一緒に考える。","体調不良時は欠席するよう勧める。","規則正しい生活をすることを勧める。"],"answer":1,"explanation":"正答は2「学校生活上の工夫を一緒に考える。」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":554,"category":"学校保健","question":"A さんは教職員や友人から遅刻の多さを指摘されることを気にしていたため、養護教諭は A さんへの対応について教職員との話し合いの場を設けた。最初の説明として適切なのはどれか。","choices":["遅刻の際の連絡体制の整備が必要であること","クラスメイトに疾患について説明する必要があること","遅刻・欠席は怠惰ではなく身体的疾患が原因であること","A さんの症状が悪化した際は保健室の利用を認めること"],"answer":2,"explanation":"正答は3「遅刻・欠席は怠惰ではなく身体的疾患が原因であること」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":555,"category":"公衆衛生看護学","question":"金曜日の早朝、A 県で最大震度 7 の地震が発生し、その後も余震が続いている。A 県海岸沿いの B 市では、ライフラインが途絶し、自宅建物が倒壊した住民が多数発生している。B 市の統括保健師が保健センターに到着したとき、職員の 3 割程度が出勤して情報収集を進めていた。統括保健師の初動対応で適切なのはどれか。","choices":["感染症防疫活動の開始","A 県庁に保健師の応援派遣を要請","心的外傷後ストレス障害〈PTSD〉の相談窓口を設置","保健センター業務の再開に向けたロードマップの作成"],"answer":1,"explanation":"正答は2「A 県庁に保健師の応援派遣を要請」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":556,"category":"公衆衛生看護学","question":"発災後 4 日、B 市は 1 次避難所を 10 か所開設し、避難用物資は行き届いている。各避難所の避難者には、授乳期の母子や後期高齢者、精神障害者も含まれている。C 保健師が担当の避難所は中学校の体育館で、夜間の外気温は氷点下になるため昼夜を問わず閉めきり、一部の避難者は毛布をかぶり、館内で土足の靴を履いたまま過ごしていた。C 保健師の避難所での対応で適切なのはどれか。 2 つ選べ。","choices":["個室空間を確保","館内で土足継続を推奨","避難者の持病の薬の確保を支援","避難者に仮設住宅への入居を案内","使用済みオムツの館内トイレでの保管を推奨"],"answers":[0,2],"answer":0,"explanation":"正答は1・3「個室空間を確保／避難者の持病の薬の確保を支援」。この問題は、複数の正しい選択肢を同時に拾う問題です。正答選択肢はいずれも問題文の制度・事例条件に直接対応しています。一方、残りの選択肢は、対象、根拠法令、実施主体、時期、または支援の優先順位がずれているため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":557,"category":"公衆衛生看護学","question":"B 市の職員は発災から 2 週間以上休みなく災害対応に携わっているが、次週には出勤できる職員が増えることから、交代で休日をとれる見込みである。住民からは市の対応に関する感情的な苦情が多く寄せられており、直接対応した職員は陰で泣いていることもあった。それでも職員たちは緊急対応として耐え使命感をもって取り組んでいた。この時期に各部署のリーダーが行う職員の健康管理として適切なのはどれか。","choices":["気持ちを表出する機会をつくる。","健康状態の自己管理体制をとる。","メンタルヘルス講演会を開催する。","引き続き使命感をもって対応するよう励ます。"],"answer":0,"explanation":"正答は1「気持ちを表出する機会をつくる」。災害対応に当たる職員は使命感で働き続ける一方、疲労や住民からの苦情で強い心理的負担を受けます。リーダーは休息だけでなく、気持ちを言語化できる場をつくり、職員のメンタルヘルスを守る必要があります。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":558,"category":"成人・高齢者保健","question":"A 市では、認知症サポーター養成講座を市内の地域包括支援センターに委託している。B さん（78 歳、女性）は、地域包括支援センターの保健師による認知症サポーター養成講座に参加した。B さんの夫（82 歳）は認知症と診断され服薬を継続していた。B さんは夫への対応方法について悩んでおり、講座終了後に夫のことを保健師に相談した。保健師の B さんへの対応で適切なのはどれか。","choices":["地域ケア会議の開催を提案する。","地域にある認知症カフェの参加を促す。","認知症初期集中支援チームを紹介する。","認知症疾患医療センターの受診を勧める。"],"answer":1,"explanation":"正答は2「地域にある認知症カフェの参加を促す。」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":559,"category":"成人・高齢者保健","question":"地域包括支援センターの保健師から B さんの報告を受けた A 市の高齢福祉課の保健師は、認知症の症状は加齢に伴う自然のことで対処のしようがないと捉えている人が多く、認知症への市民の理解と行動が必要だと考えた。A 市の高齢福祉課の保健師が初めに取り組むのはどれか。","choices":["民生委員の会議で認知症ケアパスの説明をする。","認知症サポーター養成講座受講者に対して活動を支援する。","市民の認知症の人に対する理解を促すキャンペーンを実施する。","市民に対して認知症の人が利用できる介護保険サービスを周知する。"],"answer":2,"explanation":"正答は3「市民の認知症の人に対する理解を促すキャンペーンを実施する。」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":560,"category":"成人・高齢者保健","question":"A 市では、認知症サポーター養成講座の評価をすることとした。この事業のアウトカム評価で適切なのはどれか。","choices":["養成したサポーター数の増加","認知症により要介護となる者の減少","養成したサポーターが活動できる場の増加","認知症が疑われてから認知症専門外来を受診するまでの期間の短縮","認知症の人や家族を支援する「チームオレンジ」に入るサポーター数の増加"],"answer":4,"explanation":"正答は5「チームオレンジに入るサポーター数の増加」。認知症サポーター養成講座のアウトカム評価では、講座を受けた人が実際に地域支援活動につながったかを見ることが重要です。単なる養成人数はアウトプットであり、行動や支援体制への変化がアウトカムです。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":561,"category":"母子保健","question":"双生児の A ちゃんと B ちゃんは在胎週数 37 週 0 日で出生した。出生時、1 か月児健康診査時、4 か月児健康診査時の身長と体重計測の結果から、保健師が母親に計測の結果について説明する内容で適切なのはどれか。","choices":["「A ちゃんは 1 日の体重増加量が少ないです」","「B ちゃんは 1 日の体重増加量が少ないです」","「A ちゃんも B ちゃんも体格はやせぎみです」","「A ちゃんも B ちゃんも体重増加量は良好です」"],"answer":3,"explanation":"正答は4「「A ちゃんも B ちゃんも体重増加量は良好です」」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":562,"category":"母子保健","question":"保健師との面談で、母親は「初めての育児で慣れないことが多いですが、少しずつ授乳のペースをつかめてきたので、なんとかやれるような気持ちになってきました。でも、まとまった睡眠がとれず、もうろう状態で育児に追われているような感じがしています」と話した。保健師は家族システム理論を用いて情報収集を行うことにした。収集する情報で正しいのはどれか。","choices":["父親の出勤と帰宅時間","母親の日中の休息の方法","育児にかかる経済的負担感","母親の育児に関する情報源"],"answer":0,"explanation":"正答は1「父親の出勤と帰宅時間」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":563,"category":"精神保健","question":"A さん（42 歳、女性）は 1 人暮らし。5 年前に仕事を解雇された。母親は 2 年前に他界し、そのころから「外出するとストーカーに追われる」「電磁波で狙われて怖い」と訴えるようになり自宅に引きこもっている。A さんはこの数日、隣人を見て「お前がストーカーだな」と怒鳴りトラブルが続いている。A さんとのトラブルに困った隣人が保健所へ相談に来た。保健師が A さん宅を訪問すると、A さんは「買い物や仕事を探しに行きたいが、ストーカーのせいで外出できない」「電磁波で攻撃されるため眠れない」と話した。A さんへの保健師の声かけで適切なのはどれか。","choices":["「一緒に警察に相談に行きませんか」","「一緒にハローワークへ行きましょう」","「隣人が迷惑することはやめてください」","「電磁波の攻撃はないので安心してください」","「眠れないことについて医師に相談してみませんか」"],"answer":4,"explanation":"正答は5「「眠れないことについて医師に相談してみませんか」」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":564,"category":"公衆衛生看護学","question":"社会的公正の理念に基づく保健師活動の説明はどれか。","choices":["住み慣れた地域で自分らしく暮らせるよう支援する。","重症化リスクの高い人の支援を優先させる。","セルフヘルプグループの育成を支援する。","住民への説明責任を果たす。"],"answer":1,"explanation":"正答は2「重症化リスクの高い人の支援を優先させる。」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":565,"category":"母子保健","question":"Aちゃん（1歳8か月、女児）は、1歳6か月児健康診査を受診した。有意語の発語はなく、絵本の指さしはしない。個別相談で言葉の発達について経過を観察したいと保健師が伝えると、母親は「心配はしていません。今、妊娠7か月で疲れたので早く帰りたいです」と言う。Aちゃんのフォローアップをするための保健師の対応で最も適切なのはどれか。","choices":["「病院の発達相談を受けたら教えてください」","「出生届の提出時にAちゃんの様子を教えてください」","「1か月後に電話でAちゃんの様子を聞かせてください」","「3歳児健康診査のときにAちゃんの様子を確認します」"],"answer":2,"explanation":"正答は3「「1か月後に電話でAちゃんの様子を聞かせてください」」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":566,"category":"公衆衛生看護学","question":"地域組織に対する市町村の保健師の支援で最も適切なのはどれか。","choices":["町内会が主催する健康まつりの実行委員を募集する。","医療的ケア児の親の会発足に向けた交流会を開催する。","新任の健康推進員に対して町内の健康講座の運営を委任する。","地域の母親が立ち上げた育児サークルに対して研修計画を立てる。"],"answer":1,"explanation":"正答は2「医療的ケア児の親の会発足に向けた交流会を開催する。」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":567,"category":"精神保健","question":"市町村が行う精神保健福祉業務で正しいのはどれか。","choices":["精神保健指定医の指定","退院後生活環境相談員の選任","福祉サービスの利用に関する相談","医療保護入院時の患者に対する権利の書面による告知"],"answer":2,"explanation":"正答は3「福祉サービスの利用に関する相談」。問題文が問う概念・制度・支援場面に最も合う選択肢です。他の選択肢は、対象や目的、実施主体、優先順位のいずれかが問題文と一致しないため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":568,"category":"精神保健","question":"Aさん（75歳、男性）は妻と2人暮らし。妻が町の保健センターに来所し「夫の飲酒量が増え、泥酔して近隣の人と口論することが多く、私が毎日のように近隣へ謝罪に行っている。私は足が悪いので、重いお酒を買いに行くことがつらいが、お酒がないと夫が怒鳴るため毎日買いに行っている。どうしたらよいか」と保健師に相談した。保健師が妻へ提案する内容で適切なのはどれか。","choices":["隣人との関係が悪化しないよう民生委員へ相談する。","Aさんの飲酒によるトラブルへの対応をしない。","妻の要介護認定の申請をする。","Aさんの適正飲酒量を学ぶ。"],"answer":1,"explanation":"正答は2「Aさんの飲酒によるトラブルへの対応をしない。」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":569,"category":"感染症","question":"感染症の予防及び感染症の患者に対する医療に関する法律〈感染症法〉に定められている事前対応型行政はどれか。","choices":["感染症発生動向調査","市町村による予防計画の策定","1類感染症に対する特定感染症予防指針の策定","都道府県による感染症の予防の総合的な推進を図るための基本的な指針の策定"],"answer":0,"explanation":"正答は1「感染症発生動向調査」。感染症の問題では、分類、届出、調査、公費負担、感染経路、接触者対応を分けて判断します。この選択肢は、問題文で求められている感染症対策の原則に合っています。他の選択肢は、感染症分類や対応時期、感染経路、保健所の役割がずれています。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":570,"category":"感染症","question":"結核の接触者健康診断で潜在性結核感染症と診断され服薬を開始した人への説明で適切なのはどれか。","choices":["「BCG接種が必要です」","「同居家族はN95マスクの着用が必要です」","「服薬治療の支援として服薬確認をします」","「結核の発病を予防するための服薬は公費負担制度の対象となりません」"],"answer":2,"explanation":"正答は3「「服薬治療の支援として服薬確認をします」」。感染症の問題では、分類、届出、調査、公費負担、感染経路、接触者対応を分けて判断します。この選択肢は、問題文で求められている感染症対策の原則に合っています。他の選択肢は、感染症分類や対応時期、感染経路、保健所の役割がずれています。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":571,"category":"学校保健","question":"学校保健の組織活動で適切なのはどれか。","choices":["校長は学校保健計画を立案する。","学校医は学校保健活動を統括する。","保健主事は学校の衛生環境を統括する。","養護教諭は保健室経営計画を立案する。"],"answer":3,"explanation":"正答は4「養護教諭は保健室経営計画を立案する。」。母子・学校保健の事例では、発達段階、安全性、保護者や児童生徒の不安、継続支援へのつなぎを優先して考えます。この選択肢は、対象者の状態を把握しながら必要な支援につなげる対応です。他の選択肢は、確認すべき情報が後回しになる、または支援の優先順位が低くなります。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":572,"category":"学校保健","question":"学校における定期健康診断の検査項目の一部および実施学年を示した表で、幼稚園、小学校、中学校、高等学校、大学のほぼ全員または一部学年で実施されるAの検査項目はどれか。","choices":["聴力","栄養状態","皮膚疾患","歯及び口腔の疾患及び異常"],"answer":0,"explanation":"正答は1「聴力」。母子・学校保健の事例では、発達段階、安全性、保護者や児童生徒の不安、継続支援へのつなぎを優先して考えます。この選択肢は、対象者の状態を把握しながら必要な支援につなげる対応です。他の選択肢は、確認すべき情報が後回しになる、または支援の優先順位が低くなります。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.g ながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":583,"category":"公衆衛生看護学","question":"乳児期の育児支援を検討するために、4か月児の保護者を対象にグループインタビューを実施し、育児に対する思いや取り組みについて聞いた。結果から得られた事項で、プリシード・プロシードモデルの準備要因はどれか。","choices":["夫が半年間の育児休業を取得した。","離乳食の進め方についての情報を求めている。","夫婦間で意識的に「ありがとう」の言葉をかけている。","予防接種を通してかかりつけの小児科医を見つけた。","ソーシャルネットワーキングサービス〈SNS〉で子育ての仲間を見つける。"],"answer":1,"explanation":"正答は2「離乳食の進め方についての情報を求めている」。プリシード・プロシードモデルの準備要因は、行動に先立つ知識・態度・信念・価値観などです。情報を求める状態は、行動の前提となる知識や関心に関する要因です。夫の育休や医療機関、SNS仲間は強化要因・実現要因として整理します。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":584,"category":"母子保健","question":"Aちゃん（1歳2か月、女児）は、両親との3人家族で、祖父母は近隣に居住しているが関係が不良で支援はない。かかりつけの小児科医から「1か月前に予防接種で受診したときからAちゃんの体重が減少している。両親は離乳食の進め方が分からず母乳だけを与えている。両親の養育が心配なため支援をしてほしい」と地区担当保健師へ連絡があった。両親に対する保健師の支援で優先度が高いのはどれか。","choices":["祖父母との同居を促す。","離乳食教室の参加を案内する。","地域の子育てサークルを紹介する。","離乳食の進め方のスケジュールを一緒に計画する。","両親と一緒にAちゃんの1週間ごとの体重増加の目標値を決める。"],"answer":3,"explanation":"正答は4「離乳食の進め方のスケジュールを一緒に計画する。」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":585,"category":"関係法規","question":"市町村長による避難行動要支援者名簿の作成について定めている法律はどれか。","choices":["介護保険法","災害救助法","災害対策基本法","身体障害者福祉法","被災者生活再建支援法"],"answer":2,"explanation":"正答は3「災害対策基本法」。制度・法規の問題では、根拠法令、実施主体、計画の策定主体、対象者を分けて考えます。この選択肢は問題文の制度上の位置づけに合っています。他の選択肢は、別制度の内容、別の実施主体、または根拠法令の取り違えです。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":586,"category":"感染症","question":"レジオネラ症患者発生の届出を受けた保健所が感染の原因調査のために確認する内容で適切なのはどれか。","choices":["発症前の食事内容","カラオケ店の利用歴","循環式浴槽の利用歴","室内でのペットの飼育","レジオネラ症患者との接触歴"],"answer":2,"explanation":"正答は3「循環式浴槽の利用歴」。感染症の問題では、分類、届出、調査、公費負担、感染経路、接触者対応を分けて判断します。この選択肢は、問題文で求められている感染症対策の原則に合っています。他の選択肢は、感染症分類や対応時期、感染経路、保健所の役割がずれています。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":587,"category":"疫学","question":"次の指標で相対危険はどれか。","choices":["死亡率","寄与危険","相対頻度","罹患率比","有病率（有病割合）"],"answer":3,"explanation":"正答は4「罹患率比」。この問題は、指標の定義と使い分けを問うものです。正答選択肢は、問題文で求められている比較・推定・関連の見方に合っています。他の選択肢は、別の統計指標を説明している、前提条件が異なる、または因果関係と関連を取り違えているため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":588,"category":"保健統計学","question":"母集団の平均値を区間推定して算出される95%信頼区間で正しいのはどれか。","choices":["標準誤差を用いて算出される。","信頼区間は95%以外の信頼度では算出できない。","有意水準5%の仮説検定で有意かどうかとは関係がない。","区間推定に用いる標本数が大きいほど信頼区間の幅は広くなる。","1回の調査で母集団の平均値を含む確率が95%となる区間である。"],"answer":0,"explanation":"正答は1「標準誤差を用いて算出される」。信頼区間は、標本平均などの推定値に標準誤差を用いて幅を持たせた区間です。標本数が大きいほど標準誤差は小さくなり、信頼区間は狭くなります。1回の区間が確率95%で母平均を含む、という表現は厳密には不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":589,"category":"保健統計学","question":"1,000人分の定期健康診断データを用いて収縮期血圧と空腹時血糖の関連を評価する際に、両者の関係を示すグラフで適切なのはどれか。","choices":["散布図","箱ひげ図","棒グラフ","折れ線グラフ","ヒストグラム"],"answer":0,"explanation":"正答は1「散布図」。この問題は、指標の定義と使い分けを問うものです。正答選択肢は、問題文で求められている比較・推定・関連の見方に合っています。他の選択肢は、別の統計指標を説明している、前提条件が異なる、または因果関係と関連を取り違えているため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":590,"category":"保健医療福祉行政論","question":"医療費適正化計画の説明で正しいのはどれか。","choices":["市町村が策定する。","根拠法令は医療法である。","計画は3年ごとに策定する。","健康の保持の推進に関する目標を設定している。","医療提供体制の確保に関する基本方針に即して策定する。"],"answer":3,"explanation":"正答は4「健康の保持の推進に関する目標を設定している。」。制度・法規の問題では、根拠法令、実施主体、計画の策定主体、対象者を分けて考えます。この選択肢は問題文の制度上の位置づけに合っています。他の選択肢は、別制度の内容、別の実施主体、または根拠法令の取り違えです。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":591,"category":"感染症","question":"蚊が媒介する感染症はどれか。2つ選べ。","choices":["炭疽","デング熱","日本脳炎","ジフテリア","パラチフス"],"answers":[1,2],"answer":1,"explanation":"正答は2・3「デング熱／日本脳炎」。この問題は、複数の正しい選択肢を同時に拾う問題です。正答選択肢はいずれも問題文の制度・事例条件に直接対応しています。一方、残りの選択肢は、対象、根拠法令、実施主体、時期、または支援の優先順位がずれているため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":592,"category":"公衆衛生看護学","question":"地域ケアシステムの発展過程で形成期はどれか。2つ選べ。","choices":["社会資源の開発","地域のニーズ把握","関係者間の関係づくり","地域のリーダーの発掘","地域のデータの見える化"],"answers":[1,4],"answer":1,"explanation":"正答は2「地域のニーズ把握」と5「地域のデータの見える化」。地域ケアシステムの形成期では、まず地域の課題やニーズを把握し、関係者が共有できるようデータを見える化します。社会資源開発やリーダー発掘は、課題共有後の展開として重要になります。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":593,"category":"産業保健","question":"衛生管理者について正しいのはどれか。2つ選べ。","choices":["月に1回は作業場等を巡視しなければならない。","事業所規模に関係なく選任が義務付けられている。","保健師は資格取得に際し試験科目の一部が免除される。","事業者から衛生に関する措置を行う権限を与えられている。","第一種衛生管理者は医療業の衛生管理者として活動できる。"],"answers":[3,4],"answer":3,"explanation":"正答は4・5「事業者から衛生に関する措置を行う権限を与えられている。／第一種衛生管理者は医療業の衛生管理者として活動できる。」。この問題は、複数の正しい選択肢を同時に拾う問題です。正答選択肢はいずれも問題文の制度・事例条件に直接対応しています。一方、残りの選択肢は、対象、根拠法令、実施主体、時期、または支援の優先順位がずれているため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":594,"category":"保健統計学","question":"直接法による年齢調整死亡率を算出する際に必要な情報はどれか。2つ選べ。","choices":["基準集団の死亡率","観察集団の年齢階級別人口","基準集団の年齢階級別人口","観察集団の年齢階級別死亡率","基準集団の年齢階級別死亡率"],"answers":[2,3],"answer":2,"explanation":"正答は3「基準集団の年齢階級別人口」と4「観察集団の年齢階級別死亡率」。直接法では、観察集団の年齢階級別死亡率を基準集団の年齢構成に当てはめて年齢調整死亡率を算出します。基準集団の死亡率ではなく、基準集団の年齢構成が必要です。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文","explanationImage":"assets/explain-kokushi-age-adjust-direct.png","explanationImageAlt":"直接法による年齢調整死亡率で必要なデータを示す図"},{"id":595,"category":"保健統計学","question":"日本の人口に関する指標のうち、平成27年（2015年）から令和2年（2020年）まで増加傾向なのはどれか。2つ選べ。","choices":["総人口","老年化指数","従属人口指数","年少人口割合","生産年齢人口割合"],"answers":[1,2],"answer":1,"explanation":"正答は2・3「老年化指数／従属人口指数」。この問題は、複数の正しい選択肢を同時に拾う問題です。正答選択肢はいずれも問題文の制度・事例条件に直接対応しています。一方、残りの選択肢は、対象、根拠法令、実施主体、時期、または支援の優先順位がずれているため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":596,"category":"精神保健","question":"精神障害者保健福祉手帳について正しいのはどれか。2つ選べ。","choices":["等級は1～3級に区分される。","医療機関の窓口に交付申請する。","3年ごとに精神障害の状態の認定を受ける。","所持により自立支援医療（精神通院医療）の申請手続きが簡素化される。","障害者の日常生活及び社会生活を総合的に支援するための法律〈障害者総合支援法〉に基づき交付される。"],"answers":[0,3],"answer":0,"explanation":"正答は1・4「等級は1～3級に区分される。／所持により自立支援医療（精神通院医療）の申請手続きが簡素化される。」。この問題は、複数の正しい選択肢を同時に拾う問題です。正答選択肢はいずれも問題文の制度・事例条件に直接対応しています。一方、残りの選択肢は、対象、根拠法令、実施主体、時期、または支援の優先順位がずれているため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":597,"category":"成人・高齢者保健","question":"Aさん（40歳、女性、会社員）。特定健康診査の結果は、身長156cm、体重72kg、BMI29.6、腹囲91cm、血圧140/90mmHg、空腹時血糖95mg/dL、HDLコレステロール38mg/dL、中性脂肪160mg/dL、喫煙歴はない。この結果から、特定保健指導の対象となり、保健師が初回面接をすることになった。初回面接で最初にAさんにかける言葉で適切なのはどれか。","choices":["「あなたには生活習慣の改善が必要です」","「どんな目標を設定して来られましたか」","「これまでの生活を振り返ってみましょう」","「この結果をどのように受け止めていますか」"],"answer":3,"explanation":"正答は4「この結果をどのように受け止めていますか」。特定保健指導の初回面接では、対象者自身の受け止めや準備性を確認し、自己決定を支える関わりが重要です。最初から生活改善を指示するより、本人の認識を聞くことで行動変容につなげます。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":598,"category":"成人・高齢者保健","question":"初回面接で、Aさんから「1か月に1kgの体重減少を目標に、食事と運動の改善に取り組んでみたい」という発言が聞かれ、間食を減らすこと、毎日8,000歩を歩くことを目標とした。初回面接から2週後に電話連絡したところ、Aさんは「間食はしていないし、ご飯は小さなお茶碗に変えて1杯だけに減らしている。なかなか毎日8,000歩は歩けない。体重はあまり変わらない。こんな自分はだめだ」と話した。Aさんが始めた行動の継続を支援する保健師の対応で最も適切なのはどれか。","choices":["「体重は増えていませんね」","「目標値を6,000歩に下げてみましょうか」","「運動もすることで病気の予防やストレスの解消にも有効です」","「ご自身で考えてご飯の量を減らすことができていてすばらしいです」"],"answer":3,"explanation":"正答は4「「ご自身で考えてご飯の量を減らすことができていてすばらしいです」」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":599,"category":"成人・高齢者保健","question":"6か月後の最終評価面接では、体重66kg、腹囲85cmであり、Aさんは「何度もやめたくなったが、なんとか続けられた」と話した。Aさんは、翌年の特定健康診査を受診し、身長156cm、体重67kg、BMI27.9、腹囲86cm、血圧135/85mmHg、空腹時血糖90mg/dL、HDLコレステロール45mg/dL、中性脂肪142mg/dLという結果であった。このときのAさんに行う保健指導はどれか。","choices":["情報提供","動機づけ支援","積極的支援","医療機関への受診勧奨"],"answer":1,"explanation":"正答は2「動機づけ支援」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":600,"category":"母子保健","question":"A市の保健師は、4か月児健康診査未受診者の家庭訪問を行った。母親のBさん（40歳）は「近隣に2人で住む私の両親の介護があり、子どもの健診に行けなかった。父は要介護4、母は要支援2で、育児と介護で忙しい」と話した。保健師は、Bさんと同様の人が他にもいるかもしれないと考え、育児と介護の両方をしている人の実態把握のために、アンケート調査を行うこととした。実態把握のための調査対象者で優先度が高いのはどれか。","choices":["乳幼児健康診査の対象児の保護者","家族介護者の会の参加者","育児サークルの参加者","民生・児童委員"],"answer":0,"explanation":"正答は1「乳幼児健康診査の対象児の保護者」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":601,"category":"公衆衛生看護学","question":"アンケート調査の結果、育児と介護の両方をしている人は、同じ立場の人とつながる機会がないため孤立感を感じており、同じ立場の人と交流し育児と介護の両方を行うつらさや両立の工夫点を共有する場を望んでいること、外出しづらい人が多いことが分かった。保健師は育児と介護の両方をしている人の集いの場づくりを行うことにした。この集いの場づくりで最も適切なのはどれか。","choices":["休日の開催","駐車場の確保","オンラインでの開催","保育と介護のスタッフの確保"],"answer":2,"explanation":"正答は3「オンラインでの開催」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":602,"category":"公衆衛生看護学","question":"発足した育児と介護の両方をしている人の集いの場は、月に1回の開催で、毎回、約20人が参加している。発足から5年が経ち、メンバーは、保健師が主催するグループから自分達で運営するグループへ発展させるかどうかの検討を始めた。このグループの発展段階における保健師の役割で適切なのはどれか。","choices":["環境整備","自己決定の支援","目的達成への支援","信頼関係構築への支援"],"answer":1,"explanation":"正答は2「自己決定の支援」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":603,"category":"成人・高齢者保健","question":"Aさん（60歳、男性、自営業）は1人暮らし。つまずいたり転んだりすることが多くなり、精密検査のため入院したところ、筋萎縮性側索硬化症〈ALS〉と確定診断された。近隣に住む弟（57歳）と一緒に運送業を営んでいたが、運転ができなくなり仕事を辞めた。弟が保健所に医療費助成申請の手続きのために来所し、保健師が面接したところ「兄は自宅で度々転んでいます。この先どのような生活になるのか不安です」と話した。保健師は今後の支援体制を検討していくために、入院している医療機関でAさんと面接し「最期まで住み慣れた自宅で誰にも気を遣わず生活したい」という意向を確認し、主治医とも病状について共有した。Aさんが退院した日に、保健師は自宅を訪問した。保健師はAさんの支援体制を検討するために国際生活機能分類〈ICF〉を用いてアセスメントを行うこととした。訪問時に追加してアセスメントする項目で優先度が高いのはどれか。","choices":["活動","参加","環境因子","個人因子","心身機能・身体構造"],"answer":2,"explanation":"正答は3「環境因子」。ICFでは、心身機能・身体構造、活動、参加、環境因子、個人因子を総合的に見る。退院直後の在宅療養では、住まいの段差、福祉用具、支援者、サービスなど環境因子の把握が支援体制づくりに直結します。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":604,"category":"成人・高齢者保健","question":"退院半年後、病状が進行したため要介護認定申請をしたところ要介護2であった。Aさんが弟以外から介護を受けることを拒否したため、介護保険サービスは福祉用具の利用のみとなった。弟は運送業を続けながら、Aさんの入浴介助や排泄後の始末などを行っている。保健師が弟へ状況確認のために電話をすると「兄には心配をかけたくないので言えないのですが、毎日、介護と仕事で身体がつらくなってきました」と話した。保健師の弟への対応で最も適切なのはどれか。","choices":["介護が負担に感じていると介護支援専門員へ伝えることを助言する。","筋萎縮性側索硬化症〈ALS〉患者家族会の情報提供をする。","利用できる介護保険サービスの情報提供をする。","入浴介助の手技を確認する。"],"answer":0,"explanation":"正答は1「介護が負担に感じていると介護支援専門員へ伝えることを助言する。」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":605,"category":"成人・高齢者保健","question":"Aさんが誤嚥性肺炎で入院したことを機に今後の治療方針について検討を行った。Aさんは人工呼吸器の装着と胃瘻造設をしないという意思表示をした。数日後、Aさんの弟が保健所に来所した。「兄は人工呼吸器や胃瘻についてまだ迷っているようです。兄には長生きをしてほしいので病状が進行したら人工呼吸器をつけてほしい」と保健師に相談した。このときに保健師が弟へ伝える内容で適切なのはどれか。","choices":["「皆で継続して話し合っていきましょう」","「Aさんの死去後の生活を考えてみませんか」","「Aさんが初めに表明した意思を尊重しましょう」","「人工呼吸器を装着するとずっと付き添いが必要です」"],"answer":0,"explanation":"正答は1「「皆で継続して話し合っていきましょう」」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":606,"category":"産業保健","question":"A社は、従業員1,200名のIT企業である。社内に数か所ある喫煙室について「喫煙室付近が、たばこ臭くとても不快である」と複数の社員から保健師に訴えがあった。保健師が喫煙室を巡視すると喫煙室周辺にたばこ臭が認められた。受動喫煙を防止するために保健師が最初に行う対応で優先度が高いのはどれか。","choices":["各部署の喫煙率について調査する。","喫煙室の利用上の注意点を喫煙室内に貼付する。","喫煙室周辺のたばこ臭について衛生委員会へ報告する。","社員に対し受動喫煙の現状についてのアンケート調査を実施する。"],"answer":2,"explanation":"正答は3「喫煙室周辺のたばこ臭について衛生委員会へ報告する。」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":607,"category":"産業保健","question":"その後A社では、健康増進法および労働安全衛生法に基づく職場における受動喫煙防止のためのガイドラインを踏まえ建物内禁煙を決め、さらに受動喫煙対策について見直しを検討することとなった。本ガイドラインに基づく取り組みで適切なのはどれか。","choices":["産業医が受動喫煙防止対策推進計画を策定する。","A社を敷地内禁煙にするための助成金を申請する。","労働組合を中心に受動喫煙対策について検討する。","労働者の募集の際は就業場所の受動喫煙防止対策について明示する。"],"answer":3,"explanation":"正答は4「労働者の募集の際は就業場所の受動喫煙防止対策について明示する。」。問題文が問う概念・制度・支援場面に最も合う選択肢です。他の選択肢は、対象や目的、実施主体、優先順位のいずれかが問題文と一致しないため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":608,"category":"産業保健","question":"A社では、社内の受動喫煙対策の強化に加え喫煙者に対し禁煙指導を行うことを決めた。これを受け保健師は健康診断の問診票からA社の喫煙者の禁煙に対する意向を分析した。その結果、変化ステージ理論の無関心期にある者が多いことが分かった。無関心期への対応で適切なのはどれか。","choices":["禁煙外来を紹介する。","禁煙の重要性について説明する。","職場の上司から禁煙を促してもらう。","禁煙までのスケジュールを立ててもらう。"],"answer":1,"explanation":"正答は2「禁煙の重要性について説明する」。変化ステージ理論の無関心期では、本人は禁煙を考えていないため、いきなり禁煙外来や具体的なスケジュールに進めても受け入れにくいです。まず喫煙の影響や禁煙の意義を伝え、関心を高める支援を行います。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文","explanationImage":"assets/explain-kokushi-smoking-stage.png","explanationImageAlt":"禁煙支援における行動変容ステージと無関心期への対応を示す図"},{"id":609,"category":"感染症","question":"Aさん（42歳、男性）は2週間の海外旅行から9月1日に帰国した。滞在地では麻しんが流行していたが、帰国時のAさんには特に症状がなく、翌日から5日間、会社へ出勤した。帰国6日後に発熱し、2日後に全身の発疹が出現したため再受診し、麻しんが疑われC病院に紹介され入院となった。C病院の医師は麻しんの発生届を管轄保健所へ提出した。このときの保健所の対応で適切なのはどれか。","choices":["麻しん患者の発生を直ちに公表する。","Aさんに麻しんウイルスのPCR検査を行う。","AさんのC病院への入院について入院勧告手続きを行う。","Aさんの滞在国に同時期に滞在した無症状の帰国者に外出自粛を指示する。","Aさんの同居者には過去の罹患歴・接種歴に関わらず麻しん含有ワクチンの緊急接種を勧奨する。"],"answer":1,"explanation":"正答は2「Aさんに麻しんウイルスのPCR検査を行う」。麻しん疑いでは確定診断と感染拡大防止のため、検査による確認が重要です。麻しんは五類感染症で、結核のような入院勧告の手続きとは異なります。接触者対応は罹患歴・接種歴を踏まえて行います。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":610,"category":"感染症","question":"保健所による積極的疫学調査が行われた。Aさんの帰国後の接触者として、公共交通機関の利用者、会社の同僚、取引先の担当者、医療機関での接触者が把握された。麻しん発症リスクが高い濃厚接触者の範囲はどれか。","choices":["公共交通機関の利用者、会社の同僚、取引先の担当者、医療機関での接触者","会社の同僚、取引先の担当者、医療機関での接触者","会社の同僚、医療機関での接触者","医療機関での接触者"],"answer":2,"explanation":"正答は3「会社の同僚、医療機関での接触者」。麻しんは空気感染するため感染力が強いですが、濃厚接触者は同じ空間で一定時間接触した人を中心に考えます。公共交通機関利用者すべてや取引先全員まで広げるより、職場や医療機関での接触者を優先して把握します。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":611,"category":"感染症","question":"Aさんの同居家族を含む接触者中3名が二次感染により麻しんを発症したが、3名とも麻しんワクチンの未接種者であった。保健師は未就学児の保護者を対象とする講演会等で予防接種の重要性を説明することにした。ある会場で参加者の母親から「かかりつけの医師から勧められているが、自分は子どもに予防接種を受けさせるつもりはない」と申し出があった。この母親への保健師の対応で適切なのはどれか。","choices":["「受けさせたくない方に余計なお話をお聞かせしてしまい失礼しました」と伝える。","「予防接種についてもう一度説明させていただいてもよいですか」と尋ねる。","「予防接種を受けさせたくない理由を教えていただけますか」と尋ねる。","「法律で定められているので接種の義務があります」と伝える。"],"answer":2,"explanation":"正答は3「予防接種を受けさせたくない理由を教えていただけますか」。予防接種に抵抗がある保護者には、まず理由や不安を確認し、信頼関係を保ちながら情報提供につなげることが重要です。いきなり説得したり義務を強調したりすると、防衛的になりやすく支援につながりません。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":612,"category":"成人・高齢者保健","question":"A市は臨海部に工業地帯を有し、市民の多くが大小の工場に勤務している。県内他市に比べて、生活習慣病のリスクを高める飲酒量の者、喫煙者、肥満者の割合が高いこと、魚類摂取量や塩分摂取量が多いこと、定期健康診断の受診率が低いことが把握されている。また、大腸癌の罹患率が高い一方で、検診受診率が低いことが課題となっている。A市住民の大腸癌のリスク因子で可能性が高いのはどれか。2つ選べ。","choices":["振動","肥満","多量飲酒","塩分の過剰摂取","魚類摂取の過多"],"answers":[1,2],"answer":1,"explanation":"正答は2・3「肥満／多量飲酒」。この問題は、複数の正しい選択肢を同時に拾う問題です。正答選択肢はいずれも問題文の制度・事例条件に直接対応しています。一方、残りの選択肢は、対象、根拠法令、実施主体、時期、または支援の優先順位がずれているため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":613,"category":"成人・高齢者保健","question":"同じ年に市区町村が実施した大腸がん検診受診者における検診と精密検査の受診状況について、全国とA市の実際の値を比較すると、A市は検診受診率9.8%、要精密検査者の割合10.0%、精密検査受診率60.0%であった。A市の大腸がん予防対策で優先度が高いのはどれか。","choices":["検診の敏感度を上げる。","禁煙指導教室を開催する。","40歳代に検診の受診を勧奨する。","要精密検査者に精密検査の受診を勧奨する。"],"answer":3,"explanation":"正答は4「要精密検査者に精密検査の受診を勧奨する。」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":614,"category":"母子保健","question":"Aちゃん（2か月、女児）は18トリソミーと診断を受け大学病院に入院している。体調が安定してきたため、B町の自宅で療養を行う予定である。Aちゃんの円滑な在宅への移行を目的に、大学病院において関係職種による退院前カンファレンスが開催されることとなった。大学病院からは主治医と看護師、病院のソーシャルワーカー、病院外からは訪問看護師、保健所保健師、B町保健師が出席する予定である。その他の参加者で優先度が高いのはどれか。","choices":["相談支援専門員","保育所の保育士","民生・児童委員","大学病院の公認心理師"],"answer":0,"explanation":"正答は1「相談支援専門員」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":615,"category":"母子保健","question":"退院後、Aちゃんは訪問看護を週3回利用し、大学病院には月1回、自家用車で1時間半をかけて通院している。退院後6か月、B町で感染症が流行し訪問看護ステーションの勤務可能な看護師が少なくなり、Aちゃんの訪問看護は一時的に回数が減少した。B町周辺には小児を受け入れる訪問看護ステーションがない。B町やB町以外の地域から「障害児が安心して在宅療養ができる支援体制を構築してほしい」という要望が、C県に寄せられ地域課題となっている。県の医療政策および障害福祉を担当する関係機関が医療計画の見直しに向けて検討することになった。検討する内容で優先度が高いのはどれか。","choices":["育児ボランティアの養成","保育所における看護師の充実","小児救命救急センターの新たな開設","小児の訪問看護を行う看護師の育成"],"answer":3,"explanation":"正答は4「小児の訪問看護を行う看護師の育成」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午後問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午後問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03b_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"}],"domainMap":{"公衆衛生看護学":"専門","疫学":"専門","保健統計学":"専門","保健医療福祉行政論":"専門","関係法規":"専門","母子保健":"専門","成人・高齢者保健":"専門","精神保健":"専門","産業保健":"専門","学校保健":"専門","感染症":"専門","栄養・健康教育":"専門","教養_憲法":"教養","教養_地方自治":"教養","教養_時事広島":"教養","時事_保健医療政策":"時事","教養_社会科学":"教養","教養_人文科学":"教養","教養_自然科学":"教養","教養_数的推理":"教養","教養_判断推理":"教養","教養_資料解釈":"教養","教養_文章理解":"教養"},"domains":["専門","教養","時事"]};</script>
<script>
/* ============================================================
   保健師 過去問道場 v2 — 出題設定/テストモード対応
============================================================ */

const STORAGE_KEY = "hkp_dojo_v1";
let DB = null;
let QUESTIONS = [];
let CATEGORIES = [];
let DOMAIN_MAP = {};
let DOMAINS = [];
let session = null;

function loadDB(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return {profiles:{},currentUser:null};
    return JSON.parse(raw);
  }catch(e){return {profiles:{},currentUser:null}}
}
function saveDB(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(DB)); }
function currentProfile(){ return DB.currentUser ? DB.profiles[DB.currentUser] : null; }
function hash(s){ let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0} return String(h); }
function exportHistory(){
  const payload = {
    app: "hokenshi-kakomon-dojo",
    exportedAt: new Date().toISOString(),
    storageKey: STORAGE_KEY,
    questionVersion: window.__INLINE_QUESTIONS__?.version || "",
    db: DB
  };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const day = new Date().toISOString().slice(0,10).replaceAll("-","");
  a.href = url;
  a.download = `hokenshi-history-${day}.json`;

function importHistoryFile(file){
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const payload = JSON.parse(reader.result);
      const next = payload.db || payload;
      if(!next || typeof next !== "object" || !next.profiles){
        alert("読み込める履歴ファイルではありません。");
        return;

function getHistory(){
  const p = currentProfile();
  if(!p) return {};
  if(!p.history) p.history = {};
  return p.history;
}
function recordAnswer(qid, ok){
  const p = currentProfile();
  if(!p) return;
  if(!p.history) p.history = {};
  const h = p.history[qid] || {attempts:[],correct:0,wrong:0};
  h.attempts.push({at:Date.now(),ok});
  if(ok) h.correct++; else h.wrong++;
  p.history[qid] = h;
  saveDB();
}

function statsOverall(){
  const h = getHistory();
  let total=0, ok=0, answered=0;
  for(const id in h){ const r=h[id]; total+=r.correct+r.wrong; ok+=r.correct; answered++; }
  return {total, ok, answered, accuracy: total ? Math.round(ok/total*100) : 0, coverage: Math.round(answered/QUESTIONS.length*100)};
}
function statsByCategory(){
  const h = getHistory();
  const map = {};
  CATEGORIES.forEach(c=>map[c]={ok:0,total:0,questions:0,answered:0});
  QUESTIONS.forEach(q=>{ if(map[q.category]) map[q.category].questions++ });
  for(const id in h){
    const q = QUESTIONS.find(x=>String(x.id)===String(id));
    if(!q || !map[q.category]) continue;
    const r = h[id];
    map[q.category].total += r.correct+r.wrong;
    map[q.category].ok += r.correct;
    map[q.category].answered++;
  }
  return map;
}
function domainOf(cat){ return DOMAIN_MAP[cat] || "その他"; }
function categoriesByDomain(domain){ return CATEGORIES.filter(c=>domainOf(c)===domain); }

function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])) }

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
  return a;
}
function fmtTime(ms){
  const s = Math.floor(ms/1000); const m = Math.floor(s/60); const ss = s%60;
  return `${m}:${String(ss).padStart(2,"0")}`;
}
function pct(ok,total){ return total ? Math.round(ok/total*100) : 0; }
function answerIndices(q){ return Array.isArray(q.answers) ? q.answers : [q.answer]; }
function isMultiAnswer(q){ return Array.isArray(q.answers) && q.answers.length > 1; }
function sameAnswerSet(a,b){
  const aa = (Array.isArray(a) ? a : [a]).map(Number).sort((x,y)=>x-y);
  const bb = (Array.isArray(b) ? b : [b]).map(Number).sort((x,y)=>x-y);
  return aa.length===bb.length && aa.every((v,i)=>v===bb[i]);
}
function answerText(q, ans){
  const arr = Array.isArray(ans) ? ans : [ans];
  return arr.map(i=>`${i+1}. ${esc(q.choices[i])}`).join(" / ");
}
function clearChoiceFocus(){

function domTagClass(d){ return d==="教養"?"dom2":d==="時事"?"dom3":"dom"; }
const PAST_TYPES = ["過去問系","公式過去問参照","公式過去問転載","保健師国試参照","保健師国試原文"];
function isPastQuestion(q){ return PAST_TYPES.includes(q.type || ""); }
function typeCount(types, domains){
  return QUESTIONS.filter(q=>
    (!types || types.includes(q.type || "")) &&
    (!domains || domains.includes(domainOf(q.category)))
  ).length;
}

function buildPool(cfg){
  const h = getHistory();
  let pool = QUESTIONS.slice();
  if(cfg.onlyIds && cfg.onlyIds.length) pool = pool.filter(q=>cfg.onlyIds.includes(q.id));
  if(cfg.domains && cfg.domains.length) pool = pool.filter(q=>cfg.domains.includes(domainOf(q.category)));
  if(cfg.categories && cfg.categories.length) pool = pool.filter(q=>cfg.categories.includes(q.category));
  if(cfg.types && cfg.types.length) pool = pool.filter(q=>cfg.types.includes(q.type || ""));
  if(cfg.pick==="unanswered") pool = pool.filter(q=>!h[q.id]);
  else if(cfg.pick==="wrong") pool = pool.filter(q=>{
    const r = h[q.id]; if(!r) return false;
    return r.attempts.length && !r.attempts[r.attempts.length-1].ok;
  });
  else if(cfg.pick==="weak"){
    pool = pool.map(q=>{
      const r = h[q.id]; const total = r ? r.correct+r.wrong : 0;
      const acc = total ? r.correct/total : 0.4;
      return {q,score:acc,total};
    }).sort((a,b)=>(a.score-b.score)||(a.total-b.total)).map(x=>x.q);
  }
  return pool;
}
function poolSizeFor(cfg){ return buildPool(cfg).length; }

/* ===== Quiz ===== */
function startQuiz(cfg){
  const pool = buildPool(cfg);
  if(pool.length===0){ alert("対象の問題がありません。条件を見直してください。"); return; }
  let queue = cfg.pick==="weak" ? pool.slice() : shuffle(pool);
  const n = cfg.count==="all" ? queue.length : Math.min(cfg.count, queue.length);
  queue = queue.slice(0, n);
  session = {
    cfg, queue, idx:0, answered:false, selected:null,
    correctCount:0, wrongCount:0, sessionLen:queue.length,
    startedAt: Date.now(), answers: [],
  };
  renderQuestion();
}

function renderQuestion(){
  $app.dataset.view="quiz";
  const q = session.queue[session.idx];
  const d = domainOf(q.category);
  const h = getHistory()[q.id];
  const accStr = h ? `${h.correct}/${h.correct+h.wrong}` : "未回答";
  const progress = ((session.idx) / session.sessionLen) * 100;
  const isTest = session.cfg.mode==="test";
  const rateHTML = renderRateStripHTML();

  render(`
    <div class="row-between" style="margin-bottom:8px">
      <small class="muted">${session.idx+1} / ${session.sessionLen}　・　${isTest?"テストモード":"練習モード"}</small>
      <small class="muted timer" id="timer">${fmtTime(Date.now()-session.startedAt)}</small>
    </div>
    <div class="bar"><i style="width:${progress}%"></i></div>
    <div id="rateStrip">${rateHTML}</div>

    <div class="card">
      <div class="q-meta">
        <span><span class="q-tag ${domTagClass(d)}">${esc(d)}</span><span class="q-tag">${esc(q.category)}</span>${typeTagHTML(q)}</span>
        <span>過去回答: ${accStr}</span>
      </div>
      <div class="q-text">${esc(q.question)}</div>
      <div id="choices">
        ${q.choices.map((c,i)=>`<button class="choice" data-i="${i}"><span class="num">${i+1}</span><span>${esc(c)}</span></button>`).join("")}
      </div>
      ${isMultiAnswer(q) ? `<button class="btn outline sm" id="submitMultiBtn" disabled>回答する</button>` : ""}
      <div id="feedback"></div>
    </div>

    <div class="actions">
      <button class="btn outline" id="quitBtn">中断${isTest?"して採点へ":""}</button>
      ${isTest ? `<button class="btn" id="nextBtn" disabled>次へ →</button>` : `<button class="btn hidden" id="nextBtn">次の問題 →</button>`}
    </div>
  `);
  setNav();

  $app.querySelectorAll(".choice").forEach(b=>b.onclick=()=>onChoice(parseInt(b.dataset.i,10)));
  const submitMulti = document.getElementById("submitMultiBtn");
  if(submitMulti) submitMulti.onclick=()=>submitMultiAnswer();
  document.getElementById("quitBtn").onclick=()=>{
    if(isTest){
      if(confirm("ここまでの回答で採点します。よろしいですか？")){ finishQuiz(); }
    }else{
      if(confirm("中断してホームに戻りますか？")){ viewHome(); }
    }
  };
  document.getElementById("nextBtn").onclick=goNext;

  if(session.timerId) clearInterval(session.timerId);
  session.timerId = setInterval(()=>{
    const t = document.getElementById("timer");
    if(t) t.textContent = fmtTime(Date.now()-session.startedAt);
  }, 1000);

  document.onkeydown = (e)=>{
    if($app.dataset.view!=="quiz") return;
    if(["1","2","3","4"].includes(e.key)){
      const i = parseInt(e.key,10)-1;
      if(i < session.queue[session.idx].choices.length) onChoice(i);
    }else if(e.key==="Enter"){
      const nb = document.getElementById("nextBtn");
      if(nb && !nb.disabled && !nb.classList.contains("hidden")) goNext();
    }
  };
}

function renderRateStripHTML(){
  const sessionTotal = session.correctCount + session.wrongCount;
  const sessionRate = pct(session.correctCount, sessionTotal);
  const overall = statsOverall();
  const remaining = Math.max(session.sessionLen - sessionTotal, 0);
  return `
    <div class="rate-strip">
      <div class="rate-box"><div class="label">今回の正答率</div><div class="num">${sessionRate}<span style="font-size:14px">%</span></div><div class="sub">${session.correctCount} / ${sessionTotal || 0} 正解</div></div>
      <div class="rate-box"><div class="label">累計正答率</div><div class="num">${overall.accuracy}<span style="font-size:14px">%</span></div><div class="sub">${overall.ok} / ${overall.total} 正解</div></div>
      <div class="rate-box"><div class="label">残り</div><div class="num">${remaining}<span style="font-size:14px">問</span></div><div class="sub">全${session.sessionLen}問中</div></div>
    </div>`;
}
function updateRateStrip(){
  const el = document.getElementById("rateStrip");
  if(el) el.innerHTML = renderRateStripHTML();
}

function onChoice(i){
  const q = session.queue[session.idx];
  const isTest = session.cfg.mode==="test";
  const multi = isMultiAnswer(q);
  clearChoiceFocus();

  if(multi){
    const current = Array.isArray(session.selected) ? session.selected.slice() : [];
    const next = current.includes(i) ? current.filter(x=>x!==i) : current.concat(i);
    session.selected = next;
    $app.querySelectorAll(".choice").forEach((b,bi)=>b.classList.toggle("selected", next.includes(bi)));
    const submit = document.getElementById("submitMultiBtn");
    if(submit) submit.disabled = next.length===0;
    const nextBtn = document.getElementById("nextBtn");
    if(isTest && nextBtn) nextBtn.disabled = next.length===0;
    return;
  }

  if(isTest){
    session.selected = i;
    $app.querySelectorAll(".choice").forEach((b,bi)=>b.classList.toggle("selected", bi===i));
    document.getElementById("nextBtn").disabled = false;
    return;
  }

  if(session.answered) return;
  session.answered = true;
  const ok = i===q.answer;
  if(ok) session.correctCount++; else session.wrongCount++;
  recordAnswer(q.id, ok);
  session.answers.push({qid:q.id, sel:i, ok});
  updateRateStrip();

  $app.querySelectorAll(".choice").forEach((b,bi)=>{
    b.disabled = true;
    b.classList.add("disabled");
    if(bi===q.answer) b.classList.add("correct");
    else if(bi===i) b.classList.add("wrong");
  });

  document.getElementById("feedback").innerHTML = renderFeedbackHTML(q, ok);
  document.getElementById("nextBtn").classList.remove("hidden");
}

function submitMultiAnswer(){
  clearChoiceFocus();
  if(session.answered) return;
  const q = session.queue[session.idx];
  const selected = Array.isArray(session.selected) ? session.selected.slice() : [];
  if(selected.length===0){ alert("選択肢を選んでください"); return; }
  session.answered = true;
  const correct = answerIndices(q);
  const ok = sameAnswerSet(selected, correct);
  if(ok) session.correctCount++; else session.wrongCount++;
  recordAnswer(q.id, ok);
  session.answers.push({qid:q.id, sel:selected, ok});
  updateRateStrip();

  $app.querySelectorAll(".choice").forEach((b,bi)=>{
    b.disabled = true;
    b.classList.add("disabled");
    if(correct.includes(bi)) b.classList.add("correct");
    else if(selected.includes(bi)) b.classList.add("wrong");
  });
  const submit = document.getElementById("submitMultiBtn");
  if(submit) submit.classList.add("hidden");
  document.getElementById("feedback").innerHTML = renderFeedbackHTML(q, ok);
  document.getElementById("nextBtn").classList.remove("hidden");
}

function typeTagHTML(q){
  const t = q.type || "";
  if(t==="過去問系") return `<span class="type-tag kakomon">過去問系</span>`;
  if(t==="時事予想") return `<span class="type-tag jiji">時事予想</span>`;
  if(t==="公式過去問参照") return `<span class="type-tag official">公式過去問参照</span>`;
  if(t==="公式過去問転載") return `<span class="type-tag official">公式過去問転載</span>`;
  if(t==="保健師国試参照") return `<span class="type-tag official">保健師国試参照</span>`;
  if(t==="保健師国試原文") return `<span class="type-tag official">保健師国試原文</span>`;
  return `<span class="type-tag yoso">予想問題</span>`;
}
function renderFeedbackHTML(q, ok){
  const links = (q.links||[]).map(l=>`<a href="${esc(l.url)}" target="_blank" rel="noopener">📖 ${esc(l.title)}</a>`).join("");
  const image = q.explanationImage ? `<img class="explain-image" src="${esc(q.explanationImage)}" alt="${esc(q.explanationImageAlt || q.question + 'の解説図')}">` : "";
  return `
    <div class="feedback ${ok?"ok":"ng"}">
      <div class="head">${ok?"✓ 正解":"✗ 不正解"}</div>
      <div style="line-height:1.7">${esc(q.explanation)}</div>
      ${image}
      ${q.source ? `<div class="src">📄 出典: ${esc(q.source)}</div>` : ""}
      ${links ? `<div class="ref-links" style="margin-top:10px">${links}</div>` : ""}
    </div>`;
}

function goNext(){
  const isTest = session.cfg.mode==="test";
  if(isTest){
    const q = session.queue[session.idx];
    const sel = session.selected;
    if(sel===null || sel===undefined || (Array.isArray(sel) && sel.length===0)){ alert("選択肢を選んでください"); return; }
    const ok = sameAnswerSet(sel, answerIndices(q));
    if(ok) session.correctCount++; else session.wrongCount++;
    recordAnswer(q.id, ok);
    session.answers.push({qid:q.id, sel, ok});
    session.selected = null;
  }
  session.idx++;
  if(session.idx >= session.queue.length){ return finishQuiz(); }
  session.answered = false;
  renderQuestion();
}

function finishQuiz(){
  if(session.timerId) clearInterval(session.timerId);
  document.onkeydown = null;
  if(session.cfg.mode==="test") viewTestResult();
  else viewQuizResult();
}

}

/* ===== Stats / History ===== */
function viewHistory(){
  $app.dataset.view="history";
  const h = getHistory();
  const rows = QUESTIONS.map(q=>{
    const r = h[q.id]; if(!r) return null;
    const total = r.correct + r.wrong;
    const acc = Math.round(r.correct/total*100);
    const last = r.attempts[r.attempts.length-1];
    return {q,total,acc,last};
  }).filter(Boolean).sort((a,b)=>b.last.at - a.last.at);

  render(`
    <h1 style="font-size:28px;margin-bottom:6px">回答履歴</h1>
    <p class="muted" style="margin-bottom:18px">${rows.length} 問の履歴</p>
    ${rows.length===0 ? '<div class="card text-center muted">まだ回答した問題がありません。</div>' : `
    <div class="card" style="overflow-x:auto">
      <table class="table">
        <thead><tr><th>領域</th><th>分野</th><th>問題（先頭）</th><th class="num">回数</th><th class="num">正答率</th><th>直近</th></tr></thead>
        <tbody>
          ${rows.map(r=>`<tr class="history-row" data-qid="${r.q.id}" style="cursor:pointer">
            <td><span class="q-tag ${domTagClass(domainOf(r.q.category))}">${esc(domainOf(r.q.category))}</span></td>

            <td>${esc(r.q.question.slice(0,28))}${r.q.question.length>28?'…':''}</td>
            <td class="num">${r.total}</td>
            <td class="num">${r.acc}%</td>
            <td>${r.last.ok ? '<span style="color:var(--c-ok)">○</span>' : '<span style="color:var(--c-ng)">×</span>'}</td>

        </tbody>

}

/* ===== Stats with SVG visualization ===== */
function viewStats(){
  $app.dataset.view="stats";
  const m = statsByCategory();
  const overall = statsOverall();
  const groups = DOMAINS.map(d=>({d, cats: CATEGORIES.filter(c=>domainOf(c)===d)}));

  // SVG donut chart
  const pct = overall.accuracy;
  const r=54, cx=64, cy=64, circ=2*Math.PI*r;
  const dash = circ * pct / 100;
  const donut = `<svg width="128" height="128" viewBox="0 0 128 128">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f5f5f7" stroke-width="14"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${pct>=70?'#34a853':pct>=50?'#0071e3':'#e0353d'}" stroke-width="14"
      stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${circ*0.25}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
    <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle"
      font-size="22" font-weight="600" font-family="system-ui,sans-serif" fill="#1d1d1f">${pct}%</text>
  </svg>`;

  // Bar chart per domain
  const domBars = groups.map(g=>{
    const cats = g.cats;
    const tot = cats.reduce((a,c)=>a+(m[c]?(m[c].ok+m[c].total===0?0:Math.round(m[c].ok/(m[c].ok+m[c].total)*100)||0):0),0);
    const avgAcc = cats.length ? Math.round(tot/cats.length) : 0;
    return {d:g.d, acc:avgAcc};
  });

  // Per-category rows with inline bar
  const catRows = groups.map(g=>{
    const rows = g.cats.map(c=>{
      const r2 = m[c];
      if(!r2) return "";
      const acc = r2.total ? Math.round(r2.ok/r2.total*100) : null;
      const cov = r2.questions ? Math.round(r2.answered/r2.questions*100) : 0;
      const barW = acc ?? 0;
      const barColor = acc===null?"#ccc":acc>=70?"#34a853":acc>=50?"#0071e3":"#e0353d";
      return `<tr>
        <td>${esc(c)}</td>
        <td class="num">${r2.answered}/${r2.questions}</td>
        <td style="width:120px">
          <div style="background:#f5f5f7;border-radius:4px;height:8px;overflow:hidden">
            <div style="width:${barW}%;background:${barColor};height:100%;border-radius:4px;transition:width .5s"></div>
          </div>
          <div style="font-size:11px;color:var(--c-text-2);text-align:right;margin-top:2px">${acc===null?"—":acc+"%"}</div>
        </td>
        <td class="num">${r2.ok}/${r2.total}</td>
      </tr>`;
    }).join("");
    return `<h3 style="margin:16px 0 6px"><span class="q-tag ${domTagClass(g.d)}">${esc(g.d)}</span></h3>
      <table class="table">
        <thead><tr><th>分野</th><th class="num">カバー</th><th style="min-width:120px">正答率</th><th class="num">○/延べ</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }).join("");

  render(`
    <h1 style="font-size:28px;margin-bottom:16px">成績</h1>

    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap">
        <div style="text-align:center">${donut}</div>
        <div style="flex:1;min-width:160px">
          <div style="font-size:13px;color:var(--c-text-2);margin-bottom:12px">総合正答率</div>
          <div class="grid grid-3" style="gap:8px">
            ${domBars.map(db=>`
              <div style="background:var(--c-bg-2);border-radius:12px;padding:10px;text-align:center">
                <div style="font-size:10px;color:var(--c-text-2);margin-bottom:4px">${esc(db.d)}</div>
                <div style="font-size:20px;font-weight:600;font-family:var(--font-display)">${db.acc}<span style="font-size:11px">%</span></div>
              </div>`).join("")}
          </div>
          <div style="margin-top:12px;font-size:13px;color:var(--c-text-2)">
            回答済: <strong>${overall.answered}/${QUESTIONS.length}問</strong>（${overall.coverage}%）／
            延べ: <strong>${overall.total}回</strong>
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="overflow-x:auto">${catRows}</div>
    <div class="actions"><button class="btn outline block" id="back">← ホームへ</button></div>
  `);
  setNav();
  document.getElementById("back").onclick=viewHome;
}
