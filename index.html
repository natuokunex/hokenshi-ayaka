<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f7fbff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="保健師対策">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<title>保健師対策（あやか用）</title>
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{
  --c-text:#1d1d1f;
  --c-text-2:rgba(0,0,0,0.56);
  --c-bg:#fff;
  --c-bg-2:#f5f5f7;
  --c-bg-3:#fafafc;
  --c-blue:#0071e3;
  --c-link:#0066cc;
  --c-line:rgba(0,0,0,0.1);
  --c-ok:#34a853;
  --c-ng:#e0353d;
  --c-warn:#b25000;
  --r-pill:980px;
  --r-card:18px;
  --r-btn:12px;
  --shadow-card:rgba(0,0,0,0.06) 0 4px 18px;
  --shadow-card-h:rgba(0,0,0,0.18) 3px 5px 30px;
  --font-text:"SF Pro JP","SF Pro Text","SF Pro Icons","Hiragino Kaku Gothic Pro","ヒラギノ角ゴ Pro W3",メイリオ,Meiryo,"ＭＳ Ｐゴシック","Helvetica Neue",Helvetica,Arial,sans-serif;
  --font-display:"SF Pro JP","SF Pro Display","SF Pro Icons","Hiragino Kaku Gothic Pro","ヒラギノ角ゴ Pro W3",メイリオ,Meiryo,"ＭＳ Ｐゴシック","Helvetica Neue",Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--c-bg);color:var(--c-text);font-family:var(--font-text);font-size:17px;line-height:1.47;letter-spacing:-0.357px;-webkit-font-smoothing:antialiased;font-feature-settings:normal}
button{font-family:inherit;font-size:inherit;color:inherit;background:none;border:none;cursor:pointer;letter-spacing:inherit}
input,select{font-family:inherit;font-size:inherit;color:inherit}
h1,h2,h3{font-family:var(--font-display);font-weight:600;letter-spacing:normal;margin:0}
h1{font-size:28px;line-height:1.18}
h2{font-size:21px;line-height:1.24;letter-spacing:0.231px;font-weight:600}
h3{font-size:17px;line-height:1.35;font-weight:600;letter-spacing:-0.357px}
small,.caption{font-size:12px;line-height:1.42;color:var(--c-text-2);letter-spacing:normal}

.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,0.8);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--c-line)}
.nav-inner{max-width:980px;margin:0 auto;height:48px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{font-family:var(--font-display);font-size:17px;font-weight:600;letter-spacing:-0.2px}
.brand .dot{color:var(--c-blue)}
.brand{cursor:pointer}
.nav-actions{display:flex;align-items:center;gap:8px}

.wrap{max-width:880px;margin:0 auto;padding:24px 16px 80px;padding-bottom:calc(80px + env(safe-area-inset-bottom))}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 22px;border-radius:var(--r-pill);font-size:15px;font-weight:400;line-height:1.2;background:var(--c-blue);color:#fff;transition:opacity .15s, transform .05s;letter-spacing:-0.2px;min-height:36px;white-space:nowrap}
.btn:hover{opacity:.9}
.btn:active{transform:scale(.98)}
.btn.outline{background:transparent;color:var(--c-blue);border:1px solid var(--c-blue)}
.btn.dark{background:var(--c-text);color:#fff;border-radius:var(--r-btn)}
.btn.ghost{background:transparent;color:var(--c-text);padding:8px 14px}
.btn.ghost:hover{background:var(--c-bg-2)}
.btn.sm{padding:6px 14px;font-size:13px;min-height:30px}
.btn.lg{padding:14px 28px;font-size:17px;min-height:48px}
.btn.block{width:100%}
.btn[disabled]{opacity:.4;cursor:not-allowed}

.card{background:var(--c-bg);border-radius:var(--r-card);box-shadow:var(--shadow-card);padding:24px;border:1px solid var(--c-line)}
.card+.card{margin-top:16px}

.hero{padding:32px 0 16px;text-align:center}
.hero h1{font-family:var(--font-display);font-size:40px;line-height:1.1;font-weight:600;margin-bottom:8px;letter-spacing:-0.5px}
.hero p{margin:0;color:var(--c-text-2);font-size:15px}
@media (max-width:520px){.hero h1{font-size:32px}}

.grid{display:grid;gap:12px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:repeat(3,1fr)}
@media (max-width:520px){.grid-2,.grid-3{grid-template-columns:1fr}}

.tile{background:var(--c-bg-2);border-radius:14px;padding:14px}
.tile .label{font-size:11px;color:var(--c-text-2);letter-spacing:normal;margin-bottom:4px}
.tile .value{font-family:var(--font-display);font-size:28px;font-weight:600;line-height:1.1;letter-spacing:-0.5px}
.tile .sub{font-size:11px;color:var(--c-text-2)}

.mode{display:flex;align-items:center;justify-content:space-between;padding:16px;background:var(--c-bg);border:1px solid var(--c-line);border-radius:14px;margin-bottom:8px;cursor:pointer;transition:all .15s;text-align:left;width:100%}
.mode:hover{box-shadow:var(--shadow-card-h);border-color:transparent}
.mode .meta{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.mode .meta .t{font-weight:600;font-size:15px}
.mode .meta .d{font-size:12px;color:var(--c-text-2);letter-spacing:normal}
.mode .arrow{color:var(--c-text-2);flex:0 0 auto;margin-left:8px}
.study-card{background:var(--c-bg);border:1px solid var(--c-line);border-radius:14px;padding:16px;margin-bottom:10px}
.study-card .head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
.study-card .title{font-weight:600;font-size:16px}
.study-card .desc{font-size:12px;color:var(--c-text-2);letter-spacing:normal;margin-top:2px}
.count-buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.count-btn{background:var(--c-bg-2);border:1px solid transparent;border-radius:10px;padding:9px 8px;font-size:13px;font-weight:600;text-align:center}
.count-btn:hover{border-color:var(--c-blue);background:rgba(0,113,227,0.06)}

.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:12px;color:var(--c-text-2);letter-spacing:normal;gap:8px;flex-wrap:wrap}
.rate-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0 12px}
.rate-box{background:var(--c-bg-2);border:1px solid var(--c-line);border-radius:12px;padding:10px 12px}
.rate-box .label{font-size:11px;color:var(--c-text-2);margin-bottom:2px}
.rate-box .num{font-family:var(--font-display);font-size:22px;font-weight:600;line-height:1.1}
.rate-box .sub{font-size:11px;color:var(--c-text-2);margin-top:2px}
@media (max-width:520px){.rate-strip{grid-template-columns:1fr}}
.q-tag{display:inline-block;padding:3px 10px;border-radius:var(--r-pill);background:var(--c-bg-2);font-size:11px;color:var(--c-text);letter-spacing:normal;margin-right:4px}
.q-tag.dom{background:#e8f0ff;color:#0040a8}
.q-tag.dom2{background:#fff2e0;color:#a85800}
.q-tag.dom3{background:#ffe0e6;color:#a8003a}
.q-text{font-size:18px;line-height:1.6;font-weight:500;margin:8px 0 20px;letter-spacing:-0.2px}
.choice{display:flex;align-items:flex-start;gap:12px;width:100%;text-align:left;padding:14px 16px;background:var(--c-bg);border:1px solid var(--c-line);border-radius:14px;margin-bottom:8px;font-size:15px;line-height:1.5;cursor:pointer;transition:all .12s;-webkit-tap-highlight-color:transparent}
@media (hover:hover) and (pointer:fine){.choice:hover:not(:disabled):not(.disabled){border-color:var(--c-blue);background:rgba(0,113,227,0.04)}}
.choice:focus{outline:none;box-shadow:none}
.choice .num{flex:0 0 26px;height:26px;border-radius:50%;background:var(--c-bg-2);display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
.choice.correct{background:rgba(52,168,83,0.08);border-color:var(--c-ok)}
.choice.correct .num{background:var(--c-ok);color:#fff}
.choice.wrong{background:rgba(224,53,61,0.06);border-color:var(--c-ng)}
.choice.wrong .num{background:var(--c-ng);color:#fff}
.choice.selected{border-color:var(--c-blue);background:rgba(0,113,227,0.08)}
.choice.selected .num{background:var(--c-blue);color:#fff}
.choice.disabled{cursor:default;opacity:.7}
.choice.disabled.correct,.choice.disabled.wrong,.choice.disabled.selected{opacity:1}

.feedback{margin-top:18px;padding:18px;border-radius:14px;background:var(--c-bg-2)}
.feedback .head{font-family:var(--font-display);font-size:21px;font-weight:600;margin-bottom:6px;letter-spacing:0.231px}
.feedback.ok .head{color:var(--c-ok)}
.feedback.ng .head{color:var(--c-ng)}
.feedback .src{margin-top:10px;font-size:12px;color:var(--c-text-2);letter-spacing:normal}
.feedback .ref-links{margin-top:8px;font-size:13px}
.feedback .ref-links a{display:inline-block;margin-right:10px;margin-top:4px}
.explain-image{display:block;width:100%;height:auto;border-radius:12px;border:1px solid var(--c-line);margin:12px 0;background:#fff}

.bar{height:4px;background:var(--c-bg-2);border-radius:99px;overflow:hidden;margin:6px 0 16px}
.bar > i{display:block;height:100%;background:var(--c-blue);transition:width .3s}

.table{width:100%;border-collapse:collapse;font-size:13px}
.table th,.table td{padding:10px 8px;text-align:left;border-bottom:1px solid var(--c-line);letter-spacing:normal}
.table th{font-weight:600;color:var(--c-text-2);font-size:12px}
.table .num{text-align:right;font-variant-numeric:tabular-nums}

.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.actions .btn{flex:1;min-width:120px}

.profile-list{display:flex;flex-direction:column;gap:8px}
.profile-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-radius:14px;background:var(--c-bg-2);gap:8px}
.profile-row .who{display:flex;align-items:center;gap:12px;min-width:0}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--c-blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-family:var(--font-display);flex:0 0 auto}

.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:12px;color:var(--c-text-2);letter-spacing:normal;font-weight:600}
.field input,.field select{padding:10px 12px;border:1px solid var(--c-line);border-radius:10px;background:var(--c-bg);font-size:15px;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--c-blue);box-shadow:0 0 0 3px rgba(0,113,227,0.2)}

.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:8px 14px;border-radius:var(--r-pill);background:var(--c-bg-2);font-size:13px;letter-spacing:normal;cursor:pointer;border:1px solid transparent;transition:all .12s}
.chip:hover{background:#eaeaef}
.chip.on{background:var(--c-text);color:#fff}
.chip.on:hover{background:#000}

a,.link{color:var(--c-link);text-decoration:none}
a:hover,.link:hover{text-decoration:underline}

.hidden{display:none !important}

.row-between{display:flex;justify-content:space-between;align-items:center;gap:8px}
.muted{color:var(--c-text-2)}
.text-center{text-align:center}
hr{border:none;border-top:1px solid var(--c-line);margin:18px 0}

.timer{font-variant-numeric:tabular-nums;font-family:var(--font-display);font-weight:600}

.review-item{padding:14px;border-radius:12px;background:var(--c-bg-2);margin-bottom:10px;border-left:4px solid var(--c-line)}
.review-item.ok{border-left-color:var(--c-ok)}
.review-item.ng{border-left-color:var(--c-ng)}
.review-item .qh{font-size:14px;font-weight:600;margin-bottom:6px}
.review-item .ans{font-size:13px;color:var(--c-text-2);letter-spacing:normal;margin-top:4px}
.review-item .expl{font-size:13px;margin-top:8px;letter-spacing:normal;line-height:1.6}

/* info page */
.info-tabs{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.info-tab{padding:8px 16px;border-radius:var(--r-pill);background:var(--c-bg-2);font-size:14px;cursor:pointer;border:1px solid transparent;transition:all .12s;font-weight:500}
.info-tab:hover{background:#eaeaef}
.info-tab.on{background:var(--c-text);color:#fff}
.info-badge{display:inline-block;padding:3px 12px;border-radius:var(--r-pill);font-size:12px;font-weight:600;margin-bottom:10px;letter-spacing:normal}
.info-badge.sp{background:#e8f0ff;color:#0040a8}
.info-badge{background:var(--c-bg-2);color:var(--c-text-2)}
.timeline{margin:12px 0;padding-left:4px}
.tl-item{display:flex;gap:14px;position:relative;padding-bottom:16px}
.tl-item:not(.last)::before{content:"";position:absolute;left:7px;top:18px;bottom:0;width:2px;background:var(--c-line)}
.tl-dot{width:16px;height:16px;border-radius:50%;background:var(--c-blue);flex:0 0 16px;margin-top:2px}
.tl-body{flex:1}
.tl-label{font-size:12px;font-weight:600;color:var(--c-blue);margin-bottom:2px}
.section-info{background:var(--c-bg-2);border-radius:12px;padding:14px;font-size:14px;line-height:1.8}
.section-info p{margin:0}
.theme-list{display:flex;flex-direction:column;gap:10px;margin-bottom:4px}
.theme-item{display:flex;align-items:flex-start;gap:12px;background:var(--c-bg-2);border-radius:12px;padding:12px}
.theme-rank{flex:0 0 auto;padding:2px 8px;border-radius:8px;font-size:12px;font-weight:700;background:#fff2e0;color:#a85800;white-space:nowrap}
.essay-box{display:flex;flex-direction:column;gap:8px}
.essay-para{background:var(--c-bg-2);border-radius:10px;padding:12px;font-size:14px}
.essay-label{display:block;font-weight:600;font-size:12px;color:var(--c-blue);margin-bottom:4px}
.qa-list{display:flex;flex-direction:column;gap:10px}
.qa-item{background:var(--c-bg-2);border-radius:12px;padding:14px;font-size:14px}
.qa-q{font-weight:600;margin-bottom:6px;color:var(--c-blue)}
.qa-a{line-height:1.6}
.exam-image{display:block;width:100%;height:auto;border-radius:14px;border:1px solid var(--c-line);margin:0 0 18px;background:var(--c-bg-2)}
.pdf-panel{border:1px solid var(--c-line);border-radius:14px;overflow:hidden;background:#fff;margin:10px 0 18px}
.pdf-toolbar{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap;padding:12px;background:var(--c-bg-2);border-bottom:1px solid var(--c-line)}
.pdf-docs{display:flex;gap:8px;flex-wrap:wrap}
.pdf-doc{border:1px solid var(--c-line);border-radius:999px;background:#fff;padding:7px 12px;font-size:13px;font-weight:600}
.pdf-doc.on{background:var(--c-blue);border-color:var(--c-blue);color:#fff}
.pdf-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.pdf-frame-wrap{background:#d8d8dc}
.pdf-frame{width:100%;height:620px;border:0;background:var(--c-bg-2);display:block}
.pdf-fallback{padding:10px 12px;border-top:1px solid var(--c-line);font-size:13px;color:var(--c-text-2);letter-spacing:normal}
@media(max-width:640px){
  .pdf-toolbar{align-items:stretch;flex-direction:column;padding:10px}
  .pdf-docs{display:grid;grid-template-columns:1fr;gap:8px}
  .pdf-doc{width:100%;font-size:14px;padding:10px 12px;text-align:center}
  .pdf-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}
  .pdf-actions .btn{width:100%;justify-content:center;padding:10px 8px}
  .pdf-frame-wrap{height:min(68vh,540px);overflow:auto;-webkit-overflow-scrolling:touch}
  .pdf-frame{height:100%;min-height:460px}
  .pdf-fallback{font-size:12px;line-height:1.6}
}

/* type tag */
.type-tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;letter-spacing:normal;margin-left:4px;vertical-align:middle}
.type-tag.kakomon{background:#e8ffe8;color:#1a6b1a}
.type-tag.yoso{background:#fff8e0;color:#8a6000}
.type-tag.jiji{background:#ffe8f5;color:#8a004a}
.type-tag.official{background:#e8f3ff;color:#00508a;border:1px solid #b9dcff}
</style>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <div class="brand" role="button" tabindex="0" aria-label="ホームへ戻る">保健師対策 <span class="dot">あやか用</span></div>
    <div class="nav-actions">
      <button class="btn ghost sm" id="navProfile">👤 <span id="navUserLabel">ゲスト</span></button>
      <button class="btn ghost sm hidden" id="navHome">ホーム</button>
      <button class="btn ghost sm" id="navInfo">試験情報</button>
    </div>
  </div>

<script id="inlineData">window.__INLINE_QUESTIONS__ = {"version":"1.7.1","updated":"2026-05-16","categories":["公衆衛生看護学","疫学","保健統計学","保健医療福祉行政論","関係法規","母子保健","成人・高齢者保健","精神保健","産業保健","学校保健","感染症","栄養・健康教育","教養_憲法","教養_地方自治","教養_時事広島","時事_保健医療政策","教養_社会科学","教養_人文科学","教養_自然科学","教養_数的推理","教養_判断推理","教養_資料解釈","教養_文章理解"],"questions":[{"id":1,"category":"保健医療福祉行政論","question":"地域保健法に基づく保健所の設置主体として正しいのはどれか。","choices":["市町村","都道府県・指定都市・中核市・政令で定める市・特別区","国（厚生労働省）","都道府県のみ"],"answer":1,"explanation":"地域保健法第5条により、保健所は都道府県、地方自治法に基づく指定都市、中核市、その他政令で定める市、特別区が設置する。広島市は政令指定都市のため保健所を設置している。","source":"地域保健法 第5条","links":[{"title":"e-Gov｜地域保健法","url":"https://elaws.e-gov.go.jp/document?lawid=322AC0000000101"},{"title":"厚労省｜地域保健の推進","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/tiiki/index.html"}],"type":"過去問系"},{"id":2,"category":"保健医療福祉行政論","question":"市町村保健センターの業務として最も適切なのはどれか。","choices":["難病対策の調査研究","住民に身近な対人保健サービス（健康相談・保健指導・健康診査）","食品衛生の監視指導","医療機関の立入検査"],"answer":1,"explanation":"市町村保健センターは地域保健法第18条に基づき、住民に対する健康相談・保健指導・健康診査等の対人保健サービスを総合的に行う拠点。広域的・専門的業務は保健所が担う。","source":"地域保健法 第18条","links":[{"title":"e-Gov｜地域保健法","url":"https://elaws.e-gov.go.jp/document?lawid=322AC0000000101"},{"title":"厚労省｜地域保健の推進","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/tiiki/index.html"}],"type":"過去問系"},{"id":3,"category":"関係法規","question":"母子保健法に基づき、市町村が行う1歳6か月児健康診査の根拠条文はどれか。","choices":["第10条（保健指導）","第12条（健康診査）","第15条（妊娠の届出）","第20条（養育医療）"],"answer":1,"explanation":"母子保健法第12条により、市町村は1歳6か月〜2歳未満の幼児及び3歳〜4歳未満の幼児に対し健康診査を行うことが義務付けられている。","source":"母子保健法 第12条","links":[{"title":"e-Gov｜母子保健法","url":"https://elaws.e-gov.go.jp/document?lawid=340AC0000000141"},{"title":"e-Gov法令検索（法令横断検索）","url":"https://elaws.e-gov.go.jp/"}],"type":"過去問系"},{"id":4,"category":"母子保健","question":"母子健康手帳の交付主体はどこか。","choices":["都道府県","保健所","市町村","産科医療機関"],"answer":2,"explanation":"母子保健法第16条により、妊娠の届出をした者に対し、市町村が母子健康手帳を交付する。","source":"母子保健法 第16条","links":[{"title":"e-Gov｜母子保健法","url":"https://elaws.e-gov.go.jp/document?lawid=340AC0000000141"},{"title":"こども家庭庁｜母子保健","url":"https://www.cfa.go.jp/policies/boshi-hoken/"}],"type":"過去問系"},{"id":5,"category":"母子保健","question":"新生児マススクリーニング（先天性代謝異常等検査）で対象となる疾患群に含まれないのはどれか。","choices":["フェニルケトン尿症","先天性甲状腺機能低下症","ダウン症候群","ガラクトース血症"],"answer":2,"explanation":"新生児マススクリーニングは生化学的に検査可能な代謝・内分泌異常が対象。ダウン症は染色体異常で、本検査の対象外。","source":"母子保健法に基づく新生児マススクリーニング事業","links":[{"title":"e-Gov｜母子保健法","url":"https://elaws.e-gov.go.jp/document?lawid=340AC0000000141"},{"title":"こども家庭庁｜母子保健","url":"https://www.cfa.go.jp/policies/boshi-hoken/"}],"type":"過去問系"},{"id":6,"category":"疫学","question":"ある集団の健康障害発生のリスク要因と疾病との関連の強さを示す指標はどれか。","choices":["有病率","相対危険","罹患率","受療率"],"answer":1,"explanation":"相対危険（リスク比）は曝露群の罹患率／非曝露群の罹患率で、関連の強さを示す代表的指標。寄与危険は影響の大きさを示す。","source":"疫学標準テキスト","type":"過去問系","links":[{"title":"国立感染症研究所｜疫学","url":"https://www.niid.go.jp/niid/ja/diseases.html"}]},{"id":7,"category":"疫学","question":"後ろ向き（症例対照）研究で算出する指標として最も適切なのはどれか。","choices":["罹患率","相対危険","オッズ比","累積罹患率"],"answer":2,"explanation":"症例対照研究は曝露の有無を遡及的に調べる設計のため、罹患率は直接算出できず、オッズ比により相対危険を近似する。","source":"疫学テキスト","type":"過去問系","links":[{"title":"国立感染症研究所｜疫学","url":"https://www.niid.go.jp/niid/ja/diseases.html"}]},{"id":8,"category":"疫学","question":"コホート研究の特徴として正しいのはどれか。","choices":["まれな疾病の研究に適する","曝露から発症までの時間的順序が明確","短期間・低コストで実施できる","オッズ比のみ算出可能"],"answer":1,"explanation":"コホート研究は曝露を起点に時間軸に沿って発症を追跡するため、因果関係の時間的順序が明確。罹患率・相対危険を直接算出できる。まれな疾病には症例対照研究が向く。","source":"疫学テキスト","type":"過去問系","links":[{"title":"国立感染症研究所｜疫学","url":"https://www.niid.go.jp/niid/ja/diseases.html"}]},{"id":9,"category":"保健統計学","question":"粗死亡率と年齢調整死亡率を比較する目的として正しいのはどれか。","choices":["医療費の比較","人口の年齢構成の影響を除いた比較","感染症の拡大速度の比較","出生率との関連分析"],"answer":1,"explanation":"年齢調整死亡率は人口の年齢構成を統一基準（昭和60年モデル人口等）に揃えて計算するため、地域・年次間の比較で年齢構成の影響を除外できる。","source":"厚生労働省 人口動態統計","type":"過去問系","links":[{"title":"厚労省｜人口動態統計","url":"https://www.mhlw.go.jp/toukei/list/81-1a.html"}]},{"id":10,"category":"保健統計学","question":"合計特殊出生率の定義として正しいのはどれか。","choices":["人口千対の年間出生数","15〜49歳女性の年齢別出生率の合計","出生時の母の平均年齢","1世帯あたり子ども数"],"answer":1,"explanation":"合計特殊出生率（TFR）は15〜49歳の女性の年齢別出生率を合計したもので、1人の女性が一生の間に産む子どもの数の推計値。","source":"人口動態統計","type":"過去問系","links":[{"title":"厚労省｜人口動態統計","url":"https://www.mhlw.go.jp/toukei/list/81-1a.html"}]},{"id":11,"category":"感染症","question":"感染症法における結核の分類はどれか。","choices":["1類","2類","3類","5類"],"answer":1,"explanation":"結核は感染症法において2類感染症に分類される。発生時は直ちに保健所への届出が必要。","source":"感染症の予防及び感染症の患者に対する医療に関する法律","links":[{"title":"国立感染症研究所（NIID）","url":"https://www.niid.go.jp/niid/ja/"}],"type":"過去問系"},{"id":12,"category":"感染症","question":"麻しん（はしか）について正しいのはどれか。","choices":["飛沫感染のみで空気感染しない","感染症法上は5類で、診断後直ちに届出","潜伏期は通常1〜2日","ワクチンは任意接種である"],"answer":1,"explanation":"麻しんは5類感染症で、診断した医師は直ちに届出。空気感染・飛沫・接触感染し、潜伏期は約10〜12日。MRワクチンは定期接種。","source":"感染症法・予防接種法","links":[{"title":"e-Gov｜感染症法","url":"https://elaws.e-gov.go.jp/document?lawid=410AC0000000114"},{"title":"国立感染症研究所（NIID）","url":"https://www.niid.go.jp/niid/ja/"}],"type":"過去問系"},{"id":13,"category":"関係法規","question":"予防接種法に基づくA類疾病（旧一類）に該当しないのはどれか。","choices":["麻しん","風しん","インフルエンザ（季節性・高齢者）","ジフテリア"],"answer":2,"explanation":"高齢者の季節性インフルエンザはB類疾病（個人予防目的）。A類は集団予防目的で麻しん・風しん・ジフテリア・百日咳・ポリオ・日本脳炎・BCG・Hib・小児肺炎球菌・水痘・B型肝炎・HPV・ロタ等。","source":"予防接種法","links":[{"title":"e-Gov｜予防接種法","url":"https://elaws.e-gov.go.jp/document?lawid=323AC0000000068"},{"title":"e-Gov法令検索（法令横断検索）","url":"https://elaws.e-gov.go.jp/"}],"type":"過去問系"},{"id":14,"category":"成人・高齢者保健","question":"特定健康診査の対象年齢として正しいのはどれか。","choices":["20〜64歳","30〜70歳","40〜74歳","65〜79歳"],"answer":2,"explanation":"高齢者の医療の確保に関する法律に基づき、特定健康診査の対象は40〜74歳の医療保険加入者。メタボリックシンドロームに着目した健診。","source":"高齢者の医療の確保に関する法律","links":[{"title":"e-Gov｜高齢者医療確保法","url":"https://elaws.e-gov.go.jp/document?lawid=357AC0000000080"},{"title":"厚労省｜生活習慣病対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/seikatsu/index.html"}],"type":"過去問系"},{"id":15,"category":"成人・高齢者保健","question":"特定保健指導における「動機付け支援」と「積極的支援」の振り分け基準として用いられるのはどれか。","choices":["年齢と性別","腹囲・BMI＋追加リスク（血圧・脂質・血糖・喫煙）の数","BMIと家族歴","喫煙歴のみ"],"answer":1,"explanation":"腹囲（または BMI）の該当に追加リスクの数を組み合わせ、年齢区分（前期高齢者除く）も考慮して動機付け支援／積極的支援に振り分ける。","source":"標準的な健診・保健指導プログラム","links":[{"title":"厚労省｜生活習慣病対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/seikatsu/index.html"}],"type":"過去問系"},{"id":16,"category":"成人・高齢者保健","question":"介護保険制度の保険者はどれか。","choices":["国","都道府県","市町村及び特別区","後期高齢者医療広域連合"],"answer":2,"explanation":"介護保険法第3条により保険者は市町村及び特別区。広島市は政令指定都市として保険者となる。","source":"介護保険法 第3条","links":[{"title":"e-Gov｜介護保険法","url":"https://elaws.e-gov.go.jp/document?lawid=409AC0000000123"},{"title":"厚労省｜生活習慣病対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/seikatsu/index.html"}],"type":"過去問系"},{"id":17,"category":"成人・高齢者保健","question":"地域包括支援センターに必置とされていない職種はどれか。","choices":["保健師等","社会福祉士","主任介護支援専門員","理学療法士"],"answer":3,"explanation":"地域包括支援センターには保健師（または地域ケアに知見ある看護師）、社会福祉士、主任介護支援専門員の3職種の配置が原則。","source":"介護保険法施行規則","links":[{"title":"e-Gov｜介護保険法","url":"https://elaws.e-gov.go.jp/document?lawid=409AC0000000123"},{"title":"厚労省｜生活習慣病対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/seikatsu/index.html"}],"type":"過去問系"},{"id":18,"category":"精神保健","question":"精神保健福祉法に基づく入院形態のうち、家族等の同意により行うのはどれか。","choices":["任意入院","医療保護入院","措置入院","応急入院"],"answer":1,"explanation":"医療保護入院は精神保健指定医の診察と家族等の同意により行う。措置入院は都道府県知事の権限、任意入院は本人同意、応急入院は緊急時72時間以内。","source":"精神保健福祉法 第33条","links":[{"title":"e-Gov｜精神保健福祉法","url":"https://elaws.e-gov.go.jp/document?lawid=325AC0000000123"},{"title":"厚労省｜精神保健福祉対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/hukushi_kaigo/shougaishahukushi/seishin/index.html"}],"type":"過去問系"},{"id":19,"category":"精神保健","question":"自殺対策基本法の理念として正しいのはどれか。","choices":["自殺を個人的問題として捉える","社会的要因も含めて総合的に対策する","医療機関のみが対応する","高齢者のみを対象とする"],"answer":1,"explanation":"自殺対策基本法は自殺を個人的問題ではなく社会的要因も含む問題と捉え、社会全体で総合的に取り組むことを基本理念としている（2016年改正で強化）。","source":"自殺対策基本法","links":[{"title":"厚労省｜自殺対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/hukushi_kaigo/seikatsuhogo/jisatsu/index.html"},{"title":"厚労省｜精神保健福祉対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/hukushi_kaigo/shougaishahukushi/seishin/index.html"}],"type":"過去問系"},{"id":20,"category":"産業保健","question":"労働安全衛生法に基づく定期健康診断の実施義務者はどれか。","choices":["労働者本人","事業者（使用者）","産業医","労働基準監督署"],"answer":1,"explanation":"労働安全衛生法第66条により、事業者は労働者に対し医師による健康診断を実施する義務を負う。労働者には受診義務がある。","source":"労働安全衛生法 第66条","links":[{"title":"e-Gov｜労働安全衛生法","url":"https://elaws.e-gov.go.jp/document?lawid=347AC0000000057"},{"title":"産業保健総合支援センター（JOHAS）","url":"https://www.johas.go.jp/"}],"type":"過去問系"},{"id":21,"category":"産業保健","question":"ストレスチェック制度の実施が義務付けられている事業場の規模として正しいのはどれか。","choices":["常時10人以上","常時30人以上","常時50人以上","常時100人以上"],"answer":2,"explanation":"労働安全衛生法に基づき、常時50人以上の労働者を使用する事業者は、年1回のストレスチェックの実施が義務（50人未満は努力義務）。","source":"労働安全衛生法 第66条の10","links":[{"title":"e-Gov｜労働安全衛生法","url":"https://elaws.e-gov.go.jp/document?lawid=347AC0000000057"},{"title":"産業保健総合支援センター（JOHAS）","url":"https://www.johas.go.jp/"}],"type":"過去問系"},{"id":22,"category":"産業保健","question":"産業医の選任義務が生じる事業場の規模はどれか。","choices":["常時10人以上","常時30人以上","常時50人以上","常時1000人以上で専属"],"answer":2,"explanation":"常時50人以上の事業場は産業医を選任、1000人以上（または有害業務500人以上）では専属産業医が必要。","source":"労働安全衛生法 第13条","links":[{"title":"e-Gov｜労働安全衛生法","url":"https://elaws.e-gov.go.jp/document?lawid=347AC0000000057"},{"title":"産業保健総合支援センター（JOHAS）","url":"https://www.johas.go.jp/"}],"type":"過去問系"},{"id":23,"category":"学校保健","question":"学校保健安全法に基づき、学校で感染症が発生した場合に出席停止を命ずる者は誰か。","choices":["学校医","校長","学校設置者","保健所長"],"answer":1,"explanation":"学校保健安全法第19条により、出席停止は校長が命ずる。臨時休業（学級閉鎖等）は学校設置者の権限。","source":"学校保健安全法 第19条・第20条","links":[{"title":"e-Gov｜学校保健安全法","url":"https://elaws.e-gov.go.jp/document?lawid=333AC0000000056"},{"title":"文科省｜学校保健","url":"https://www.mext.go.jp/a_menu/kenko/hoken/index.htm"}],"type":"過去問系"},{"id":24,"category":"学校保健","question":"学校感染症で第二種に分類される組合せはどれか。","choices":["コレラ","麻しん・インフルエンザ・水痘・流行性耳下腺炎","腸管出血性大腸菌感染症","流行性角結膜炎"],"answer":1,"explanation":"学校保健安全法施行規則の第二種は、飛沫感染などにより学校で流行を広げやすい感染症で、麻しん、風しん、インフルエンザ、水痘、流行性耳下腺炎、百日咳、咽頭結膜熱、結核、髄膜炎菌性髄膜炎などが含まれる。コレラ、腸管出血性大腸菌感染症、流行性角結膜炎は第三種。","source":"学校保健安全法施行規則 第18条","links":[{"title":"e-Gov｜学校保健安全法","url":"https://elaws.e-gov.go.jp/document?lawid=333AC0000000056"},{"title":"文科省｜学校保健","url":"https://www.mext.go.jp/a_menu/kenko/hoken/index.htm"}],"type":"過去問系"},{"id":25,"category":"公衆衛生看護学","question":"保健師の家庭訪問における初回訪問の目的として最も適切なのはどれか。","choices":["即時の問題解決","信頼関係の構築と生活実態の把握","詳細な医療処置","近隣住民の情報収集"],"answer":1,"explanation":"初回訪問は対象者・家族との信頼関係構築（ラポール形成）と、生活環境・健康課題の総合的アセスメントが主目的。","source":"公衆衛生看護学テキスト","type":"過去問系","links":[{"title":"日本公衆衛生看護学会","url":"https://japhn.jp/"}]},{"id":26,"category":"公衆衛生看護学","question":"地区診断（コミュニティアセスメント）で最も重視されるデータはどれか。","choices":["地区の人口・健康・生活・環境に関する量的・質的データ","個別事例の医療記録のみ","国全体の統計のみ","保健師個人の経験"],"answer":0,"explanation":"地区診断は人口統計・健康指標・社会資源・生活環境・住民の声など量的・質的データを統合して地域の健康課題を明確化する。","source":"公衆衛生看護学テキスト","type":"過去問系","links":[{"title":"日本公衆衛生看護学会","url":"https://japhn.jp/"}]},{"id":27,"category":"公衆衛生看護学","question":"ヘルスプロモーションの定義（オタワ憲章）として正しいのはどれか。","choices":["疾病の早期発見・早期治療","人々が自らの健康をコントロールし改善できるようにするプロセス","感染症の予防接種","医療費抑制策"],"answer":1,"explanation":"1986年WHOオタワ憲章でヘルスプロモーションは「人々が自らの健康をコントロールし、改善することができるようにするプロセス」と定義された。","source":"WHOオタワ憲章 1986","links":[{"title":"日本公衆衛生看護学会","url":"https://japhn.jp/"}],"type":"過去問系"},{"id":28,"category":"公衆衛生看護学","question":"PDCAサイクルの順序として正しいのはどれか。","choices":["Plan→Do→Check→Act","Plan→Check→Do→Act","Do→Plan→Check→Act","Check→Plan→Do→Act"],"answer":0,"explanation":"PDCAは計画（Plan）→実施（Do）→評価（Check）→改善（Act）の循環。保健事業の質改善で標準的に用いられる。","source":"標準的な健診・保健指導プログラム","links":[{"title":"日本公衆衛生看護学会","url":"https://japhn.jp/"}],"type":"過去問系"},{"id":29,"category":"栄養・健康教育","question":"健康日本21（第三次）の基本方針として正しいのはどれか。","choices":["医療費削減のみを目的とする","全ての国民が健やかで心豊かに生活できる持続可能な社会の実現","高齢者のみを対象とする","感染症対策が中心"],"answer":1,"explanation":"健康日本21（第三次）（2024年度〜2035年度）は「全ての国民が健やかで心豊かに生活できる持続可能な社会の実現」を基本方針とし、健康寿命の延伸・健康格差の縮小を目指す。","source":"健康日本21（第三次）","links":[{"title":"厚労省｜健康日本21(第三次)","url":"https://www.mhlw.go.jp/stf/kenkounippon21_00006.html"},{"title":"厚労省｜栄養・食生活","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/eiyou/index.html"}],"type":"過去問系"},{"id":30,"category":"栄養・健康教育","question":"メタボリックシンドロームの診断における必須項目はどれか。","choices":["BMI","腹囲（内臓脂肪型肥満）","血糖値","総コレステロール"],"answer":1,"explanation":"日本のメタボ診断基準では、腹囲（男性85cm以上・女性90cm以上）が必須項目。それに加え血圧・脂質・血糖の2項目以上で診断。","source":"日本内科学会等8学会 診断基準","type":"過去問系","links":[{"title":"厚労省｜栄養・食生活","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/eiyou/index.html"}]},{"id":31,"category":"母子保健","question":"乳児家庭全戸訪問事業（こんにちは赤ちゃん事業）の根拠法はどれか。","choices":["母子保健法","児童福祉法","次世代育成支援対策推進法","子ども・子育て支援法"],"answer":1,"explanation":"児童福祉法第6条の3に基づく乳児家庭全戸訪問事業。原則生後4か月までに全戸訪問し、養育環境の把握と支援につなげる。","source":"児童福祉法 第6条の3","links":[{"title":"e-Gov｜児童福祉法","url":"https://elaws.e-gov.go.jp/document?lawid=322AC0000000164"},{"title":"こども家庭庁｜母子保健","url":"https://www.cfa.go.jp/policies/boshi-hoken/"}],"type":"過去問系"},{"id":32,"category":"母子保健","question":"養育医療の対象として正しいのはどれか。","choices":["未熟児で入院養育を必要とする者","全ての低出生体重児","1歳未満の全乳児","妊婦健診を受けない妊婦"],"answer":0,"explanation":"母子保健法第20条の養育医療は、出生時体重2000g以下または生活力薄弱で入院養育が必要な未熟児に対する医療給付。","source":"母子保健法 第20条","links":[{"title":"e-Gov｜母子保健法","url":"https://elaws.e-gov.go.jp/document?lawid=340AC0000000141"},{"title":"こども家庭庁｜母子保健","url":"https://www.cfa.go.jp/policies/boshi-hoken/"}],"type":"過去問系"},{"id":33,"category":"母子保健","question":"低出生体重児の届出基準として正しいのはどれか。","choices":["2000g未満","2500g未満","3000g未満","1500g未満"],"answer":1,"explanation":"母子保健法第18条により、出生時体重2500g未満の乳児が出生したときは、保護者は速やかに市町村に届け出なければならない。","source":"母子保健法 第18条","links":[{"title":"e-Gov｜母子保健法","url":"https://elaws.e-gov.go.jp/document?lawid=340AC0000000141"},{"title":"こども家庭庁｜母子保健","url":"https://www.cfa.go.jp/policies/boshi-hoken/"}],"type":"過去問系"},{"id":34,"category":"関係法規","question":"保健師助産師看護師法における保健師の業務として正しいのはどれか。","choices":["診断・治療","保健指導","助産","麻酔"],"answer":1,"explanation":"保健師助産師看護師法第2条により、保健師は厚生労働大臣の免許を受けて、保健師の名称を用いて、保健指導に従事することを業とする者。","source":"保健師助産師看護師法 第2条","links":[{"title":"e-Gov｜保助看法","url":"https://elaws.e-gov.go.jp/document?lawid=323AC0000000203"},{"title":"e-Gov法令検索（法令横断検索）","url":"https://elaws.e-gov.go.jp/"}],"type":"過去問系"},{"id":35,"category":"関係法規","question":"保健師の守秘義務について正しいのはどれか。","choices":["業務終了後は守秘義務はない","保健師助産師看護師法に基づき業務上知り得た秘密を漏らしてはならない（退職後も）","本人同意があれば自由に開示できる","守秘義務違反でも罰則はない"],"answer":1,"explanation":"保助看法第42条の2により、保健師は正当な理由なく業務上知り得た人の秘密を漏らしてはならない。退職後も同様で、違反時は罰則あり（6月以下懲役または10万円以下罰金）。","source":"保健師助産師看護師法 第42条の2","links":[{"title":"e-Gov｜保助看法","url":"https://elaws.e-gov.go.jp/document?lawid=323AC0000000203"},{"title":"e-Gov法令検索（法令横断検索）","url":"https://elaws.e-gov.go.jp/"}],"type":"過去問系"},{"id":36,"category":"保健医療福祉行政論","question":"健康増進法に基づく特定給食施設の届出先はどこか。","choices":["市町村","都道府県知事（保健所）","厚生労働大臣","労働基準監督署"],"answer":1,"explanation":"健康増進法第20条に基づき、特定給食施設（継続的に1回100食以上または1日250食以上提供する施設）を設置した者は都道府県知事（保健所）に届け出る。","source":"健康増進法 第20条","links":[{"title":"e-Gov｜健康増進法","url":"https://elaws.e-gov.go.jp/document?lawid=414AC0000000103"},{"title":"厚労省｜地域保健の推進","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/tiiki/index.html"}],"type":"過去問系"},{"id":37,"category":"保健医療福祉行政論","question":"難病法（難病の患者に対する医療等に関する法律）における指定難病の医療費助成の窓口はどこか。","choices":["市町村","保健所（都道府県・指定都市等）","国保連合会","厚生労働省"],"answer":1,"explanation":"指定難病の医療費助成（特定医療費）の申請窓口は、患者の住所地を管轄する保健所。広島市では各区保健センター/保健所が受付。","source":"難病法 第5条","links":[{"title":"e-Gov｜難病法","url":"https://elaws.e-gov.go.jp/document?lawid=426AC0000000050"},{"title":"厚労省｜地域保健の推進","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/tiiki/index.html"}],"type":"過去問系"},{"id":38,"category":"感染症","question":"結核患者の管理として保健所が行う家族・接触者健診の根拠はどれか。","choices":["感染症法 第17条（健康診断）","結核予防法（廃止済）","労働安全衛生法","学校保健安全法"],"answer":0,"explanation":"結核予防法は2007年に感染症法に統合された。感染症法第17条に基づき、保健所長は接触者に対する健康診断を勧告・実施できる。","source":"感染症法 第17条","links":[{"title":"e-Gov｜感染症法","url":"https://elaws.e-gov.go.jp/document?lawid=410AC0000000114"},{"title":"国立感染症研究所（NIID）","url":"https://www.niid.go.jp/niid/ja/"}],"type":"過去問系"},{"id":39,"category":"感染症","question":"HIV感染者の支援において保健所の役割として正しいのはどれか。","choices":["強制的な入院措置","匿名・無料のHIV検査と相談","感染者リストの公開","就業制限"],"answer":1,"explanation":"保健所はHIV検査を匿名・無料で実施し、相談・支援を行う。感染症法上、HIVは5類で人権配慮が特に重視される。","source":"後天性免疫不全症候群に関する特定感染症予防指針","links":[{"title":"国立感染症研究所（NIID）","url":"https://www.niid.go.jp/niid/ja/"}],"type":"過去問系"},{"id":40,"category":"疫学","question":"スクリーニング検査の感度の定義として正しいのはどれか。","choices":["疾病ありの中で検査陽性となる割合","疾病なしの中で検査陰性となる割合","陽性者の中で疾病ありの割合","陰性者の中で疾病なしの割合"],"answer":0,"explanation":"感度＝真陽性／（真陽性＋偽陰性）。疾病ありを正しく陽性と判定する割合。特異度は疾病なしを正しく陰性と判定する割合。","source":"疫学テキスト","type":"過去問系","links":[{"title":"国立感染症研究所｜疫学","url":"https://www.niid.go.jp/niid/ja/diseases.html"}]},{"id":41,"category":"疫学","question":"陽性反応的中度（陽性予測値）に最も影響を与える要因はどれか。","choices":["対象集団における疾病の有病率","検査者の経験年数","検査時刻","対象者の年齢層のみ"],"answer":0,"explanation":"陽性反応的中度＝真陽性／検査陽性者総数。同じ感度・特異度でも、有病率が低いと偽陽性割合が増え陽性反応的中度は低下する。","source":"疫学テキスト","type":"過去問系","links":[{"title":"国立感染症研究所｜疫学","url":"https://www.niid.go.jp/niid/ja/diseases.html"}]},{"id":42,"category":"保健統計学","question":"「健康寿命」の定義として正しいのはどれか。","choices":["平均寿命と同じ","日常生活に制限のない期間の平均","65歳以上の生存期間","病気に罹患しない期間"],"answer":1,"explanation":"健康寿命は「日常生活に制限のない期間の平均」（国民生活基礎調査の主観的健康度から算出）。健康日本21の主要指標。","source":"厚労省 健康寿命の指標","type":"過去問系","links":[{"title":"厚労省｜人口動態統計","url":"https://www.mhlw.go.jp/toukei/list/81-1a.html"}]},{"id":43,"category":"保健統計学","question":"我が国の死因の第1位は近年継続して何か。","choices":["心疾患","脳血管疾患","悪性新生物（がん）","肺炎"],"answer":2,"explanation":"1981年以降、悪性新生物が死因第1位を継続。第2位は心疾患、第3位は近年は老衰となる年が続く（人口動態統計）。","source":"人口動態統計","type":"過去問系","links":[{"title":"厚労省｜人口動態統計","url":"https://www.mhlw.go.jp/toukei/list/81-1a.html"}]},{"id":44,"category":"成人・高齢者保健","question":"認知症施策推進大綱の基本的な考え方として正しいのはどれか。","choices":["施設入所の促進","共生と予防","薬物治療の徹底","家族介護の徹底"],"answer":1,"explanation":"2019年策定の認知症施策推進大綱は「共生」と「予防」を車の両輪としている。地域共生社会の実現が方向性。","source":"認知症施策推進大綱","links":[{"title":"厚労省｜認知症施策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000076236.html"},{"title":"厚労省｜生活習慣病対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/seikatsu/index.html"}],"type":"過去問系"},{"id":45,"category":"成人・高齢者保健","question":"フレイル（虚弱）の概念として正しいのはどれか。","choices":["要介護状態","健康と要介護の中間で可逆的な状態","認知症の初期段階のみ","若年者にも該当する栄養障害"],"answer":1,"explanation":"フレイルは加齢に伴う心身機能低下で、健康と要介護の中間に位置し、適切な介入で可逆的に健康側に戻れる状態。","source":"日本老年医学会","type":"過去問系","links":[{"title":"厚労省｜生活習慣病対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/seikatsu/index.html"}]},{"id":46,"category":"精神保健","question":"精神障害者保健福祉手帳の交付主体はどれか。","choices":["市町村","都道府県知事・指定都市市長","保健所長","厚生労働大臣"],"answer":1,"explanation":"精神保健福祉法第45条により、精神障害者保健福祉手帳は都道府県知事（指定都市は市長）が交付。広島市は政令指定都市のため広島市長が交付。","source":"精神保健福祉法 第45条","links":[{"title":"e-Gov｜精神保健福祉法","url":"https://elaws.e-gov.go.jp/document?lawid=325AC0000000123"},{"title":"厚労省｜精神保健福祉対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/hukushi_kaigo/shougaishahukushi/seishin/index.html"}],"type":"過去問系"},{"id":47,"category":"精神保健","question":"アウトリーチ（多職種チームによる訪問支援）の主たる対象として最も適切なのはどれか。","choices":["精神医療を中断・未受療の精神障害者","認知症高齢者全員","全ての一人暮らし","健康な妊婦"],"answer":0,"explanation":"精神障害者アウトリーチ事業は、医療中断・未受療者等を多職種チームで訪問し継続的支援を行う事業。","source":"精神障害者アウトリーチ推進事業","type":"過去問系","links":[{"title":"厚労省｜精神保健福祉対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/hukushi_kaigo/shougaishahukushi/seishin/index.html"}]},{"id":48,"category":"産業保健","question":"THP（トータル・ヘルスプロモーション・プラン）の根拠法はどれか。","choices":["労働基準法","労働安全衛生法","健康保険法","高齢者医療確保法"],"answer":1,"explanation":"THPは労働安全衛生法第69条（事業者の健康保持増進努力義務）に基づき推進される、職場における労働者の心身両面にわたる健康保持増進措置。","source":"労働安全衛生法 第69条","links":[{"title":"e-Gov｜労働安全衛生法","url":"https://elaws.e-gov.go.jp/document?lawid=347AC0000000057"},{"title":"産業保健総合支援センター（JOHAS）","url":"https://www.johas.go.jp/"}],"type":"過去問系"},{"id":49,"category":"学校保健","question":"学校保健安全法に基づく学校環境衛生基準を定めるのは誰か。","choices":["校長","学校医","文部科学大臣","都道府県教育委員会"],"answer":2,"explanation":"学校保健安全法第6条により、文部科学大臣は学校環境衛生基準を定める。学校設置者・校長はこの基準に基づき環境衛生の維持に努める。","source":"学校保健安全法 第6条","links":[{"title":"e-Gov｜学校保健安全法","url":"https://elaws.e-gov.go.jp/document?lawid=333AC0000000056"},{"title":"文科省｜学校保健","url":"https://www.mext.go.jp/a_menu/kenko/hoken/index.htm"}],"type":"過去問系"},{"id":50,"category":"公衆衛生看護学","question":"ハイリスクアプローチとポピュレーションアプローチの組合せで適切な活用例はどれか。","choices":["両者を独立に運用する","ハイリスク：個別の特定保健指導／ポピュレーション：地域全体の健康教育","ハイリスクは不要","ポピュレーションは医療機関のみ"],"answer":1,"explanation":"ハイリスクアプローチは高リスク者への集中介入（特定保健指導等）、ポピュレーションアプローチは集団全体への働きかけ（健康教育・環境整備）。両者の組合せが効果的。","source":"公衆衛生看護学テキスト","type":"過去問系","links":[{"title":"日本公衆衛生看護学会","url":"https://japhn.jp/"}]},{"id":51,"category":"公衆衛生看護学","question":"災害時の保健師活動として、急性期（発災〜72時間）に最も優先される活動はどれか。","choices":["長期的な復興計画の策定","避難所のアセスメントと要配慮者の安否確認・救護","個別の心のケアの開始","通常事業の再開"],"answer":1,"explanation":"急性期は人命救助を支援し、避難所アセスメント、要配慮者（妊産婦・乳幼児・高齢者・障害者・難病等）の安否確認と緊急ニーズへの対応が優先。","source":"災害時保健活動マニュアル","type":"過去問系","links":[{"title":"日本公衆衛生看護学会","url":"https://japhn.jp/"}]},{"id":52,"category":"保健医療福祉行政論","question":"ソーシャル・キャピタルの概念として正しいのはどれか。","choices":["金融資本","信頼・規範・ネットワークなど社会関係資本","人的資源（労働力）","公共インフラ"],"answer":1,"explanation":"ソーシャル・キャピタル（社会関係資本）は信頼・互酬性の規範・ネットワークを指し、健康指標との関連が示されている。地域保健活動の重要概念。","source":"地域保健対策の推進に関する基本的な指針","type":"過去問系","links":[{"title":"厚労省｜地域保健の推進","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/tiiki/index.html"}]},{"id":53,"category":"栄養・健康教育","question":"食育基本法の主たる所管庁はどれか。","choices":["厚生労働省","農林水産省","文部科学省","内閣府（こども家庭庁）"],"answer":1,"explanation":"食育基本法は内閣府所管で発足したが、現在は農林水産省が中心となり食育推進基本計画を推進している（食育推進会議は農水大臣が会長）。","source":"食育基本法・食育推進基本計画","type":"過去問系","links":[{"title":"厚労省｜栄養・食生活","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/eiyou/index.html"}]},{"id":54,"category":"母子保健","question":"産後ケア事業（母子保健法第17条の2）の対象として正しいのはどれか。","choices":["全ての妊婦","産後1年を経過しない女子・乳児で支援が必要な者","未就学児全員","妊娠を希望する女性のみ"],"answer":1,"explanation":"母子保健法第17条の2に基づき、産後1年を経過しない女子およびその乳児であって、心身の状態に応じた支援が必要な者が対象。市町村事業。","source":"母子保健法 第17条の2","links":[{"title":"e-Gov｜母子保健法","url":"https://elaws.e-gov.go.jp/document?lawid=340AC0000000141"},{"title":"こども家庭庁｜母子保健","url":"https://www.cfa.go.jp/policies/boshi-hoken/"}],"type":"過去問系"},{"id":55,"category":"母子保健","question":"児童虐待防止法における「児童」の年齢として正しいのはどれか。","choices":["12歳未満","15歳未満","18歳未満","20歳未満"],"answer":2,"explanation":"児童虐待の防止等に関する法律第2条により、児童とは18歳に満たない者をいう。","source":"児童虐待の防止等に関する法律 第2条","links":[{"title":"e-Gov｜児童虐待防止法","url":"https://elaws.e-gov.go.jp/document?lawid=412AC1000000082"},{"title":"こども家庭庁｜母子保健","url":"https://www.cfa.go.jp/policies/boshi-hoken/"}],"type":"過去問系"},{"id":56,"category":"母子保健","question":"児童虐待を発見した者の通告先として正しいのはどれか。","choices":["児童相談所・市町村・福祉事務所","警察のみ","学校のみ","保健所のみ"],"answer":0,"explanation":"児童虐待防止法第6条により、児童虐待を受けたと思われる児童を発見した者は、児童相談所・市町村・福祉事務所等へ速やかに通告する義務がある。","source":"児童虐待の防止等に関する法律 第6条","links":[{"title":"e-Gov｜児童虐待防止法","url":"https://elaws.e-gov.go.jp/document?lawid=412AC1000000082"},{"title":"こども家庭庁｜母子保健","url":"https://www.cfa.go.jp/policies/boshi-hoken/"}],"type":"過去問系"},{"id":57,"category":"感染症","question":"HPVワクチンに関して正しいのはどれか。","choices":["任意接種のみ","予防接種法A類疾病として定期接種（小学6年〜高校1年相当の女子）","男性は接種できない","65歳以上が対象"],"answer":1,"explanation":"HPVワクチンは予防接種法A類疾病で、小学6年〜高校1年相当の女子が定期接種対象。キャッチアップ接種も実施されている（経過措置）。男性も任意接種可能。","source":"予防接種法施行令","links":[{"title":"e-Gov｜予防接種法","url":"https://elaws.e-gov.go.jp/document?lawid=323AC0000000068"},{"title":"国立感染症研究所（NIID）","url":"https://www.niid.go.jp/niid/ja/"}],"type":"過去問系"},{"id":58,"category":"感染症","question":"新型インフルエンザ等対策特別措置法における新型インフルエンザ等緊急事態宣言を行うのは誰か。","choices":["都道府県知事","厚生労働大臣","内閣総理大臣","WHO事務局長"],"answer":2,"explanation":"特措法第32条により、内閣総理大臣が緊急事態宣言を発出する。COVID-19でも同様の枠組みが用いられた。","source":"新型インフルエンザ等対策特別措置法 第32条","type":"過去問系","links":[{"title":"国立感染症研究所（NIID）","url":"https://www.niid.go.jp/niid/ja/"}]},{"id":59,"category":"公衆衛生看護学","question":"プリシード・プロシードモデルの第1段階「社会アセスメント」で行うことはどれか。","choices":["疫学的データ分析","対象集団の生活の質（QOL）の把握","プログラム実施","予算策定"],"answer":1,"explanation":"プリシード・プロシードモデルの第1段階は社会アセスメントで、対象集団のQOLや主観的ニーズを把握する。健康教育・ヘルスプロモーション計画の枠組み。","source":"Green LW. プリシード・プロシードモデル","type":"過去問系","links":[{"title":"日本公衆衛生看護学会","url":"https://japhn.jp/"}]},{"id":60,"category":"公衆衛生看護学","question":"保健師の活動展開で「個別支援から地域支援へ」の意味として最も適切なのはどれか。","choices":["個別支援を廃止する","個別事例から地域の共通課題を抽出し、施策化・組織化につなげる","個別支援は他職種に移管する","地域は二次的な対象"],"answer":1,"explanation":"保健師活動の特徴は、個別事例から地域の課題を抽出し、ポピュレーションアプローチや施策化につなげる「個と地域の循環」にある。","source":"地域における保健師の保健活動について（厚労省通知）","type":"過去問系","links":[{"title":"日本公衆衛生看護学会","url":"https://japhn.jp/"}]},{"id":61,"category":"教養_憲法","question":"日本国憲法第25条で規定されている権利はどれか。","choices":["教育を受ける権利","生存権（健康で文化的な最低限度の生活を営む権利）","労働基本権","財産権"],"answer":1,"explanation":"憲法第25条第1項は「すべて国民は、健康で文化的な最低限度の生活を営む権利を有する」と生存権を規定。第2項で国の社会保障・公衆衛生の向上義務を定める。","source":"日本国憲法 第25条","links":[{"title":"e-Gov｜日本国憲法","url":"https://elaws.e-gov.go.jp/document?lawid=321CONSTITUTION"}],"type":"予想問題"},{"id":62,"category":"教養_憲法","question":"憲法改正の発議に必要な要件として正しいのはどれか。","choices":["衆参各院の出席議員の過半数","衆参各院の総議員の3分の2以上","国民投票での過半数のみ","内閣の閣議決定"],"answer":1,"explanation":"憲法第96条により、各議院の総議員の3分の2以上の賛成で国会が発議し、国民投票で過半数の賛成により成立する。","source":"日本国憲法 第96条","links":[{"title":"e-Gov｜日本国憲法","url":"https://elaws.e-gov.go.jp/document?lawid=321CONSTITUTION"}],"type":"予想問題"},{"id":63,"category":"教養_地方自治","question":"地方公務員法における服務の根本基準として規定されているのはどれか。","choices":["全体の奉仕者として公共の利益のために勤務する","上司の命令に絶対服従する","営利企業に従事してよい","政治活動の自由がある"],"answer":0,"explanation":"地方公務員法第30条により「すべて職員は、全体の奉仕者として公共の利益のために勤務し、且つ、職務の遂行に当つては、全力を挙げてこれに専念しなければならない」。","source":"地方公務員法 第30条","links":[{"title":"e-Gov｜地方公務員法","url":"https://elaws.e-gov.go.jp/document?lawid=325AC0000000261"},{"title":"総務省｜地方自治","url":"https://www.soumu.go.jp/main_sosiki/jichi_gyousei/bunken/index.html"}],"type":"予想問題"},{"id":64,"category":"教養_地方自治","question":"地方公務員の三大義務として誤っているのはどれか。","choices":["法令等及び上司の職務上の命令に従う義務","信用失墜行為の禁止","守秘義務","営利企業従事の自由"],"answer":3,"explanation":"地方公務員には「営利企業等への従事制限」（地公法第38条）があり自由ではない。三大義務には法令遵守、信用失墜行為禁止、秘密を守る義務、職務専念義務、政治的行為の制限等が含まれる。","source":"地方公務員法 第30条〜第38条","links":[{"title":"e-Gov｜地方公務員法","url":"https://elaws.e-gov.go.jp/document?lawid=325AC0000000261"},{"title":"総務省｜地方自治","url":"https://www.soumu.go.jp/main_sosiki/jichi_gyousei/bunken/index.html"}],"type":"予想問題"},{"id":65,"category":"教養_地方自治","question":"政令指定都市の要件として正しいのはどれか。","choices":["人口20万以上","人口50万以上で政令で指定","人口100万以上必須","都道府県と同格"],"answer":1,"explanation":"地方自治法第252条の19により、政令指定都市は人口50万以上の市のうち政令で指定されたもの。広島市は1980年に指定。事務権限は都道府県に近い。","source":"地方自治法 第252条の19","links":[{"title":"e-Gov｜地方自治法","url":"https://elaws.e-gov.go.jp/document?lawid=322AC0000000067"},{"title":"総務省｜地方自治","url":"https://www.soumu.go.jp/main_sosiki/jichi_gyousei/bunken/index.html"}],"type":"予想問題"},{"id":66,"category":"教養_時事広島","question":"広島市の行政区数として正しいのはどれか。","choices":["6区","7区","8区","9区"],"answer":2,"explanation":"広島市は中区・東区・南区・西区・安佐南区・安佐北区・安芸区・佐伯区の8区から構成される政令指定都市。","source":"広島市公式サイト","type":"予想問題","links":[{"title":"広島市公式サイト","url":"https://www.city.hiroshima.lg.jp/"}]},{"id":67,"category":"教養_時事広島","question":"広島市の健康増進計画として正しいのはどれか。","choices":["健康ひろしま21","健康にっぽん広島版","ひろしま健康宣言","広島健康100"],"answer":0,"explanation":"広島市は健康増進法に基づき「健康ひろしま21」を策定し、健康寿命の延伸・生活習慣病予防等を推進している。面接で頻出。","source":"広島市公式サイト","type":"予想問題","links":[{"title":"広島市公式サイト","url":"https://www.city.hiroshima.lg.jp/"}]},{"id":68,"category":"教養_時事広島","question":"広島市の保健所設置として正しいのはどれか。","choices":["保健所は設置していない","市内に1か所のみ","政令指定都市として保健所を設置（各区に保健センター）","広島県の保健所を共有"],"answer":2,"explanation":"広島市は政令指定都市として広島市保健所を設置し、各区に保健センター（保健所支所）を置いて住民に身近な対人保健サービスを提供している。","source":"広島市公式サイト","type":"予想問題","links":[{"title":"広島市公式サイト","url":"https://www.city.hiroshima.lg.jp/"}]},{"id":69,"category":"保健医療福祉行政論","question":"地域保健対策の推進に関する基本的な指針において、保健所の専門的・広域的機能として明記されているのはどれか。","choices":["全住民への個別保健指導","感染症・難病・精神保健など専門的・広域的・技術的拠点","全ての健診の実施","医療提供"],"answer":1,"explanation":"保健所は健康危機管理、感染症、難病、精神保健、HIV/エイズ等、専門的・広域的・技術的拠点として位置付けられる（基本指針）。","source":"地域保健対策の推進に関する基本的な指針","type":"過去問系","links":[{"title":"厚労省｜地域保健の推進","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/tiiki/index.html"}]},{"id":70,"category":"保健医療福祉行政論","question":"ヘルスプロモーション活動における「環境整備」の例として最も適切なのはどれか。","choices":["個別禁煙指導","受動喫煙防止条例の制定","ニコチンパッチの処方","肺がん検診の実施"],"answer":1,"explanation":"受動喫煙防止条例は環境（社会的・物理的）整備によって健康行動を支える典型例。健康増進法も2018年改正で受動喫煙対策を強化。","source":"健康増進法・オタワ憲章","links":[{"title":"e-Gov｜健康増進法","url":"https://elaws.e-gov.go.jp/document?lawid=414AC0000000103"},{"title":"厚労省｜地域保健の推進","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/tiiki/index.html"}],"type":"過去問系"},{"id":71,"category":"母子保健","question":"妊婦健康診査の公費負担回数の標準として正しいのはどれか。","choices":["3回","7回","14回","20回"],"answer":2,"explanation":"厚労省通知により、妊婦健診は14回程度の公費負担が標準。各市町村で受診票を交付する。","source":"妊婦健康診査の公費負担について（厚労省通知）","type":"過去問系","links":[{"title":"こども家庭庁｜母子保健","url":"https://www.cfa.go.jp/policies/boshi-hoken/"}]},{"id":72,"category":"母子保健","question":"産後うつのスクリーニングに広く用いられる尺度はどれか。","choices":["GHQ-12","EPDS（エジンバラ産後うつ病自己評価票）","MMSE","HDS-R"],"answer":1,"explanation":"EPDSは産後うつ病スクリーニング用の自己記入式10項目尺度。9点以上で要注意とされる。産後ケアで広く活用。","source":"産婦健康診査事業ガイドライン","type":"過去問系","links":[{"title":"こども家庭庁｜母子保健","url":"https://www.cfa.go.jp/policies/boshi-hoken/"}]},{"id":73,"category":"成人・高齢者保健","question":"がん検診の指針で示されている対策型検診の対象がんとして誤っているのはどれか。","choices":["胃がん","肺がん","前立腺がん","大腸がん"],"answer":2,"explanation":"対策型検診（住民検診）の対象は胃・肺・大腸・乳・子宮頸の5がん。前立腺がん（PSA検診）は対策型検診として推奨されていない。","source":"がん予防重点健康教育及びがん検診実施のための指針","type":"過去問系","links":[{"title":"厚労省｜生活習慣病対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/seikatsu/index.html"}]},{"id":74,"category":"成人・高齢者保健","question":"子宮頸がん検診の対象年齢・間隔として正しいのはどれか（対策型）。","choices":["20歳以上・2年に1回","30歳以上・1年に1回","40歳以上・2年に1回","50歳以上・1年に1回"],"answer":0,"explanation":"対策型の子宮頸がん検診は20歳以上の女性を対象に2年に1回、視診・細胞診・内診（必要時）。HPV検査単独法も導入が進む。","source":"がん検診実施のための指針","type":"過去問系","links":[{"title":"厚労省｜生活習慣病対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/seikatsu/index.html"}]},{"id":75,"category":"感染症","question":"5類感染症のうち全数把握の対象となるのはどれか。","choices":["インフルエンザ（季節性）","麻しん","感染性胃腸炎","RSウイルス感染症"],"answer":1,"explanation":"5類のうち麻しん、風しん、AIDS、梅毒、CJD等は全数把握対象。インフルエンザ・感染性胃腸炎・RSウイルス感染症は定点把握。","source":"感染症法施行規則","links":[{"title":"e-Gov｜感染症法","url":"https://elaws.e-gov.go.jp/document?lawid=410AC0000000114"},{"title":"国立感染症研究所（NIID）","url":"https://www.niid.go.jp/niid/ja/"}],"type":"過去問系"},{"id":76,"category":"栄養・健康教育","question":"日本人の食事摂取基準（2025年版）で示される指標に含まれないのはどれか。","choices":["推定平均必要量（EAR）","推奨量（RDA）","目安量（AI）","中央値（Median）"],"answer":3,"explanation":"食事摂取基準で用いられる指標はEAR・RDA・AI・耐容上限量（UL）・目標量（DG）。中央値は指標ではない。","source":"日本人の食事摂取基準（2025年版）","type":"過去問系","links":[{"title":"厚労省｜栄養・食生活","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/eiyou/index.html"}]},{"id":77,"category":"栄養・健康教育","question":"健康日本21（第三次）における主要目標として正しいのはどれか。","choices":["医療費の半減","健康寿命の延伸と健康格差の縮小","高齢化率の抑制","出生率の倍増"],"answer":1,"explanation":"健康日本21（第三次）の主要目標は健康寿命の延伸と健康格差の縮小。生活習慣の改善・社会環境整備・ライフコースアプローチを柱とする。","source":"健康日本21（第三次）","links":[{"title":"厚労省｜健康日本21(第三次)","url":"https://www.mhlw.go.jp/stf/kenkounippon21_00006.html"},{"title":"厚労省｜栄養・食生活","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/eiyou/index.html"}],"type":"過去問系"},{"id":78,"category":"保健医療福祉行政論","question":"国民健康保険の保険者として正しい組合せはどれか。","choices":["市町村と国保組合","都道府県と市町村（共同運営）と国保組合","国のみ","健康保険組合"],"answer":1,"explanation":"2018年度から国保は都道府県が財政運営の責任主体となり、市町村と共同で保険者となる方式へ。国保組合（業種別）も保険者。","source":"国民健康保険法","type":"過去問系","links":[{"title":"厚労省｜地域保健の推進","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/tiiki/index.html"}]},{"id":79,"category":"保健医療福祉行政論","question":"後期高齢者医療制度の運営主体はどれか。","choices":["市町村","都道府県","後期高齢者医療広域連合（都道府県単位）","国"],"answer":2,"explanation":"高齢者の医療の確保に関する法律に基づき、各都道府県の全市町村が加入する後期高齢者医療広域連合が運営。75歳以上が対象。","source":"高齢者の医療の確保に関する法律","links":[{"title":"e-Gov｜高齢者医療確保法","url":"https://elaws.e-gov.go.jp/document?lawid=357AC0000000080"},{"title":"厚労省｜地域保健の推進","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/tiiki/index.html"}],"type":"過去問系"},{"id":80,"category":"精神保健","question":"措置入院の決定権者として正しいのはどれか。","choices":["精神保健指定医","都道府県知事（指定都市市長）","家族","市町村長"],"answer":1,"explanation":"精神保健福祉法第29条により、2人以上の精神保健指定医の診察結果が一致した場合、都道府県知事（指定都市は市長）が措置入院を決定する。","source":"精神保健福祉法 第29条","links":[{"title":"e-Gov｜精神保健福祉法","url":"https://elaws.e-gov.go.jp/document?lawid=325AC0000000123"},{"title":"厚労省｜精神保健福祉対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/hukushi_kaigo/shougaishahukushi/seishin/index.html"}],"type":"過去問系"},{"id":81,"category":"学校保健","question":"学校における健康診断の実施主体（実施義務者）はどれか。","choices":["保健所","学校（学校設置者）","市町村","都道府県教育委員会"],"answer":1,"explanation":"学校保健安全法第13条により、学校においては毎学年定期に児童生徒等の健康診断を行わなければならない（実施義務は学校）。","source":"学校保健安全法 第13条","links":[{"title":"e-Gov｜学校保健安全法","url":"https://elaws.e-gov.go.jp/document?lawid=333AC0000000056"},{"title":"文科省｜学校保健","url":"https://www.mext.go.jp/a_menu/kenko/hoken/index.htm"}],"type":"過去問系"},{"id":82,"category":"産業保健","question":"労働安全衛生法に基づく一般健康診断の実施頻度として正しいのはどれか（定期健診）。","choices":["3か月ごと","6か月ごと","1年以内ごとに1回","2年に1回"],"answer":2,"explanation":"労働安全衛生規則第44条により、事業者は常時使用する労働者に対し、1年以内ごとに1回、定期健康診断を実施する。","source":"労働安全衛生規則 第44条","links":[{"title":"産業保健総合支援センター（JOHAS）","url":"https://www.johas.go.jp/"}],"type":"過去問系"},{"id":83,"category":"公衆衛生看護学","question":"事例検討（ケースカンファレンス）の主な目的として最も適切なのはどれか。","choices":["責任者を特定する","多職種で支援方針を共有しケアの質を高める","個人情報の公開","業績評価"],"answer":1,"explanation":"事例検討は多職種が参加して情報を共有し、支援目標・方針を一緒に考えることでケアの質向上・関係機関連携の強化を図る。","source":"公衆衛生看護学テキスト","type":"過去問系","links":[{"title":"日本公衆衛生看護学会","url":"https://japhn.jp/"}]},{"id":84,"category":"保健医療福祉行政論","question":"障害者総合支援法における自立支援医療に含まれないのはどれか。","choices":["精神通院医療","更生医療","育成医療","老人医療"],"answer":3,"explanation":"自立支援医療は精神通院医療・更生医療（身体障害者）・育成医療（児童）の3つ。老人医療は含まれない。","source":"障害者総合支援法","links":[{"title":"e-Gov｜障害者総合支援法","url":"https://elaws.e-gov.go.jp/document?lawid=417AC0000000123"},{"title":"厚労省｜地域保健の推進","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/tiiki/index.html"}],"type":"過去問系"},{"id":85,"category":"教養_時事広島","question":"広島市が中核となって策定する地域医療構想の単位として正しいのはどれか。","choices":["市町村単位","二次医療圏（広島市は広島医療圏）","学校区単位","全国一律"],"answer":1,"explanation":"地域医療構想は二次医療圏単位で策定。広島市は広島医療圏に属し、広島県が地域医療構想を策定している。","source":"医療法・地域医療構想","type":"予想問題","links":[{"title":"広島市公式サイト","url":"https://www.city.hiroshima.lg.jp/"}]},{"id":86,"category":"公衆衛生看護学","question":"保健事業評価のうち「アウトカム評価」に該当するのはどれか。","choices":["参加者数","実施回数","健康状態の改善（健診値の変化等）","職員配置数"],"answer":2,"explanation":"ストラクチャ（構造）・プロセス（過程）・アウトプット（実施量）・アウトカム（成果＝健康状態や行動の変化）。健康指標の変化はアウトカム。","source":"保健事業評価の枠組み","type":"過去問系","links":[{"title":"日本公衆衛生看護学会","url":"https://japhn.jp/"}]},{"id":87,"category":"母子保健","question":"発達障害者支援法における発達障害に含まれないのはどれか。","choices":["自閉スペクトラム症","学習障害","注意欠如・多動症","統合失調症"],"answer":3,"explanation":"発達障害者支援法第2条で発達障害は自閉症・アスペルガー症候群その他の広汎性発達障害、学習障害、注意欠陥多動性障害等とされる。統合失調症は含まれない。","source":"発達障害者支援法 第2条","links":[{"title":"e-Gov｜発達障害者支援法","url":"https://elaws.e-gov.go.jp/document?lawid=416AC1000000167"},{"title":"こども家庭庁｜母子保健","url":"https://www.cfa.go.jp/policies/boshi-hoken/"}],"type":"過去問系"},{"id":88,"category":"母子保健","question":"こども家庭庁の設置年はどれか。","choices":["2018年","2021年","2023年","2025年"],"answer":2,"explanation":"こども家庭庁は2023年4月に内閣府の外局として設置され、こども政策を一元的に担う。母子保健の国レベル所管も同庁に移管された部分が多い。","source":"こども家庭庁設置法","type":"過去問系","links":[{"title":"こども家庭庁｜母子保健","url":"https://www.cfa.go.jp/policies/boshi-hoken/"}]},{"id":89,"category":"感染症","question":"麻しんの感染経路として最も適切なのはどれか。","choices":["接触感染のみ","空気・飛沫・接触感染（感染力が極めて強い）","経口感染","媒介動物による感染"],"answer":1,"explanation":"麻しんウイルスは空気感染するためマスクのみでは防げず、感染力は極めて強い。基本再生産数R0は12〜18とされる。","source":"感染症発生動向調査","links":[{"title":"国立感染症研究所（NIID）","url":"https://www.niid.go.jp/niid/ja/"}],"type":"過去問系"},{"id":90,"category":"疫学","question":"ある検診で感度95%・特異度90%、有病率1%のとき陽性予測値（PPV）は概ねどれか。","choices":["約9%","約25%","約50%","約90%"],"answer":0,"explanation":"10000人で疾病あり100人、なし9900人。真陽性=100×0.95=95、偽陽性=9900×0.10=990。PPV=95/(95+990)≒8.8%。低有病率では特異度が低いとPPVが大きく低下する例。","source":"疫学テキスト","type":"過去問系","links":[{"title":"国立感染症研究所｜疫学","url":"https://www.niid.go.jp/niid/ja/diseases.html"}]},{"id":91,"category":"保健統計学","question":"周産期死亡の定義として正しいのはどれか。","choices":["妊娠12週以後の死産＋早期新生児死亡","妊娠22週以後の死産＋早期新生児死亡（生後1週未満）","出生〜1歳までの死亡","妊娠全期間の死産"],"answer":1,"explanation":"周産期死亡＝妊娠22週以後の死産＋早期新生児死亡（生後1週未満）。日本は周産期死亡率が世界で最も低い国の一つ。","source":"人口動態統計","type":"過去問系","links":[{"title":"厚労省｜人口動態統計","url":"https://www.mhlw.go.jp/toukei/list/81-1a.html"}]},{"id":92,"category":"保健統計学","question":"乳児死亡率の分母として正しいのはどれか。","choices":["年間総人口（千対）","年間出生数（千対）","1歳未満人口（千対）","妊娠数（千対）"],"answer":1,"explanation":"乳児死亡率＝（年間の生後1年未満の死亡数／年間出生数）×1000。日本は世界トップクラスに低い（約1.7前後）。","source":"人口動態統計","type":"過去問系","links":[{"title":"厚労省｜人口動態統計","url":"https://www.mhlw.go.jp/toukei/list/81-1a.html"}]},{"id":93,"category":"成人・高齢者保健","question":"認知症の中核症状に含まれるのはどれか。","choices":["記憶障害・見当識障害・実行機能障害","幻覚・妄想","抑うつ・不安","徘徊・暴言"],"answer":0,"explanation":"中核症状は脳機能障害に直結する症状（記憶障害・見当識障害・実行機能障害・失語・失行・失認）。BPSD（行動・心理症状）は周辺症状。","source":"認知症疾患診療ガイドライン","links":[{"title":"厚労省｜認知症施策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000076236.html"},{"title":"厚労省｜生活習慣病対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/seikatsu/index.html"}],"type":"過去問系"},{"id":94,"category":"公衆衛生看護学","question":"保健師活動指針（地域における保健師の保健活動について）に示されている基本的方向性として誤っているのはどれか。","choices":["地域診断に基づく事業の企画・立案・評価","個別支援と地域支援の循環","施策化の推進","個別事例のみへの対応に専念"],"answer":3,"explanation":"保健師活動指針は個別支援と地域支援の循環、地域診断、PDCA、施策化、健康危機管理等を示す。個別対応のみは誤り。","source":"地域における保健師の保健活動について（厚労省通知）","type":"過去問系","links":[{"title":"日本公衆衛生看護学会","url":"https://japhn.jp/"}]},{"id":95,"category":"関係法規","question":"個人情報保護法に基づき要配慮個人情報に該当するのはどれか。","choices":["氏名と住所","病歴・健康診断結果","電話番号","勤務先"],"answer":1,"explanation":"個人情報保護法第2条第3項により、人種・信条・社会的身分・病歴・犯罪歴・障害・健康診断結果等は要配慮個人情報。原則本人同意が必要。","source":"個人情報保護法 第2条","links":[{"title":"e-Gov｜個人情報保護法","url":"https://elaws.e-gov.go.jp/document?lawid=415AC0000000057"},{"title":"e-Gov法令検索（法令横断検索）","url":"https://elaws.e-gov.go.jp/"}],"type":"過去問系"},{"id":96,"category":"教養_憲法","question":"日本国憲法に規定されている「公共の福祉」による制約を最も受けやすい権利はどれか。","choices":["思想・良心の自由（内心）","経済的自由（営業の自由等）","信教の自由（内心）","学問の自由"],"answer":1,"explanation":"経済的自由は社会経済政策上の規制を受けやすく、判例上も精神的自由より緩やかな審査基準（合理性の基準等）が用いられる傾向。","source":"憲法判例","type":"予想問題","links":[{"title":"e-Gov｜日本国憲法","url":"https://elaws.e-gov.go.jp/document?lawid=321CONSTITUTION"}]},{"id":97,"category":"教養_地方自治","question":"地方自治法における直接請求のうち、有権者の3分の1以上の署名を要するのはどれか。","choices":["条例の制定改廃請求","事務監査請求","議会の解散請求・議員首長の解職請求","予算の修正請求"],"answer":2,"explanation":"条例制定改廃・事務監査は50分の1以上、議会解散・議員/首長の解職（リコール）は原則3分の1以上の署名が必要。","source":"地方自治法 第74条〜第85条","links":[{"title":"e-Gov｜地方自治法","url":"https://elaws.e-gov.go.jp/document?lawid=322AC0000000067"},{"title":"総務省｜地方自治","url":"https://www.soumu.go.jp/main_sosiki/jichi_gyousei/bunken/index.html"}],"type":"予想問題"},{"id":98,"category":"教養_時事広島","question":"広島市の人口規模として最も近いのはどれか（2026年時点）。","choices":["約60万人","約100万人","約120万人","約200万人"],"answer":2,"explanation":"広島市の人口は約118〜120万人で推移。中国地方最大の都市で、政令指定都市の中位規模。","source":"広島市統計","type":"予想問題","links":[{"title":"広島市公式サイト","url":"https://www.city.hiroshima.lg.jp/"}]},{"id":99,"category":"公衆衛生看護学","question":"保健師が地区組織活動を支援する目的として最も適切なのはどれか。","choices":["保健師の業務軽減のため","住民の主体性・エンパワメントを高め、地域の健康課題解決力を育てる","イベント開催のため","予算消化のため"],"answer":1,"explanation":"地区組織活動支援は住民のエンパワメントと地域の健康課題解決力（ソーシャル・キャピタル）を高めることを目的とする。","source":"公衆衛生看護学テキスト","type":"過去問系","links":[{"title":"日本公衆衛生看護学会","url":"https://japhn.jp/"}]},{"id":100,"category":"保健医療福祉行政論","question":"公衆衛生における三次予防として最も適切なのはどれか。","choices":["予防接種","がん検診による早期発見","リハビリテーション・社会復帰","健康教育"],"answer":2,"explanation":"一次予防＝健康増進・疾病予防（健康教育・予防接種）、二次予防＝早期発見・早期治療（検診）、三次予防＝重症化防止・リハビリ・社会復帰。","source":"公衆衛生学テキスト","type":"過去問系","links":[{"title":"厚労省｜地域保健の推進","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/tiiki/index.html"}]},{"id":101,"category":"母子保健","question":"母子保健法に基づく「健やか親子21（第2次）」の重点課題として明記されているのはどれか。","choices":["高齢者の介護予防","育てにくさを感じる親に寄り添う支援、妊娠期からの切れ目ない支援","成人病予防","がん検診率向上"],"answer":1,"explanation":"健やか親子21（第2次）の重点課題は「育てにくさを感じる親に寄り添う支援」「妊娠期からの児童虐待防止対策」。基盤課題と合わせて推進。","source":"健やか親子21（第2次）","type":"過去問系","links":[{"title":"こども家庭庁｜母子保健","url":"https://www.cfa.go.jp/policies/boshi-hoken/"}]},{"id":102,"category":"精神保健","question":"精神障害にも対応した地域包括ケアシステムの基本的考え方として正しいのはどれか。","choices":["長期入院の継続","医療・障害福祉・介護・住まい・社会参加・地域の助け合いの一体的整備","家族のみによる支援","全国一律のサービス提供"],"answer":1,"explanation":"「にも包括」（精神障害にも対応した地域包括ケアシステム）は、地域社会の一員として安心して自分らしい暮らしができるよう、医療・福祉・住まい・社会参加等を一体的に整備するもの。","source":"精神障害にも対応した地域包括ケアシステム構築事業","type":"過去問系","links":[{"title":"厚労省｜精神保健福祉対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/hukushi_kaigo/shougaishahukushi/seishin/index.html"}]},{"id":103,"category":"産業保健","question":"化学物質取扱事業場における特殊健康診断の実施頻度として正しいのはどれか。","choices":["3年に1回","2年に1回","原則6か月以内ごとに1回（雇入時・配置替え時・定期）","10年に1回"],"answer":2,"explanation":"有機溶剤・特定化学物質・鉛・電離放射線等の特殊健康診断は、雇入時・配置替時・その後6か月以内ごとに1回が原則。","source":"労働安全衛生法施行令・各特別規則","links":[{"title":"e-Gov｜労働安全衛生法","url":"https://elaws.e-gov.go.jp/document?lawid=347AC0000000057"},{"title":"産業保健総合支援センター（JOHAS）","url":"https://www.johas.go.jp/"}],"type":"過去問系"},{"id":104,"category":"学校保健","question":"学校におけるアレルギー疾患対応で重要な「エピペン（アドレナリン自己注射薬）」を打てる者として正しいのはどれか。","choices":["医師のみ","本人・保護者・救命の現場に居合わせた教職員（緊急時）","学校医のみ","保健所の保健師のみ"],"answer":1,"explanation":"アナフィラキシー発症時、本人・保護者・救命の場に居合わせた教職員も生命を救うため代行注射が認められる（医師法違反にならない）。","source":"学校におけるアレルギー疾患対応ガイドライン","type":"過去問系","links":[{"title":"文科省｜学校保健","url":"https://www.mext.go.jp/a_menu/kenko/hoken/index.htm"}]},{"id":105,"category":"感染症","question":"結核の感染経路として正しいのはどれか。","choices":["接触感染","経口感染","空気感染（飛沫核感染）","媒介動物感染"],"answer":2,"explanation":"結核菌は空気感染（飛沫核感染）。N95マスク・陰圧個室等の感染対策が必要。","source":"結核診療ガイド","type":"過去問系","links":[{"title":"国立感染症研究所（NIID）","url":"https://www.niid.go.jp/niid/ja/"}]},{"id":106,"category":"栄養・健康教育","question":"行動変容ステージモデルの順序として正しいのはどれか。","choices":["関心期→無関心期→準備期→実行期→維持期","無関心期→関心期→準備期→実行期→維持期","準備期→関心期→実行期→維持期→無関心期","実行期→準備期→関心期→維持期→無関心期"],"answer":1,"explanation":"プロチャスカの行動変容ステージモデル：無関心期（前熟考）→関心期（熟考）→準備期→実行期→維持期。各ステージに応じた支援を行う。","source":"Prochaska 行動変容ステージモデル","type":"過去問系","links":[{"title":"厚労省｜栄養・食生活","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/eiyou/index.html"}]},{"id":107,"category":"栄養・健康教育","question":"セルフエフィカシー（自己効力感）を高める情報源として最も影響が大きいとされるのはどれか。","choices":["言語的説得","成功体験（遂行行動の達成）","代理的経験","情動的喚起"],"answer":1,"explanation":"Banduraによれば、セルフエフィカシーを高める情報源は遂行行動の達成（成功体験）が最も強く、次いで代理的経験、言語的説得、情動的喚起の順。","source":"Bandura 自己効力感理論","type":"過去問系","links":[{"title":"厚労省｜栄養・食生活","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/eiyou/index.html"}]},{"id":108,"category":"公衆衛生看護学","question":"保健師が用いる地区踏査（街歩き）の目的として最も適切なのはどれか。","choices":["観光名所の確認","五感を用いて生活環境・社会資源・住民の暮らしを把握する","地形図の作成","防犯活動"],"answer":1,"explanation":"地区踏査は地区アセスメントの基本手法。実際に歩いて見・聞き・感じることで統計データでは見えない地域の実情を把握する。","source":"公衆衛生看護学テキスト","type":"過去問系","links":[{"title":"日本公衆衛生看護学会","url":"https://japhn.jp/"}]},{"id":109,"category":"保健医療福祉行政論","question":"DV（配偶者からの暴力）防止法に基づく相談窓口として正しいのはどれか。","choices":["児童相談所のみ","配偶者暴力相談支援センター（女性相談支援センター等）","労働基準監督署","保健所のみ"],"answer":1,"explanation":"DV防止法に基づき、都道府県・市町村が配偶者暴力相談支援センター（女性相談支援センター等）を設置。保護命令・一時保護等を行う。","source":"配偶者からの暴力の防止及び被害者の保護等に関する法律","type":"過去問系","links":[{"title":"厚労省｜地域保健の推進","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/tiiki/index.html"}]},{"id":110,"category":"教養_憲法","question":"国民の三大義務に含まれないのはどれか。","choices":["勤労の義務","納税の義務","教育を受けさせる義務","投票の義務"],"answer":3,"explanation":"憲法上の三大義務は教育を受けさせる義務（26条）、勤労の義務（27条）、納税の義務（30条）。投票は権利であり義務ではない。","source":"日本国憲法","links":[{"title":"e-Gov｜日本国憲法","url":"https://elaws.e-gov.go.jp/document?lawid=321CONSTITUTION"}],"type":"予想問題"},{"id":111,"category":"教養_地方自治","question":"地方公務員の給与決定の原則として地方公務員法に明記されているのはどれか。","choices":["年功序列の原則","職務給の原則・均衡の原則・条例主義","市場価格連動","首長の裁量"],"answer":1,"explanation":"地方公務員法第24条により、職務と責任に応ずる給与（職務給の原則）、国・他の地方公共団体・民間との均衡（均衡の原則）、条例で定める（条例主義）。","source":"地方公務員法 第24条","links":[{"title":"e-Gov｜地方公務員法","url":"https://elaws.e-gov.go.jp/document?lawid=325AC0000000261"},{"title":"総務省｜地方自治","url":"https://www.soumu.go.jp/main_sosiki/jichi_gyousei/bunken/index.html"}],"type":"予想問題"},{"id":112,"category":"教養_時事広島","question":"広島市の主要な健康課題として近年特に重視されているのはどれか。","choices":["若年層の感染症のみ","高齢化に伴う介護予防・認知症対策、被爆者の健康管理、母子保健の切れ目ない支援","観光客の健康","ペット由来感染症"],"answer":1,"explanation":"広島市は被爆地として被爆者・被爆二世の健康管理、高齢化に伴う介護予防・認知症対策、健康ひろしま21に基づく生活習慣病予防、母子保健の切れ目ない支援等を重点課題としている。","source":"広島市保健医療計画・健康ひろしま21","links":[{"title":"広島市公式サイト","url":"https://www.city.hiroshima.lg.jp/"}],"type":"予想問題"},{"id":113,"category":"母子保健","question":"新生児訪問指導の根拠条文はどれか。","choices":["母子保健法 第11条（新生児の訪問指導）","児童福祉法","健康増進法","予防接種法"],"answer":0,"explanation":"母子保健法第11条により、市町村長は新生児の養育上必要があるときは、医師・保健師・助産師等を訪問させ、必要な指導を行わせる。","source":"母子保健法 第11条","links":[{"title":"e-Gov｜母子保健法","url":"https://elaws.e-gov.go.jp/document?lawid=340AC0000000141"},{"title":"こども家庭庁｜母子保健","url":"https://www.cfa.go.jp/policies/boshi-hoken/"}],"type":"過去問系"},{"id":114,"category":"精神保健","question":"依存症対策における「ハームリダクション」の考え方として正しいのはどれか。","choices":["完全断薬のみを目的","薬物使用に伴う健康・社会的被害を減らすことを目的とする","刑罰の強化","本人の意思に反する強制治療"],"answer":1,"explanation":"ハームリダクションは薬物・アルコール等の使用継続を前提に、関連する害（HIV感染、過量摂取、社会的孤立等）を減らすアプローチ。WHO等が推奨。","source":"WHO ハームリダクション政策","type":"過去問系","links":[{"title":"厚労省｜精神保健福祉対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/hukushi_kaigo/shougaishahukushi/seishin/index.html"}]},{"id":115,"category":"成人・高齢者保健","question":"サルコペニアの主たる病態として正しいのはどれか。","choices":["骨密度の低下","加齢に伴う筋肉量減少と筋力低下","関節の変形","認知機能低下"],"answer":1,"explanation":"サルコペニアは加齢性の筋肉量・筋力・身体機能の低下。フレイルの中核要素。栄養（タンパク質）と運動（レジスタンス）が予防・改善の柱。","source":"AWGS 2019","type":"過去問系","links":[{"title":"厚労省｜生活習慣病対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/seikatsu/index.html"}]},{"id":116,"category":"産業保健","question":"メンタルヘルス指針における4つのケアに含まれないのはどれか。","choices":["セルフケア","ラインによるケア","事業場内産業保健スタッフ等によるケア","国によるケア"],"answer":3,"explanation":"労働者の心の健康の保持増進のための指針における4つのケアは、セルフケア・ラインケア・事業場内産業保健スタッフ等によるケア・事業場外資源によるケア。","source":"労働者の心の健康の保持増進のための指針","type":"過去問系","links":[{"title":"産業保健総合支援センター（JOHAS）","url":"https://www.johas.go.jp/"}]},{"id":117,"category":"感染症","question":"1類感染症に該当するのはどれか。","choices":["結核","エボラ出血熱","麻しん","腸管出血性大腸菌感染症"],"answer":1,"explanation":"1類はエボラ出血熱、クリミア・コンゴ出血熱、痘そう、南米出血熱、ペスト、マールブルグ病、ラッサ熱の7疾患。極めて危険性が高い。","source":"感染症法","links":[{"title":"e-Gov｜感染症法","url":"https://elaws.e-gov.go.jp/document?lawid=410AC0000000114"},{"title":"国立感染症研究所（NIID）","url":"https://www.niid.go.jp/niid/ja/"}],"type":"過去問系"},{"id":118,"category":"疫学","question":"因果関係を論じるBradford Hillの基準に含まれないのはどれか。","choices":["関連の強さ","時間的先行性（曝露が結果に先行）","再現性（一致性）","サンプルサイズの小ささ"],"answer":3,"explanation":"ヒルの基準は関連の強さ、一致性、特異性、時間性、量反応関係、生物学的妥当性、整合性、実験的証拠、類似性。サンプルサイズの小ささは含まれない。","source":"Bradford Hill 1965","type":"過去問系","links":[{"title":"国立感染症研究所｜疫学","url":"https://www.niid.go.jp/niid/ja/diseases.html"}]},{"id":119,"category":"公衆衛生看護学","question":"保健師が「健康危機管理」で果たす役割として最も適切なのはどれか。","choices":["事後の記録作成のみ","平時からの体制整備、発生時の対応、復旧期の健康支援を一貫して行う","緊急時のみ動員される","医療機関の指揮"],"answer":1,"explanation":"健康危機管理は平時からの予防・準備、発生時の対応、復旧・復興期の健康支援、平時へのフィードバックの循環。保健師は地域に根ざして全段階に関わる。","source":"地域保健対策の推進に関する基本的な指針","type":"過去問系","links":[{"title":"日本公衆衛生看護学会","url":"https://japhn.jp/"}]},{"id":120,"category":"保健医療福祉行政論","question":"「地域共生社会」の理念として最も適切なのはどれか。","choices":["世代別・分野別の縦割り強化","制度・分野や支え手・受け手の関係を超え、住民が共に支え合う社会","施設集約による効率化のみ","民間営利化の推進"],"answer":1,"explanation":"地域共生社会は、制度・分野や「支え手」「受け手」という関係を超え、地域住民や地域の多様な主体が我が事として参画し、人と人、人と資源が世代や分野を超えて丸ごとつながる社会を目指す（厚労省）。","source":"地域共生社会の実現に向けて（厚労省）","type":"過去問系","links":[{"title":"厚労省｜地域保健の推進","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/tiiki/index.html"}]},{"id":121,"category":"時事_保健医療政策","question":"こども家庭庁が2023年4月に設置された主たる目的として正しいのはどれか。","choices":["こどもに関する施策を一元的に推進する司令塔機能","保育所のみの所管","学校教育全般の所管","高齢者福祉の所管"],"answer":0,"explanation":"こども家庭庁は内閣府の外局として2023年4月に発足。こども政策の司令塔機能を担い、母子保健・児童福祉・少子化対策等を一元化（学校教育は文科省が引き続き所管）。","source":"こども家庭庁設置法（2023年4月施行）","links":[{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":122,"category":"時事_保健医療政策","question":"健康日本21（第三次）の計画期間として正しいのはどれか。","choices":["2020年度〜2030年度","2024年度〜2035年度","2025年度〜2034年度","2018年度〜2023年度"],"answer":1,"explanation":"健康日本21（第三次）は2024年度から2035年度までの12年計画。健康寿命延伸・健康格差縮小に加え、ライフコースアプローチ・社会環境の質向上が新たに重視される。","source":"厚労省 健康日本21（第三次）推進のための説明資料 2023","links":[{"title":"厚労省｜健康日本21(第三次)","url":"https://www.mhlw.go.jp/stf/kenkounippon21_00006.html"},{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":123,"category":"時事_保健医療政策","question":"2024年1月に施行された認知症基本法（共生社会の実現を推進するための認知症基本法）の基本理念として正しいのはどれか。","choices":["認知症の人を保護の対象として扱う","認知症の人が尊厳を保持し希望をもって暮らせる共生社会の実現","施設入所の拡充","家族の自助努力に委ねる"],"answer":1,"explanation":"2024年1月施行。認知症の人が個人として尊重され、希望をもって暮らせる共生社会の実現が基本理念。9月21日が「認知症の日」と法定化された。","source":"共生社会の実現を推進するための認知症基本法","links":[{"title":"厚労省｜認知症施策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000076236.html"},{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":124,"category":"時事_保健医療政策","question":"感染症法等の改正（2022年12月公布、2024年4月施行）で強化された内容として正しいのはどれか。","choices":["感染症対策の地方分権","都道府県と医療機関の医療措置協定の制度化","予防接種法の廃止","保健所の廃止"],"answer":1,"explanation":"次なる感染症危機への備えとして、都道府県と医療機関が病床確保・発熱外来等の協定を平時から締結する仕組みが法定化された。","source":"感染症の予防及び感染症の患者に対する医療に関する法律等の一部改正（2022年法律第96号）","links":[{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":125,"category":"時事_保健医療政策","question":"2025年4月発足の国立健康危機管理研究機構（JIHS）の構成として正しいのはどれか。","choices":["国立感染症研究所と国立国際医療研究センターの統合","厚労省の内部組織","WHO日本支部","保健所の上部組織"],"answer":0,"explanation":"感染症等の健康危機管理に関する司令塔機能を担う国立健康危機管理研究機構（日本版CDC）が2025年4月に発足。国立感染症研究所と国立国際医療研究センターを統合した特殊法人。","source":"国立健康危機管理研究機構法（2023年法律第46号）","links":[{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":126,"category":"時事_保健医療政策","question":"マイナ保険証（健康保険証としての利用）について正しいのはどれか。","choices":["2024年12月2日以降、新規の従来型健康保険証は発行停止（最大1年の経過措置）","従来の健康保険証は永続的に発行される","任意で利用できない","医療機関での利用は禁止"],"answer":0,"explanation":"2024年12月2日以降は従来型の健康保険証の新規発行が停止され、マイナ保険証への移行が原則化（経過措置最大1年・資格確認書あり）。","source":"厚労省 オンライン資格確認・マイナ保険証","links":[{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":127,"category":"時事_保健医療政策","question":"2024年4月施行の改正精神保健福祉法における医療保護入院の入院期間の上限として正しいのはどれか。","choices":["1か月","3か月","6か月","期限なし"],"answer":2,"explanation":"改正精神保健福祉法（2024年4月施行）により医療保護入院の入院期間が法定化（原則6か月以内、更新可）。市町村長同意の対象拡大、入院者訪問支援事業も新設された。","source":"精神保健及び精神障害者福祉に関する法律（2022年改正、2024年4月施行）","links":[{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":128,"category":"時事_保健医療政策","question":"2025年4月から定期接種（B類疾病）に位置付けられたワクチンとして正しいのはどれか。","choices":["麻しん風しん混合（MR）","帯状疱疹","おたふくかぜ","ロタウイルス"],"answer":1,"explanation":"65歳の高齢者を対象に帯状疱疹ワクチンが2025年4月からB類疾病の定期接種化（5歳刻みの経過措置あり）。","source":"予防接種法施行令の一部を改正する政令（2025年）","links":[{"title":"e-Gov｜予防接種法","url":"https://elaws.e-gov.go.jp/document?lawid=323AC0000000068"},{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":129,"category":"時事_保健医療政策","question":"2024年4月施行の児童福祉法等改正により全市町村に設置努力義務とされた機関はどれか。","choices":["児童相談所","こども家庭センター","保健所","地域包括支援センター"],"answer":1,"explanation":"2024年4月施行の改正児童福祉法・母子保健法により、子育て世代包括支援センターと子ども家庭総合支援拠点を一体化した「こども家庭センター」の設置が市町村の努力義務化された。","source":"改正児童福祉法・母子保健法（2022年改正、2024年4月施行）","links":[{"title":"e-Gov｜母子保健法","url":"https://elaws.e-gov.go.jp/document?lawid=340AC0000000141"},{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":130,"category":"時事_保健医療政策","question":"ヤングケアラーに関する法令上の位置付けとして正しいのはどれか（2024年改正）。","choices":["定義はない","改正子ども・若者育成支援推進法でヤングケアラーが国・自治体の支援対象として明記","学校保健安全法に規定","刑法に規定"],"answer":1,"explanation":"2024年6月公布の改正子ども・若者育成支援推進法でヤングケアラーが国・自治体の支援対象として法律上明記された。","source":"子ども・若者育成支援推進法の一部改正（2024年）","links":[{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":131,"category":"時事_保健医療政策","question":"受動喫煙防止について健康増進法（2020年4月全面施行）に基づく内容として正しいのはどれか。","choices":["全ての飲食店で喫煙可","多数の者が利用する施設は原則屋内禁煙（学校・病院・行政機関は敷地内禁煙）","屋外も全面禁煙","20歳以上は自由に喫煙可"],"answer":1,"explanation":"健康増進法改正により2020年4月から望まない受動喫煙を防止するため、施設類型ごとに原則屋内禁煙（一部喫煙専用室可）、第一種施設（学校・病院・児童福祉施設・行政機関）は敷地内禁煙が義務化。","source":"健康増進法（2018年改正、2020年4月全面施行）","links":[{"title":"e-Gov｜健康増進法","url":"https://elaws.e-gov.go.jp/document?lawid=414AC0000000103"},{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":132,"category":"時事_保健医療政策","question":"後期高齢者の保健事業として「フレイル健診」で導入された質問票の項目数として正しいのはどれか。","choices":["5項目","10項目","15項目","30項目"],"answer":2,"explanation":"後期高齢者医療制度の保健事業として2020年度から導入された「後期高齢者の質問票」は15項目（健康状態・心の健康状態・食習慣・口腔機能・体重変化・運動・転倒・認知機能・喫煙・社会参加・ソーシャルサポート）。","source":"後期高齢者の質問票の解説と留意事項（厚労省 2019）","links":[{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":133,"category":"時事_保健医療政策","question":"医師の働き方改革（2024年4月施行）で原則の時間外労働上限として正しいのはどれか。","choices":["年360時間","年720時間","年960時間（A水準）","年1860時間（A水準）"],"answer":2,"explanation":"2024年4月から医師の時間外・休日労働の上限規制が適用（A水準：年960時間、B・連携B水準：年1860時間まで特例、C水準：研修医等）。","source":"医療法等改正（2021年）医師の働き方改革","links":[{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":134,"category":"時事_保健医療政策","question":"2024年6月施行の改正旅館業法・感染症法整備で導入された制度として正しいのはどれか。","choices":["宿泊拒否要件の整備（感染症発生時の指針遵守要請等）","全宿泊客の登録義務","外国人旅行者の入国制限","民泊の禁止"],"answer":0,"explanation":"改正旅館業法（2023年公布、2024年6月施行）で感染症のまん延防止に必要な指針遵守の要請等に応じない場合の宿泊拒否要件などが整備された。","source":"改正旅館業法（2023年法律第36号）","links":[{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":135,"category":"時事_保健医療政策","question":"HPVワクチンのキャッチアップ接種について2024年度時点で正しいのはどれか。","choices":["対象は男性のみ","1997年度〜2007年度生まれの女性が対象（2025年3月末まで・接種開始者は2026年3月末まで延長）","全女性が対象","実施されていない"],"answer":1,"explanation":"積極的勧奨差し控え世代（1997-2007年度生まれ女性）への公費接種は2025年3月末で終了予定であったが、2024年度に1回以上接種した者は2026年3月末まで延長された。","source":"HPVワクチン キャッチアップ接種（厚労省 2024年通知）","links":[{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":136,"category":"時事_保健医療政策","question":"2024年度介護報酬改定の主な方向性として誤っているのはどれか。","choices":["処遇改善の一本化","認知症ケアの推進","看取り対応の強化","在宅サービスの全廃"],"answer":3,"explanation":"2024年度介護報酬改定では処遇改善加算の一本化、認知症対応・看取り・自立支援の強化、生産性向上、地域包括ケアシステムの深化等が柱。在宅サービス廃止は誤り。","source":"令和6年度介護報酬改定（厚労省）","links":[{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":137,"category":"時事_保健医療政策","question":"自殺総合対策大綱（2022年閣議決定）の重点施策として誤っているのはどれか。","choices":["子ども・若者の自殺対策の推進","女性に対する支援の強化","コロナ禍を踏まえた対策","高齢者のみへの集中"],"answer":3,"explanation":"2022年大綱は子ども・若者、女性、コロナ禍の影響、孤独・孤立対策など多面的。高齢者のみへの集中は誤り。","source":"自殺総合対策大綱（2022年10月閣議決定）","links":[{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":138,"category":"時事_保健医療政策","question":"LGBT理解増進法（2023年6月施行）の性質として正しいのはどれか。","choices":["差別禁止を罰則付きで定める法律","性的指向・ジェンダーアイデンティティの多様性に関する国民の理解を増進する基本法","同性婚を認める法律","戸籍法を改正する法律"],"answer":1,"explanation":"2023年施行の同法は理解増進の基本理念・国/自治体/事業者の努力義務を定める基本法。罰則や禁止規定はない。","source":"性的指向及びジェンダーアイデンティティの多様性に関する国民の理解の増進に関する法律（2023年）","links":[{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":139,"category":"時事_保健医療政策","question":"「異次元の少子化対策」を踏まえた こども・子育て支援法等改正（2024年成立）で創設された財源措置として正しいのはどれか。","choices":["こども・子育て支援金制度（医療保険料に上乗せ）","消費税率の引上げ","新たな所得税創設","国債発行のみ"],"answer":0,"explanation":"2026年度以降、医療保険料に上乗せ徴収する「こども・子育て支援金制度」を創設。児童手当拡充・出生後休業支援給付・育児時短就業給付等の財源とする。","source":"子ども・子育て支援法等改正法（2024年法律第47号）","links":[{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":140,"category":"時事_保健医療政策","question":"広島市の「健康ひろしま21（第3次）」（2024年度〜）の重点目標として最も適切なのはどれか。","choices":["健康寿命延伸と健康格差縮小、ライフコースアプローチ","観光振興","都市開発","教育改革"],"answer":0,"explanation":"健康ひろしま21（第3次）は健康日本21（第三次）と整合した広島市の健康増進計画。健康寿命延伸・健康格差縮小・ライフコースアプローチを柱とする。","source":"広島市 健康ひろしま21（第3次）","links":[{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":141,"category":"時事_保健医療政策","question":"広島市の被爆者健康管理事業として正しいのはどれか。","choices":["被爆者健康手帳所持者への健康診断（年2回の一般・年1回のがん検診等）の実施","全市民が対象","希望者のみ自費","実施していない"],"answer":0,"explanation":"被爆者援護法に基づき、被爆者健康手帳所持者には年2回の一般健康診断、年1回のがん検診等が公費で実施される。広島市は被爆者支援の中核都市。","source":"原子爆弾被爆者に対する援護に関する法律","links":[{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":142,"category":"時事_保健医療政策","question":"重層的支援体制整備事業（社会福祉法第106条の4）の対象として正しいのはどれか。","choices":["介護のみ","属性を問わない包括的相談支援・参加支援・地域づくり","高齢者のみ","障害者のみ"],"answer":1,"explanation":"2021年4月施行の改正社会福祉法に基づく重層的支援体制整備事業は、属性・世代を問わない複合課題への一体的支援（包括的相談・参加・地域づくり）を市町村の任意事業として実施。","source":"改正社会福祉法（2020年）第106条の4","links":[{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":143,"category":"時事_保健医療政策","question":"2024年度から拡充された児童手当の内容として正しいのはどれか。","choices":["所得制限の撤廃と高校生年代までの支給延長","対象を未就学児に縮小","支給額の半減","申請制の廃止"],"answer":0,"explanation":"2024年10月支給分から所得制限撤廃・高校生年代（18歳到達後最初の3月末）までの延長・第3子以降は3万円/月に増額された。","source":"改正子ども・子育て支援法（2024年）","links":[{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":144,"category":"時事_保健医療政策","question":"広島市の保健師の配置として正しいのはどれか。","choices":["全員が市役所本庁勤務","各区の保健センターを中心に、健康福祉局・こども未来局等にも配置","保健所のみ","委託のみ"],"answer":1,"explanation":"広島市の保健師は健康福祉局保健所、各区の保健センター（保健所支所）を中心に、こども未来局・福祉部門等にも配置され、地域・対人・行政の各場面で活動する。","source":"広島市公式サイト 職員採用案内","links":[{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":145,"category":"時事_保健医療政策","question":"孤独・孤立対策推進法（2024年4月施行）の主な内容として正しいのはどれか。","choices":["国・自治体の責務、孤独・孤立対策推進本部の設置、地域協議会の組織化","罰則規定の新設","高齢者のみ対象","民間活動の禁止"],"answer":0,"explanation":"2024年4月施行。国・自治体の責務、孤独・孤立対策推進本部、地域における関係機関の連携（地域協議会）を定める。当事者支援・予防・社会参加促進の包括的施策。","source":"孤独・孤立対策推進法（2023年法律第45号）","links":[{"title":"こども家庭庁｜新着情報","url":"https://www.cfa.go.jp/"}],"type":"時事予想"},{"id":146,"category":"教養_憲法","question":"日本国憲法の三大原則として正しい組合せはどれか。","choices":["国民主権・基本的人権の尊重・平和主義","国民主権・議院内閣制・地方自治","基本的人権・法の支配・三権分立","平和主義・民主主義・資本主義"],"answer":0,"explanation":"日本国憲法の三大原則は①国民主権②基本的人権の尊重③平和主義。三権分立は権力分立の仕組みで別概念。","source":"日本国憲法 前文・第1章・第3章","links":[{"title":"e-Gov｜日本国憲法","url":"https://elaws.e-gov.go.jp/document?lawid=321CONSTITUTION"}],"type":"予想問題"},{"id":147,"category":"教養_憲法","question":"憲法第9条が禁止する内容として正しいのはどれか。","choices":["全ての自衛行動","戦争の放棄・戦力の不保持・交戦権の否認","外交交渉","条約の締結"],"answer":1,"explanation":"9条1項：国際紛争解決の手段としての戦争放棄。2項：戦力不保持・交戦権否認。自衛権の有無については解釈が分かれる。","source":"日本国憲法 第9条","links":[{"title":"e-Gov｜日本国憲法","url":"https://elaws.e-gov.go.jp/document?lawid=321CONSTITUTION"}],"type":"予想問題"},{"id":148,"category":"教養_憲法","question":"「法の下の平等」を規定する条文はどれか。","choices":["第13条（個人の尊重）","第14条","第25条（生存権）","第21条（表現の自由）"],"answer":1,"explanation":"14条1項「すべて国民は、法の下に平等であって、人種、信条、性別、社会的身分又は門地により、政治的、経済的又は社会的関係において、差別されない。」","source":"日本国憲法 第14条","links":[{"title":"e-Gov｜日本国憲法","url":"https://elaws.e-gov.go.jp/document?lawid=321CONSTITUTION"}],"type":"予想問題"},{"id":149,"category":"教養_憲法","question":"衆議院の優越が認められないのはどれか。","choices":["予算の先議権","内閣信任・不信任決議","条約の承認","憲法改正の発議"],"answer":3,"explanation":"憲法改正の発議は各院の総議員の2/3以上の賛成が必要で、衆議院の優越はない。予算・条約・法律・内閣信任不信任は衆議院優越規定あり。","source":"日本国憲法 第59〜62条・第96条","links":[{"title":"e-Gov｜日本国憲法","url":"https://elaws.e-gov.go.jp/document?lawid=321CONSTITUTION"}],"type":"予想問題"},{"id":150,"category":"教養_憲法","question":"最高裁判所の違憲審査権について正しいのはどれか。","choices":["法律のみが対象","命令・規則・処分も対象（81条）","行政行為のみ対象","条約には及ばない"],"answer":1,"explanation":"81条「最高裁判所は、一切の法律、命令、規則又は処分が憲法に適合するかしないかを決定する権限を有する終審裁判所である。」","source":"日本国憲法 第81条","links":[{"title":"e-Gov｜日本国憲法","url":"https://elaws.e-gov.go.jp/document?lawid=321CONSTITUTION"}],"type":"予想問題"},{"id":151,"category":"教養_憲法","question":"内閣総理大臣の指名機関はどれか。","choices":["天皇","国会","最高裁判所","国民"],"answer":1,"explanation":"67条「内閣総理大臣は、国会議員の中から国会の議決で、これを指名する。」天皇が任命（6条）するが指名は国会。","source":"日本国憲法 第67条","links":[{"title":"e-Gov｜日本国憲法","url":"https://elaws.e-gov.go.jp/document?lawid=321CONSTITUTION"}],"type":"予想問題"},{"id":152,"category":"教養_憲法","question":"「表現の自由」（憲法21条）の保障内容に含まれないのはどれか。","choices":["言論・出版の自由","集会・結社の自由","通信の秘密","財産権"],"answer":3,"explanation":"21条は言論・出版・集会・結社・通信の秘密を保障。財産権は29条で別途規定。","source":"日本国憲法 第21条・第29条","links":[{"title":"e-Gov｜日本国憲法","url":"https://elaws.e-gov.go.jp/document?lawid=321CONSTITUTION"}],"type":"予想問題"},{"id":153,"category":"教養_憲法","question":"両院協議会の開催が義務付けられているのはどれか。","choices":["法律案が参議院で否決されたとき","予算案で両院が異なる議決をしたとき","条約で両院が一致したとき","内閣不信任案が可決されたとき"],"answer":1,"explanation":"予算の議決・条約の承認・内閣総理大臣の指名で衆参が異なる議決をした場合、両院協議会の開催が義務付けられる（法律案は任意）。","source":"日本国憲法 第60〜67条","links":[{"title":"e-Gov｜日本国憲法","url":"https://elaws.e-gov.go.jp/document?lawid=321CONSTITUTION"}],"type":"予想問題"},{"id":154,"category":"教養_憲法","question":"地方自治の本旨として憲法92条が定める内容はどれか。","choices":["住民自治と団体自治","地方分権と財政自主権","条例制定権と課税権","首長公選制と住民投票"],"answer":0,"explanation":"92条「地方公共団体の組織及び運営に関する事項は、地方自治の本旨に基いて、法律でこれを定める。」本旨=住民自治（住民の意思）＋団体自治（国から独立）。","source":"日本国憲法 第92条","links":[{"title":"e-Gov｜日本国憲法","url":"https://elaws.e-gov.go.jp/document?lawid=321CONSTITUTION"}],"type":"予想問題","explanationImage":"assets/explain-general-local-autonomy.png","explanationImageAlt":"地方自治と住民監査請求の要点を示す教養問題向けインフォグラフィック"},{"id":155,"category":"教養_憲法","question":"憲法上、「天皇の国事行為」に含まれないのはどれか。","choices":["国会の召集","条約の締結","栄典の授与","最高裁判所長官の任命"],"answer":1,"explanation":"条約の締結は内閣の権限（73条3号）。天皇は内閣の助言と承認に基づき国事行為を行う（7条）が、条約締結は国事行為に含まれない。","source":"日本国憲法 第7条・第73条","links":[{"title":"e-Gov｜日本国憲法","url":"https://elaws.e-gov.go.jp/document?lawid=321CONSTITUTION"}],"type":"予想問題"},{"id":156,"category":"教養_地方自治","question":"普通地方公共団体の執行機関として長（首長）のほかに置かれるものはどれか。","choices":["議会のみ","教育委員会・人事委員会・監査委員等の行政委員会","最高裁判所支部","国の出先機関"],"answer":1,"explanation":"普通地方公共団体には長（知事・市町村長）の他に、教育委員会・選挙管理委員会・人事委員会・監査委員等の行政委員会が置かれる。","source":"地方自治法 第138条の4","links":[{"title":"e-Gov｜地方自治法","url":"https://elaws.e-gov.go.jp/document?lawid=322AC0000000067"},{"title":"総務省｜地方自治","url":"https://www.soumu.go.jp/main_sosiki/jichi_gyousei/bunken/index.html"}],"type":"予想問題"},{"id":157,"category":"教養_地方自治","question":"地方公共団体の長（首長）の任期として正しいのはどれか。","choices":["2年","4年","6年","終身"],"answer":1,"explanation":"知事・市町村長の任期は4年（地方自治法140条）。議員も4年（93条）。","source":"地方自治法 第140条","links":[{"title":"e-Gov｜地方自治法","url":"https://elaws.e-gov.go.jp/document?lawid=322AC0000000067"},{"title":"総務省｜地方自治","url":"https://www.soumu.go.jp/main_sosiki/jichi_gyousei/bunken/index.html"}],"type":"予想問題"},{"id":158,"category":"教養_地方自治","question":"地方公務員の政治的行為の制限について正しいのはどれか。","choices":["国家公務員と同一の制限がある","条例で定める範囲のみ禁止","地方公務員法36条で一定の政治的行為が禁止","制限は一切ない"],"answer":2,"explanation":"地公法36条により、特定政党支持・反対の勧誘、選挙運動等の政治的行為が禁止される。国家公務員より制限範囲は狭い（地域限定）。","source":"地方公務員法 第36条","links":[{"title":"e-Gov｜地方公務員法","url":"https://elaws.e-gov.go.jp/document?lawid=325AC0000000261"},{"title":"総務省｜地方自治","url":"https://www.soumu.go.jp/main_sosiki/jichi_gyousei/bunken/index.html"}],"type":"予想問題"},{"id":159,"category":"教養_地方自治","question":"地方公務員が降任・免職される「分限処分」の事由として正しいのはどれか。","choices":["職務怠慢","心身の故障・勤務実績不良・適格性欠如・廃職過員","刑事事件での逮捕","パワーハラスメント"],"answer":1,"explanation":"分限処分（28条）の事由は①心身の故障②勤務実績不良③適格性の欠如④職の廃止・定数削減。非違行為への懲戒処分（29条）とは異なる。","source":"地方公務員法 第28条","links":[{"title":"e-Gov｜地方公務員法","url":"https://elaws.e-gov.go.jp/document?lawid=325AC0000000261"},{"title":"総務省｜地方自治","url":"https://www.soumu.go.jp/main_sosiki/jichi_gyousei/bunken/index.html"}],"type":"予想問題"},{"id":160,"category":"教養_地方自治","question":"地方公務員の懲戒処分の種類として正しいのはどれか。","choices":["戒告・減給・停職・免職の4種","口頭注意・書面警告・降格・免職","訓告・注意・停職・免職","降任・停職・減給・戒告"],"answer":0,"explanation":"地公法29条により懲戒処分は戒告・減給・停職・免職の4種類。降任は懲戒ではなく分限処分。","source":"地方公務員法 第29条","links":[{"title":"e-Gov｜地方公務員法","url":"https://elaws.e-gov.go.jp/document?lawid=325AC0000000261"},{"title":"総務省｜地方自治","url":"https://www.soumu.go.jp/main_sosiki/jichi_gyousei/bunken/index.html"}],"type":"予想問題"},{"id":161,"category":"教養_地方自治","question":"住民監査請求の対象として正しいのはどれか。","choices":["国の行政機関","地方公共団体の違法・不当な財務会計行為","私人間の契約紛争","議会の立法行為"],"answer":1,"explanation":"住
