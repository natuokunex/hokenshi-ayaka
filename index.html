ps://www.pref.tottori.lg.jp/282340.htm"},{"title":"岩手県｜採用試験の過去問・例題","url":"https://www2.pref.iwate.jp/~hp0741/selection/answer.html"}],"type":"公式過去問参照","explanationImage":"assets/explain-general-local-autonomy.png","explanationImageAlt":"地方自治と住民監査請求の要点を示す教養問題向けインフォグラフィック"},{"id":456,"category":"教養_自然科学","question":"感染症対策で手洗いが有効な主な理由はどれか。","choices":["手指に付着した病原体を物理的に減らすため","体温を下げるため","抗体を直接増やすため","空気中の酸素を増やすため"],"answer":0,"explanation":"手洗いは接触感染の予防に有効で、手指に付着した病原体を洗い流し感染機会を減らす。","source":"自治体公開の職員採用試験例題・過去問題を参照して作成（転載ではなく類題）","links":[{"title":"広島市｜試験問題","url":"https://www.city.hiroshima.lg.jp/employment/exam/1008031.html"},{"title":"岡山市｜例題・過去の試験問題","url":"https://www.city.okayama.jp/saiyou/0000017701.html"},{"title":"岡山市｜採用試験Q&A","url":"https://www.city.okayama.jp/saiyou/0000063787.html"},{"title":"さいたま市｜例題の公表","url":"https://www.city.saitama.lg.jp/006/001/001/001/002/002/index.html"},{"title":"宮城県｜例題・過去の出題課題","url":"https://www.pref.miyagi.jp/site/saiyou/reidai.html"},{"title":"鳥取県｜過去の試験の試験問題・例題","url":"https://www.pref.tottori.lg.jp/282340.htm"},{"title":"岩手県｜採用試験の過去問・例題","url":"https://www2.pref.iwate.jp/~hp0741/selection/answer.html"}],"type":"公式過去問参照"},{"id":457,"category":"公衆衛生看護学","question":"保健師の歴史に関する事項とその目的の組合せで正しいのはどれか。","choices":["開拓保健婦制度　入植者の健康管理","保健婦駐在制度　健兵健民政策","保健婦規則の制定　成人病の予防","国民健康保険保健婦の市町村移管　伝染病の予防"],"answer":0,"explanation":"正答は1「開拓保健婦制度　入植者の健康管理」。開拓保健婦は戦後の開拓地などで、入植者の生活と健康を支える役割を担いました。保健婦駐在制度は地域に保健婦を配置して住民に身近な保健活動を行う制度であり、「健兵健民政策」と直結させる組合せではありません。保健婦規則は保健婦の身分・業務に関する制度で、成人病予防そのものを目的に制定されたものではありません。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":458,"category":"感染症","question":"世界保健機関〈WHO〉が、世界的な感染拡大によって「国際的に懸念される公衆衛生上の緊急事態〈PHEIC〉」を宣言した感染症はどれか。","choices":["結核","マラリア","ヒト免疫不全ウイルス〈HIV〉感染症","新型コロナウイルス感染症〈COVID-19〉"],"answer":3,"explanation":"正答は4「新型コロナウイルス感染症〈COVID-19〉」。WHOがPHEICを宣言した代表例としてCOVID-19があります。PHEICは国際的な感染拡大により各国の協調対応が必要な場合に出される宣言です。結核・マラリア・HIVは重要な国際保健課題ですが、この設問の文脈で問われているPHEIC宣言の対象としてはCOVID-19を選びます。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":459,"category":"公衆衛生看護学","question":"予防的保健行動に分類される保健行動はどれか。","choices":["市で行う肺がん検診を年に 1 回受診する。","処方された降圧薬を毎朝忘れずに服用する。","健康に生活するために毎日バランスの良い食事をとる。","ストレスを発散するために仕事帰りにジムで運動する。"],"answer":0,"explanation":"正答は1「市で行う肺がん検診を年に1回受診する」。予防的保健行動は、病気の発生や進行を防ぐために自ら行う行動です。検診受診は早期発見を目的とする予防行動です。降圧薬服用は疾病管理行動、バランスの良い食事や運動は健康増進行動として整理します。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":460,"category":"母子保健","question":"A さん（38 歳、初産婦、会社員）は夫と 2 人暮らしで産前休業中である。「最近、隣町から引っ越してきた」と母子健康手帳を持って市の保健センターに来所した。保健師が面接したところ、A さんは妊娠 9 か月で、妊婦健康診査の結果から妊娠経過は順調である。出産する予定の病院に変更はなく、出産後は 1 年間の育児休業を取得し、復職を希望していることがわかった。このとき、保健師が A さんに確認する内容で優先度が高いのはどれか。","choices":["両親学級の受講状況","勤務先までの所要時間","出産後の支援者の有無","出産する予定の病院の情報"],"answer":2,"explanation":"正答は3「出産後の支援者の有無」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":461,"category":"公衆衛生看護学","question":"A 市のシニアボランティア講座修了者によるラジオ体操の自主グループのメンバーから、保健師に「10 年間、皆で楽しくやってきたが、メンバーが高齢化して、いつまで続けられるか心配」と相談があった。活動を継続するための保健師の支援で最も効果的なのはどれか。","choices":["今後の計画を把握する。","骨粗鬆症検診の受診を勧奨する。","A 市の健康づくり推進員との協働を提案する。","ショッピングモールでのラジオ体操を企画する。"],"answer":2,"explanation":"正答は3「A 市の健康づくり推進員との協働を提案する。」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":462,"category":"母子保健","question":"A 市の保健師は家庭訪問を通して、多胎児をもつ親は外出が困難なため、家族以外とのつながりが希薄で孤立化し、育児不安が高まっているという課題を把握した。この課題を解決するために、多胎児をもつ親の会で子育てが落ち着いた世代の会員が、未就学の多胎児がいる家庭を支援する新たな事業を開始することとした。この事業の内容で優先度が高いのはどれか。","choices":["買い物の代行","児の一時預かり","病院受診の送迎","子育てサロンへの付き添い"],"answer":3,"explanation":"正答は4「子育てサロンへの付き添い」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":463,"category":"栄養・健康教育","question":"高血圧予防の取り組みで、食生活の改善を希望している人に対して、減塩料理教室を開催することにした。この教室のプロセス評価はどれか。","choices":["参加者の満足度","減塩達成者の割合","家族のサポートの変化","参加者の食生活の変化"],"answer":0,"explanation":"正答は1「参加者の満足度」。プロセス評価は、事業が計画どおり実施されたか、参加者がどう受け止めたかなど実施過程を見る評価です。減塩達成者の割合や食生活の変化はアウトカム評価、家族のサポート変化も結果側の評価に近いです。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":464,"category":"成人・高齢者保健","question":"「がん予防重点健康教育及びがん検診実施のための指針」で推奨されている、市町村が行うがん検診の種類と対象年齢の組合せで正しいのはどれか。","choices":["胃がん検診　35 歳以上","乳がん検診　20 歳以上","大腸がん検診　40 歳以上","子宮頸がん検診　18 歳以上"],"answer":2,"explanation":"正答は3「大腸がん検診　40 歳以上」。問題文が問う概念・制度・支援場面に最も合う選択肢です。他の選択肢は、対象や目的、実施主体、優先順位のいずれかが問題文と一致しないため除外します。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":465,"category":"成人・高齢者保健","question":"A さん（76 歳、女性、無職）は要介護 1 となり、 1 人暮らしが難しくなったため、同じ県内の B 市に居住する息子家族と同居することになった。息子は勤め先の C 健康保険組合の被用者であり、A さんから保健師に「B 市へ転居したら医療保険はどのようになりますか」と相談があった。A さんに説明する内容で正しいのはどれか。","choices":["「共済保険に加入します」","「後期高齢者医療制度の対象のままです」","「C 健康保険組合の被扶養者となります」","「B 市の国民健康保険に加入となります」"],"answer":1,"explanation":"正答は2「「後期高齢者医療制度の対象のままです」」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":466,"category":"精神保健","question":"令和 2 年（2020 年）の患者調査における精神及び行動の障害に関する動向について正しいのはどれか。","choices":["入院受療率は外来受療率より高い。","精神及び行動の障害の総患者数は 500 万人を超えている。","入院患者の半数以上が気分〈感情〉障害（躁うつ病を含む）である。","血管性及び詳細不明の認知症の総患者数は平成 29 年（2017 年）調査から減少している。"],"answer":1,"explanation":"正答は2「精神及び行動の障害の総患者数は 500 万人を超えている。」。問題文が問う概念・制度・支援場面に最も合う選択肢です。他の選択肢は、対象や目的、実施主体、優先順位のいずれかが問題文と一致しないため除外します。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":467,"category":"感染症","question":"感染症のアウトブレイクに該当するのはどれか。","choices":["全都道府県で季節性インフルエンザが流行している。","1 年前に発生が確認された新興感染症が世界的に流行している。","特定の都道府県の地域内で、ある感染症が常在的にみられている。","高齢者施設で感染性胃腸炎の患者が発生し、 1 週間で合計 10 人が発症した。"],"answer":3,"explanation":"正答は4「高齢者施設で感染性胃腸炎の患者が発生し、 1 週間で合計 10 人が発症した。」。感染症の問題では、分類、届出、調査、公費負担、感染経路、接触者対応を分けて判断します。この選択肢は、問題文で求められている感染症対策の原則に合っています。他の選択肢は、感染症分類や対応時期、感染経路、保健所の役割がずれています。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":468,"category":"感染症","question":"感染症発生動向調査事業について正しいのはどれか。","choices":["保健所が積極的疫学調査として実施する。","4 類感染症は全ての患者について集計する。","医療機関は患者居住地を管轄する保健所へ報告する。","2009 年の新型インフルエンザの流行を契機に開始された。"],"answer":1,"explanation":"正答は2「4 類感染症は全ての患者について集計する。」。感染症の問題では、分類、届出、調査、公費負担、感染経路、接触者対応を分けて判断します。この選択肢は、問題文で求められている感染症対策の原則に合っています。他の選択肢は、感染症分類や対応時期、感染経路、保健所の役割がずれています。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":469,"category":"成人・高齢者保健","question":"令和 4 年の歯科疾患実態調査において、80 歳で 20 本以上の歯を有する者の割合で正しいのはどれか。","choices":["24.1 %","38.3 %","51.6 %","72.1 %"],"answer":2,"explanation":"正答は3「51.6 %」。問題文が問う概念・制度・支援場面に最も合う選択肢です。他の選択肢は、対象や目的、実施主体、優先順位のいずれかが問題文と一致しないため除外します。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":470,"category":"産業保健","question":"A 社では定期健康診断の結果、BMI が基準を上回る職員が増加していることから、社員食堂でヘルシーメニューを提供することにした。A 社の活動として当てはまるのはどれか。","choices":["健康経営","コラボヘルス","作業環境管理","リワーク支援"],"answer":0,"explanation":"正答は1「健康経営」。問題文が問う概念・制度・支援場面に最も合う選択肢です。他の選択肢は、対象や目的、実施主体、優先順位のいずれかが問題文と一致しないため除外します。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":471,"category":"保健医療福祉行政論","question":"災害対策基本法に基づく市町村の役割はどれか。","choices":["避難所の指定","傷病者の広域搬送","基幹災害拠点病院の整備","被災者生活再建支援金の支給"],"answer":0,"explanation":"正答は1「避難所の指定」。災害対策基本法では、市町村が住民に最も近い基礎自治体として避難所指定や避難情報、地域防災計画などを担います。広域搬送や災害拠点病院整備は主に都道府県レベルの医療提供体制の文脈で考えます。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":472,"category":"保健医療福祉行政論","question":"リスクマネジメントの過程で正しいのはどれか。","choices":["リスク特定 → リスク分析 → リスク評価 → リスク対応","リスク評価 → リスク分析 → リスク特定 → リスク対応","リスク分析 → リスク特定 → リスク対応 → リスク評価","リスク分析 → リスク評価 → リスク特定 → リスク対応"],"answer":0,"explanation":"正答は1「リスク特定→リスク分析→リスク評価→リスク対応」。リスクマネジメントは、まず何がリスクかを特定し、発生可能性や影響を分析し、優先順位を評価してから対応を決めます。順序を入れ替えると、何に対応すべきか判断できません。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":473,"category":"保健医療福祉行政論","question":"A 市では新しい健康づくり計画と計画に基づく事業経過をホームページに掲載し、市の方針を明確にしている。この活動の目的はどれか。","choices":["モニタリング","アカウンタビリティ","パブリックコメント","リスクコミュニケーション"],"answer":1,"explanation":"正答は2「アカウンタビリティ」。行政が計画や経過を公表し、方針を明確にすることは説明責任を果たす活動です。モニタリングは進捗把握、パブリックコメントは意見募集、リスクコミュニケーションはリスク情報の双方向共有です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":474,"category":"公衆衛生看護学","question":"若い世代が多い A 市では、子どもの発育や発達に関する相談が 3 年間で 2 倍に増加した。また、現在 A 市では保健師 20 人のうち 5 人が産前休業、育児休業、介護休業のいずれかを取得している。A 市の保健師が行う業務管理はどれか。","choices":["職員の確保を行う。","保健事業の予算編成を行う。","保健事業の必要量を算出する。","育児休業明けの保健師のキャリアレベルを確認する。"],"answer":2,"explanation":"正答は3「保健事業の必要量を算出する。」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":475,"category":"成人・高齢者保健","question":"全体の傾向をみることで、都道府県のがん検診が効果的に実施されているかを把握できるがん登録の統計情報はどれか。","choices":["進行度","生存率","罹患数","治療効果"],"answer":0,"explanation":"正答は1「進行度」。問題文が問う概念・制度・支援場面に最も合う選択肢です。他の選択肢は、対象や目的、実施主体、優先順位のいずれかが問題文と一致しないため除外します。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":476,"category":"母子保健","question":"成育過程にある者及びその保護者並びに妊産婦に対し必要な成育医療等を切れ目なく提供するための施策の総合的な推進に関する法律〈成育基本法〉で定めているのはどれか。","choices":["不妊治療の保険適用","新生児マススクリーニング検査の実施","こどもまんなか社会の実現に向けた施策","成育過程における死亡原因に関する情報収集等の体制"],"answer":3,"explanation":"正答は4「成育過程における死亡原因に関する情報収集等の体制」。母子・学校保健の事例では、発達段階、安全性、保護者や児童生徒の不安、継続支援へのつなぎを優先して考えます。この選択肢は、対象者の状態を把握しながら必要な支援につなげる対応です。他の選択肢は、確認すべき情報が後回しになる、または支援の優先順位が低くなります。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":477,"category":"保健医療福祉行政論","question":"医療安全支援センターについて正しいのはどれか。","choices":["医療事故調査の支援を行う。","都道府県は設置の努力義務がある。","地域住民に医療安全に関する研修を行う。","地域保健法で業務内容が定められている。"],"answer":1,"explanation":"正答は2「都道府県は設置の努力義務がある。」。制度・法規の問題では、根拠法令、実施主体、計画の策定主体、対象者を分けて考えます。この選択肢は問題文の制度上の位置づけに合っています。他の選択肢は、別制度の内容、別の実施主体、または根拠法令の取り違えです。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":478,"category":"精神保健","question":"都道府県に自殺対策計画の策定を義務付けているのはどれか。","choices":["自殺対策基本法","自殺総合対策大綱","自殺対策加速化プラン","精神保健及び精神障害者福祉に関する法律〈精神保健福祉法〉"],"answer":0,"explanation":"正答は1「自殺対策基本法」。問題文が問う概念・制度・支援場面に最も合う選択肢です。他の選択肢は、対象や目的、実施主体、優先順位のいずれかが問題文と一致しないため除外します。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":479,"category":"母子保健","question":"保健師が乳児健康診査の面接で母子健康手帳を確認したところ、予防接種の接種歴がなかった。両親に確認すると、母親は「予防接種を受けさせたくない」と言い、父親は「他の家庭のように接種させたいのに困る」と言う。両親は互いの意見が合わずに悩んでいることがわかった。倫理的課題に対する両親の意思決定を支援するために、保健師が最初に行うことはどれか。","choices":["母親に予防接種のパンフレットを渡す。","母親に予防接種を受けさせたくない理由を聞く。","父親にどのように困っているかを聞く。","夫婦でよく話し合うように勧める。","夫婦に予防接種の必要性を伝える。"],"answer":1,"explanation":"正答は2「母親に予防接種を受けさせたくない理由を聞く。」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":480,"category":"成人・高齢者保健","question":"A さん（85 歳、女性）は通いの場に継続して参加している。保健師はＡさんから「耳の聞こえが悪く、にぎやかな中では聞き返してばかりで皆に迷惑をかけるから、通いの場への参加を辞めることを考えている」と相談を受けた。保健師が A さんへ最初に行う声かけで最も適切なのはどれか。","choices":["「補聴器を購入しましょう」","「聞こえづらさに悩まれつらい状況だったのですね」","「少人数で開催している別の通いの場を紹介しますね」","「80 代になれば誰しも耳の聞こえは悪くなりますよね」","「通いの場の皆さんに大きな声で話してもらうよう依頼します」"],"answer":1,"explanation":"正答は2「「聞こえづらさに悩まれつらい状況だったのですね」」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":481,"category":"学校保健","question":"インフルエンザに罹患した A さん（ 8 歳、小学 2 年生）は、1 月 11 日に 38.0 ℃でだるさのため早退し、1 月 13 日にインフルエンザと診断され、1 月 18 日に解熱し症状が改善した。A さんの出席停止期間が終了し、登校できる日はどれか。","choices":["1 月 19 日","1 月 20 日","1 月 21 日","1 月 22 日","1 月 23 日"],"answer":2,"explanation":"正答は3「1 月 21 日」。母子・学校保健の事例では、発達段階、安全性、保護者や児童生徒の不安、継続支援へのつなぎを優先して考えます。この選択肢は、対象者の状態を把握しながら必要な支援につなげる対応です。他の選択肢は、確認すべき情報が後回しになる、または支援の優先順位が低くなります。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":482,"category":"公衆衛生看護学","question":"発災直後の初動体制で、被災地の保健師が最初に行うのはどれか。","choices":["自治体外からの応援を要請する。","自宅避難者の安否把握を優先する。","活動拠点となる施設の安全を確保する。","被災情報が集まってから活動を開始する。","食中毒予防のためのパンフレットを作成する。"],"answer":2,"explanation":"正答は3「活動拠点となる施設の安全を確保する。」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":483,"category":"関係法規","question":"臨時予防接種について定めている法律はどれか。","choices":["感染症の予防及び感染症の患者に対する医療に関する法律〈感染症法〉","新型インフルエンザ等対策特別措置法","予防接種法","地域保健法","検疫法"],"answer":2,"explanation":"正答は3「予防接種法」。制度・法規の問題では、根拠法令、実施主体、計画の策定主体、対象者を分けて考えます。この選択肢は問題文の制度上の位置づけに合っています。他の選択肢は、別制度の内容、別の実施主体、または根拠法令の取り違えです。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":484,"category":"保健医療福祉行政論","question":"特定健康診査で脂質の値が高い者の割合が増加している A 市では、 5 年前から脂質異常症予防事業に取り組んでおり、事業の進行管理のために評価を行った。この事業のアウトカム指標はどれか。","choices":["事業参加者数","血液検査の予算額","事業対象者への周知回数","A 市医師会と行う連絡会議の回数","特定健康診査における脂質異常の有所見率"],"answer":4,"explanation":"正答は5「特定健康診査における脂質異常の有所見率」。アウトカム評価は、事業によって最終的に改善したい健康状態や行動の変化を見る指標です。この事例では脂質異常症予防が目的なので、有所見率の変化がアウトカムです。参加者数、周知回数、会議回数、予算は実施量や体制の評価です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":485,"category":"疫学","question":"野菜摂取量と糖尿病の有無の関係を検討するために、 1 日の野菜摂取量、糖尿病の有無、属性情報を収集した。野菜摂取量と年齢に関連のあることが分かっているとき、適切な解析方法はどれか。","choices":["野菜摂取量で層化を行う。","糖尿病の有無で標準化を行う。","年齢で調整する多変量解析を行う。","年齢と野菜摂取量でマッチングを行う。","解析対象として糖尿病を有する人に限定する。"],"answer":2,"explanation":"正答は3「年齢で調整する多変量解析を行う」。年齢が野菜摂取量とも糖尿病とも関連し得るため、交絡因子として調整する必要があります。単純な比較では、野菜摂取量の効果と年齢の影響が混ざります。多変量解析で年齢を調整するのが適切です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":486,"category":"疫学","question":"同じスクリーニング検査を有病率（有病割合）が 1 % の集団 A と 20 % の集団 B に行った。評価指標と集団の関係について正しいのはどれか。","choices":["特異度は集団 A より集団 B の方が高い。","敏感度は集団 A より集団 B の方が高い。","集団 A と集団 B で評価指標は一致している。","陰性反応的中度は集団 A より集団 B の方が高い。","陽性反応的中度は集団 A より集団 B の方が高い。"],"answer":4,"explanation":"正答は5「陽性反応的中度は集団Aより集団Bの方が高い」。感度・特異度は検査そのものの性質なので、同じ検査なら原則として集団AとBで同じです。一方、陽性的中度は有病率に強く影響されます。有病率が高い集団Bでは、陽性者の中に真の患者が含まれる割合が高くなるため、陽性的中度は高くなります。陰性的中度は逆に、有病率が低い集団で高くなりやすい点も押さえます。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文","explanationImage":"assets/explain-kokushi-screening-ppv.png","explanationImageAlt":"有病率1%と20%の集団で、同じ検査でも陽性的中度が変わる理由を示す図"},{"id":487,"category":"保健統計学","question":"令和元年の時点で「 1 日の果物摂取量が 100 g 未満の者」は 20 歳以上の 60 % である。20 歳以上の集団から無作為に選んだ 100 人の中で「 1 日の果物摂取量が 100 g 未満の者」の人数が従う確率分布として適切なのはどれか。","choices":["F 分布","t 分布","正規分布","二項分布","χ〈カイ 2 乗〉分布"],"answer":3,"explanation":"正答は4「二項分布」。100人を無作為に選び、各人が「果物摂取量100g未満である／ない」という二値の結果をとる場面です。一定の確率で起こる事象の回数を数えるので二項分布を用います。t分布、F分布、χ2分布は検定統計量の分布として使われる場面が異なります。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":488,"category":"保健統計学","question":"薬剤 A が薬剤 B と比較して高頻度に肝機能障害を起こすかどうか、データベースを用いて評価した。統計的仮説検定およびその解釈として正しいのはどれか。","choices":["p 値は肝機能障害発症確率のことである。","有意水準は統計的仮説検定を実施した後で決める。","対立仮説は「薬剤 A と薬剤 B の肝機能障害発症頻度に差はない」である。","有意水準より大きな p 値が得られた場合、薬剤 A と薬剤 B の肝機能障害発症頻度が同程度であると示されたことにはならない。","有意水準より小さな p 値が得られた場合、分析に用いた人数によらず薬剤 A は薬剤 B と比較して高頻度に肝機能障害を引き起こすと判断する。"],"answer":3,"explanation":"正答は4「有意水準より大きなp値が得られた場合、同程度であると示されたことにはならない」。p値が有意水準より大きい場合は、帰無仮説を棄却できないという意味であり、「差がないことを証明した」わけではありません。p値は発症確率そのものではなく、データが帰無仮説の下でどの程度起こりにくいかを表す指標です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":489,"category":"保健統計学","question":"人口に関連する指標の説明で正しいのはどれか。","choices":["75 歳以上の人口割合を高齢化率という。","老年化指数は（老年人口÷総人口）× 100 で算出する。","老年人口指数は（老年人口÷年少人口）× 100 で算出する。","高齢化社会から高齢社会へ移行する所要期間を倍加年数という。","総人口に占める高齢者の割合が 20 % 以上の社会を超高齢社会という。"],"answer":3,"explanation":"正答は4「高齢化社会から高齢社会へ移行する所要期間を倍加年数という」。倍加年数は、高齢化率が7%から14%へ倍になるまでの期間を指します。高齢化率は65歳以上人口の割合、超高齢社会は21%以上であり、用語の定義を正確に区別します。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":490,"category":"公衆衛生看護学","question":"オタワ憲章で提唱されているヘルスプロモーションの活動方針で正しいのはどれか。2 つ選べ。","choices":["共生社会の実現","個人技術の向上","適正技術の使用","地域資源の有効活用","健康的な公共政策づくり"],"answers":[1,4],"answer":1,"explanation":"正答は2「個人技術の向上」と5「健康的な公共政策づくり」。オタワ憲章の5つの活動方針は、健康的な公共政策づくり、健康を支援する環境づくり、地域活動の強化、個人技術の向上、ヘルスサービスの方向転換です。選択肢の中でこれに該当するものを選びます。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":491,"category":"成人・高齢者保健","question":"A 市の保健師は通いの場に参加している高齢者を対象に、基本チェックリストを使用して生活機能を評価することにした。運動機能の低下を判断する基準に含まれる項目はどれか。2 つ選べ。","choices":["友人の家を訪ねていますか","15 分位続けて歩いていますか","週に 1 回以上は外出していますか","転倒に対する不安は大きいですか","バスや電車で 1 人で外出していますか"],"answers":[1,3],"answer":1,"explanation":"正答は2「15分位続けて歩いていますか」と4「転倒に対する不安は大きいですか」。基本チェックリストの運動器機能では、階段昇降、椅子からの立ち上がり、15分歩行、転倒経験、転倒不安などを確認します。友人訪問や外出頻度は閉じこもり・社会参加の評価に近い項目です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":492,"category":"学校保健","question":"学校における保健教育で適切なのはどれか。2 つ選べ。","choices":["小学校の保健の授業は 1 年生から行う。","教育基本法で学習内容が規定されている。","個別の指導は養護教諭が中心となって行う。","生涯を通じて健康に生きるための資質・能力の育成を目標にする。","養護教諭は 1 年以上勤務する場合に勤務校の保健の授業を担当できる。"],"answers":[2,3],"answer":2,"explanation":"正答は3・4「個別の指導は養護教諭が中心となって行う。／生涯を通じて健康に生きるための資質・能力の育成を目標にする。」。この問題は、複数の正しい選択肢を同時に拾う問題です。正答選択肢はいずれも問題文の制度・事例条件に直接対応しています。一方、残りの選択肢は、対象、根拠法令、実施主体、時期、または支援の優先順位がずれているため除外します。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":493,"category":"産業保健","question":"粉じんによる健康障害を防止するための対策として適切なのはどれか。2 つ選べ。","choices":["防じんマスクの使用","発生源の密閉化、湿式化","6 か月以内ごとの配置転換","屋内の作業場所の週 1 回の清掃","じん肺健康診断の 5 年間の記録保存"],"answers":[0,1],"answer":0,"explanation":"正答は1・2「防じんマスクの使用／発生源の密閉化、湿式化」。この問題は、複数の正しい選択肢を同時に拾う問題です。正答選択肢はいずれも問題文の制度・事例条件に直接対応しています。一方、残りの選択肢は、対象、根拠法令、実施主体、時期、または支援の優先順位がずれているため除外します。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":494,"category":"感染症","question":"感染症の予防及び感染症の患者に対する医療に関する法律〈感染症法〉で医療費の公費負担が規定されているのはどれか。2 つ選べ。","choices":["コレラ","痘そう","日本脳炎","急性灰白髄炎〈ポリオ〉","腸管出血性大腸菌感染症"],"answers":[1,3],"answer":1,"explanation":"正答は2・4「痘そう／急性灰白髄炎〈ポリオ〉」。この問題は、複数の正しい選択肢を同時に拾う問題です。正答選択肢はいずれも問題文の制度・事例条件に直接対応しています。一方、残りの選択肢は、対象、根拠法令、実施主体、時期、または支援の優先順位がずれているため除外します。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":495,"category":"成人・高齢者保健","question":"A さん（34 歳、男性、会社員）は、妻（30 歳）と長女（生後 7 か月）の 3 人暮らしである。妻と長女が乳児健康相談のため保健センターに来所した。妻から「夫が毎日 20 本以上喫煙しています。子どもへの影響が心配です」と保健師に相談があった。保健師が確認する A さんの情報で優先するのはどれか。","choices":["禁煙経験","健康診査受診歴","職場の禁煙対策","自宅での喫煙場所"],"answer":3,"explanation":"正答は4「自宅での喫煙場所」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":496,"category":"成人・高齢者保健","question":"2 週後、A さんが妻に勧められ保健センターに来所した。A さんは「タバコを吸うと落ち着くのでやめる気はなく、やめられるとも思えません。私は今まで病気になったことがなく、40 年以上タバコを吸っている父親も健康です」と保健師に話した。ヘルスビリーフモデルにおける現在の A さんの状況はどれか。","choices":["保健行動に対する認知された障害が高い。","保健行動に対する認知された利益が高い。","疾病や健康問題に対する認知された重大性が高い。","疾病や健康問題に対する認知された脆弱性が高い。"],"answer":0,"explanation":"正答は1「保健行動に対する認知された障害が高い」。Aさんは、喫煙で落ち着く、やめる気がない、やめられると思えないと話しています。これは禁煙行動に対して心理的な障壁を強く感じている状態です。重大性や脆弱性の認知はむしろ低く、利益の認知も高くありません。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":497,"category":"母子保健","question":"A さん（25 歳、女性、パートタイム勤務）は 1 人暮らしである。「妊娠検査薬で陽性が出たので、母子健康手帳をもらえますか」と B 市の母子保健窓口に来所した。パートナーはいるが同居はしていない。このときの面談で、保健師が把握する情報で優先度が高いのはどれか。","choices":["育児支援者の有無","A さんの精神状態","健康保険加入状況","産科の受診の有無","パートナーとの同居の予定"],"answer":3,"explanation":"正答は4「産科の受診の有無」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":498,"category":"母子保健","question":"その後、A さんは、妊娠 36 週に経腟分娩で女児（身長 46 cm、出生時体重 2,450 g）を出産した。出産した病院から保健センターへの退院時連絡票に「A さんは子どもの抱き方に慣れず、今後の育児が気がかり」と記載があった。そこで、退院 2 日後に保健師が家庭訪問した。保健師が援助をするために収集する情報で優先度が高いのはどれか。","choices":["居住環境","経済状況","授乳状況","A さんの健康状態","保育所利用の可能性"],"answer":2,"explanation":"正答は3「授乳状況」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":499,"category":"母子保健","question":"保健師は、次は 4 か月児健康診査で経過を把握しようと計画していたが、未受診だった。保健師は A さんに電話をしたが、つながらなかったので自宅を訪問した。部屋にはパートナーもおり、A さんのアパートに転居していたことがわかった。A さんは「健診はうっかりして受けませんでしたが、特に気になることはありません。毎日 2 人で一緒に育児ができて嬉しいです」と話した。保健師は、子どもの発育・発達には問題がないことを確認した。保健師が次に確認する内容で優先度が高いのはどれか。","choices":["パートナーの転居理由","A さんと近隣住民との交流","A さんとパートナーの経済状況","子育て支援センターの利用経験"],"answer":2,"explanation":"正答は3「A さんとパートナーの経済状況」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":500,"category":"学校保健","question":"A さん（12 歳、女子、小学 6 年生）は 5 月の 3 週目に頭痛と立ちくらみで 2 回保健室に来室したが、短時間の休養で授業に戻った。5 月の 4 週目の本日、5 時間目の体育の授業中に、運動場で A さんが頭痛、嘔気、ふらつきを訴えていると養護教諭に連絡が入った。5 時間目の授業開始時点の気温は 32.5 ℃、湿度 61.0 % であった。体育ではリレーの練習をしていた。養護教諭が到着すると、A さんはしゃがみこんでおり、熱中症が疑われた。養護教諭が最初に行う対応はどれか。","choices":["衣服を緩める。","意識を確認する。","木陰に移動する。","濡れたタオルを体に当てる。"],"answer":1,"explanation":"正答は2「意識を確認する。」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":501,"category":"学校保健","question":"A さんは 6 月の 1 週目と 2 週目にも、頭痛や倦怠感を訴えて保健室に来室した。養護教諭が話を聞くと、放課後に中学受験のための学習塾と、バレエ教室に通っていることが分かった。A さんはバレエ教室の仲間と比較して太り気味な体型であることを気にしており、学習塾で食べるために母親が作った弁当を捨てていると話した。養護教諭が A さんの身体計測をすると、身長 150.8 cm、体重 36.0 kg、肥満度－ 16.5 % であった。養護教諭が支援を検討するために追加で必要な A さんの情報で、最も適切なのはどれか。","choices":["母親への相談状況","学級での活動の様子","就学後の身体計測結果","バレエ教室での運動強度","中学受験へのストレスの程度"],"answer":2,"explanation":"正答は3「就学後の身体計測結果」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":502,"category":"学校保健","question":"9 月になり、夏休みが終了して登校した A さんは、スポーツ大会に向けて早朝ランニングに取り組んでいると話した。身体計測の結果、身長 151.4 cm、体重 34.2 kg。肥満度－ 21.5 % であった。養護教諭が担任と協力して専門医療機関への受診を勧める上で、連携する職種として適切なのはどれか。","choices":["学校医","栄養教諭","保健主事","スクールソーシャルワーカー"],"answer":0,"explanation":"正答は1「学校医」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":503,"category":"公衆衛生看護学","question":"A 市で震度 6 強の地震が発生した。発災後 9 日目、立ち上げた 10 か所の避難所では、他自治体から派遣された保健師チームが、避難所の環境整備や避難者の健康観察を行っている。A 市の保健師は派遣された保健師チームから「避難者の中で 6 割以上を占める高齢者は、区画されたエリアで日中座っていることが多い。内服薬があと数日でなくなる人も散見される。地震を思い出して夜間眠れないという声が増えてきた。乳幼児を連れた家族は家族だけの時間を持ちたいと言い車中泊に切り替えた人もいる。日中、避難所に人が少ない時に、これまで見かけなかった人が避難所を覗いていたという声がある」という報告を受けた。このときの A 市の保健師の活動で適切なのはどれか。","choices":["日中の見張り役を担う。","高齢者個々への直接支援を率先して担う。","災害派遣精神医療チーム〈DPAT〉の巡回を提案する。","車中泊の家族への支援時間を減らすことを保健師チームへ指示する。","内服薬が必要な人の残薬を保健師チームで管理することを指示する。"],"answer":2,"explanation":"正答は3「災害派遣精神医療チーム〈DPAT〉の巡回を提案する」。発災9日目で、避難所生活が続き、不眠・不安・トラウマ反応の訴えが増えている場面です。A市保健師は既存の派遣保健師チームと連携しつつ、精神保健の専門支援であるDPAT巡回を提案するのが適切です。高齢者支援や薬の確保も重要ですが、保健師が直接すべてを担うより、専門チームと役割分担して支援体制を整えます。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文","explanationImage":"assets/explain-kokushi-disaster-dpat.png","explanationImageAlt":"発災後9日目の避難所で不眠や不安の声が増えた場合にDPAT巡回を提案する判断を示す図"},{"id":504,"category":"公衆衛生看護学","question":"発災後 2 か月が過ぎ、A 市では親族宅へ引っ越したり仮設住宅へ入居したりする人も増えてきた。保健師は、被災者の中に生活再建に希望を持てず不安が強い人や、家族を失い孤独感を強めている人、避難先でこれまでのコミュニティを失い役割を見出せず無気力になっている人、これらによって閉じこもりがちになっている人等、支援が必要な人が複数いることを把握している。この時期の仮設住宅での保健活動で適切なのはどれか。","choices":["住民同士が語り合える場をつくる。","罹災証明を発行する窓口を立ち上げる。","深部静脈血栓症〈DVT〉の予防啓発をする。","課題が把握できている人を優先して対応する。"],"answer":0,"explanation":"正答は1「住民同士が語り合える場をつくる。」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":505,"category":"公衆衛生看護学","question":"発災後 7 か月が経過し、ボランティアも含め外部支援者は減ってきた。A 市では、12 名の保健師の内 2 名が被災によって退職した。働いている保健師の中には「笑っても良いのだと思ったのは被災後 6 か月だった」と語る人もいる。一方で、住民からは育児相談や中断している育児支援教室に関する問い合わせが増えてきた。A 市の統括保健師は、休止していた母子保健事業の全面再開と共に、次の災害へ備えた保健師の活動体制作りを考えている。A 市の統括保健師によるスタッフへの対応で適切なのはどれか。","choices":["保健所保健師に事業の再開を依頼する。","保健師チームによる応援の増強を要請する。","住民への全戸訪問を最優先するように伝える。","職場で保健師自らの気持ちを話す機会を作る。"],"answer":3,"explanation":"正答は4「職場で保健師自らの気持ちを話す機会を作る」。発災後7か月で外部支援が減り、保健師自身にも疲労や喪失感が残る時期です。統括保健師は事業再開だけでなく、スタッフの心理的ケアとチームの回復を支える必要があります。感情を共有できる場は二次受傷や燃え尽き予防につながります。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":506,"category":"保健医療福祉行政論","question":"A 市の国民健康保険を担当する保健師は、加入者の平均年齢が上昇していることを把握したため、データヘルス計画を見直すこととした。データヘルス計画の見直しにあたり、国保データベース〈KDB〉で把握するもので優先度が高い指標はどれか。","choices":["介護給付費","難病の医療費","新規要介護認定者数","特定保健指導実施率","特定健康診査結果の有所見率"],"answer":2,"explanation":"正答は3「新規要介護認定者数」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":507,"category":"保健医療福祉行政論","question":"A 市は人口 15 万人で、高齢化率が高く、中小企業が多い。市外へ転出する者が多く、市の基本構想において「経済発展」と「暮らしの安心」という重点戦略を設定している。データヘルス計画とあわせて健康増進計画も見直すこととし、A 市の基本構想をふまえて整理することとなった。データヘルス計画や健康増進計画に定める取り組みで、A 市の基本構想である「経済発展」に寄与するもので最も適切なのはどれか。","choices":["医療費の適正化","地域医療提供体制の充実","健康づくりに取り組む事業者の表彰","がん治療と仕事の両立支援を行う相談窓口の開設"],"answer":2,"explanation":"正答は3「健康づくりに取り組む事業者の表彰」。制度・法規の問題では、根拠法令、実施主体、計画の策定主体、対象者を分けて考えます。この選択肢は問題文の制度上の位置づけに合っています。他の選択肢は、別制度の内容、別の実施主体、または根拠法令の取り違えです。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":508,"category":"公衆衛生看護学","question":"A 市の B 地区担当保健師は、B 地区の健康づくり計画を策定することとした。健康づくり計画を策定するにあたり、地域の住民や民生委員などが集まり、健康診査受診率の向上について重点的に検討する会議を開催することとなった。会議では「健診は大切」という意見があった一方、一部の人から「仕事が忙しくて健診に行けない」「健診を受けなくても元気な人がいる」「病気になったら病院を受診して治療をすればよい」等の意見もあった。会議で B 地区担当保健師がコミュニティエンパワメントを促す支援として最も適切なのはどれか。","choices":["健康診査の制度について説明する。","健康診査の実施時期について要望を聞く。","健康診査を受診せず疾病が重症化し失業した事例を紹介する。","健康診査を受診することについてどのような認識があるか参加者にさらに発言を促す。"],"answer":3,"explanation":"正答は4「健康診査を受診することについてどのような認識があるか参加者にさらに発言を促す。」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":509,"category":"精神保健","question":"A さん（32 歳、女性）は 1 人暮らしで、両親は B 市内で A さんと別に生活している。A さんは会社で「自分はなんでもできる」と言い、同僚とトラブルを起こして、27 歳で退職となった。翌年、無理な自動車運転による交通事故を起こし、入院先の病院で双極症〈双極性障害〉と診断された。1 か月の入院ののちに退院したが、その後はアルバイトを転々としながら暮らしている。ある日、母親が B 市保健センターに来所し「A の自宅に行ったら、ずっと布団に入ったまま、食事もちゃんと摂っていないようです。A は眠れない、死にたいと言っている。どうしたら良いでしょうか」と相談があった。地区担当保健師が母親と一緒に A さん宅を訪問した。A さんは、痩身で顔は青白く、表情は乏しい。保健師が A さんに確認する内容で優先されるのはどれか。","choices":["受診の有無","食事の摂取量","自殺企図の有無","布団から出ない理由"],"answer":2,"explanation":"正答は3「自殺企図の有無」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":510,"category":"精神保健","question":"その後、A さんは精神科に 3 か月入院した。退院後は地区担当保健師が、月 1 回程度訪問をしている。退院 3 か月後のある日、A さん宅を訪問すると A さんは笑顔で覇気があり「薬に頼らなくても、よく眠れるようになりました。体調も良いし、主治医も次回受診のことは言ってなかったので通院はもう終わりです。これからアルバイトを探す予定です」と話した。A さんへの地区担当保健師の支援で最も優先度が高いのはどれか。","choices":["患者会への参加を勧める。","母親に近況を報告するよう勧める。","保健師と一緒に受診することを提案する。","民生委員に見守りを依頼することの了解を得る。"],"answer":2,"explanation":"正答は3「保健師と一緒に受診することを提案する。」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第112回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第112回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp260424-03_04_05.html"},{"title":"厚労省｜第112回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03a_01.pdf"},{"title":"厚労省｜第112回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp260424-03seitou.pdf"}],"type":"保健師国試原文"},{"id":511,"category":"保健医療福祉行政論","question":"地域・職域連携推進協議会について正しいのはどれか。","choices":["三次予防事業を実施する。","事務局は産業医が担当する。","都道府県協議会を設置する。","労働安全衛生法を根拠とする。"],"answer":2,"explanation":"正答は3「都道府県協議会を設置する。」。制度・法規の問題では、根拠法令、実施主体、計画の策定主体、対象者を分けて考えます。この選択肢は問題文の制度上の位置づけに合っています。他の選択肢は、別制度の内容、別の実施主体、または根拠法令の取り違えです。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":512,"category":"公衆衛生看護学","question":"ソーシャルキャピタルで正しいのはどれか。","choices":["下部組織として地区組織活動がある。","健康の社会的決定要因の 1 つである。","健康増進法で活用することが示されている。","グリーン‚ L. W.〈Green, L. W. 〉らが開発した概念である。"],"answer":1,"explanation":"正答は2「健康の社会的決定要因の 1 つである。」。問題文が問う概念・制度・支援場面に最も合う選択肢です。他の選択肢は、対象や目的、実施主体、優先順位のいずれかが問題文と一致しないため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":513,"category":"成人・高齢者保健","question":"A さん（86 歳、女性、1 人暮らし）は、運動機能の低下のため要支援 2 と認定された。保健師が行う A さんのケアマネジメントで正しいのはどれか。","choices":["立案した計画は 1 年に 1 回評価する。","多職種によるチームで継続的に支援する。","インフォーマルなサービスは支援計画に含めない。","地域包括支援センターの保健師の独占業務である。"],"answer":1,"explanation":"正答は2「多職種によるチームで継続的に支援する。」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite id":516,"category":"成人・高齢者保健","question":"A 市では 20 歳以上の女性を対象に骨粗鬆症検診を実施している。骨粗鬆症の効果的な早期発見のために、検診の受診を案内する通知のターゲットを絞り、個別に送付することとした。通知を送付する対象で優先度が高いのはどれか。","choices":["大学生","骨粗鬆症の治療中断者","当該年度に 50 歳を迎える者","特定健康診査の結果で BMI が 25 以上の者"],"answer":2,"explanation":"正答は3「当該年度に 50 歳を迎える者」。問題文が問う概念・制度・支援場面に最も合う選択肢です。他の選択肢は、対象や目的、実施主体、優先順位のいずれかが問題文と一致しないため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":517,"category":"精神保健","question":"日本の精神保健医療施策の変遷と関係する法律の組合せで正しいのはどれか。","choices":["私宅監置の廃止　精神衛生法","ライシャワー事件を契機に制定　精神病者監護法","精神医療に関する日本の最初の法律　精神保健法","精神障害者を「障害者」として位置付け　精神保健及び精神障害者福祉に関する法律〈精神保健福祉法〉"],"answer":0,"explanation":"正答は1「私宅監置の廃止　精神衛生法」。問題文が問う概念・制度・支援場面に最も合う選択肢です。他の選択肢は、対象や目的、実施主体、優先順位のいずれかが問題文と一致しないため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":518,"category":"精神保健","question":"精神障害者に対する偏見の解消に向けた取り組みで正しいのはどれか。","choices":["患者会の立ち上げ","ピアサポーターによる相談","精神障害に関する市民講座の開催","病院受診時のホームヘルパーの同行"],"answer":2,"explanation":"正答は3「精神障害に関する市民講座の開催」。問題文が問う概念・制度・支援場面に最も合う選択肢です。他の選択肢は、対象や目的、実施主体、優先順位のいずれかが問題文と一致しないため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw ら、市の保健師と教育委員会の学校保健担当者が連携して、学校でのフッ化物洗口事業を開始することになった。事業内容で適切なのはどれか。","choices":["中学生を対象とする。","う蝕のある子どもを対象とする。","並行してブラッシング指導を実施する。","学校歯科医の診断結果で実施の可否を判断する。"],"answer":2,"explanation":"正答は3「並行してブラッシング指導を実施する。」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":522,"category":"感染症","question":"A さん（女児、小学 3 年生）は、昨日の給食後にトイレで嘔吐したため、早退した。今朝、A さんの保護者から「病院を受診したところ、ノロウイルスによる感染性胃腸炎と診断された」と連絡があった。このときの校内での感染拡大防止対策で優先度が高いのはどれか。","choices":["児童全員の健康観察を実施する。","A さんが在籍するクラスを臨時休業にする。","保護者に保健だよりで感染症予防の指導を行う。","教職員を対象にした吐物の処理方法の研修会を行う。"],"answer":0,"explanation":"正答は1「児童全員の健康観察を実施する。」。感染症の問題では、分類、届出、調査、公費負担、感染経路、接触者対応を分けて判断します。この選択肢は、問題文で求められている感染症対策の原則に合っています。他の選択肢は、感染症分類や対応時期、感染経路、保健所の役割がずれています。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":523,"category":"感染症","question":"健康危機の発生の未然防止はどれか。","choices":["検疫所の業務","発熱相談センターの設置","感染症患者の接触者の健康調査","食中毒を起こした事業者の営業停止"],"answer":0,"explanation":"正答は1「検疫所の業務」。感染症の問題では、分類、届出、調査、公費負担、感染経路、接触者対応を分けて判断します。この選択肢は、問題文で求められている感染症対策の原則に合っています。他の選択肢は、感染症分類や対応時期、感染経路、保健所の役割がずれています。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":524,"category":"産業保健","question":"労働基準法に規定する労務管理で正しいのはどれか。","choices":["残業時間に上限は設けられていない。","労働者が 1 年に取得する義務がある年次有給休暇は最低 3 日である。","生後満 1 年に満たない生児を育てる女性は 1 日 2 回育児時間を取得できる。","前日の就業時刻と翌日の就業時刻の間を 10 時間以上空けなければならない。"],"answer":2,"explanation":"正答は3「生後満 1 年に満たない生児を育てる女性は 1 日 2 回育児時間を取得できる。」。問題文が問う概念・制度・支援場面に最も合う選択肢です。他の選択肢は、対象や目的、実施主体、優先順位のいずれかが問題文と一致しないため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":525,"category":"保健統計学","question":"幼稚園 A、B で、全園児を対象に小児気管支喘息の有病率（有病割合）を調査したところ、A は 2 %、B は 7 %であった。また、5 歳児クラスだけに限った場合でも A、B の有病率（有病割合）はそれぞれ 2 %、7 %であった。仮説検定を用いた両幼稚園の有病率（有病割合）の検討で正しいのはどれか。","choices":["園児数が十分に多かったので χ〈カイ 2 乗〉検定を用いた。","帰無仮説は「幼稚園 A と B の有病率（有病割合）に差がある」である。","園児数が十分に多かったので Mann-Whitney〈マン - ホイットニー〉の U 検定を用いた。","全園児と 5 歳児クラスそれぞれのデータに同じ検定を実施した場合、同じ p 値になる。"],"answer":0,"explanation":"正答は1「園児数が十分に多かったのでχ2検定を用いた」。有病率のような割合の差を2群で比較する場合、標本数が十分ならχ2検定を用います。帰無仮説は「差がない」です。Mann-WhitneyのU検定は順位を用いる連続・順序データの比較であり、この場面には合いません。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":526,"category":"精神保健","question":"精神保健福祉センターについて正しいのはどれか。","choices":["精神医療審査会の事務を行う。","地域保健法に規定されている。","令和 5 年（2023 年）1 月時点で全国に 468 か所設置されている。","令和 3 年度（2021 年度）の相談実績は電話相談より来所相談の方が多い。"],"answer":0,"explanation":"正答は1「精神医療審査会の事務を行う。」。問題文が問う概念・制度・支援場面に最も合う選択肢です。他の選択肢は、対象や目的、実施主体、優先順位のいずれかが問題文と一致しないため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":527,"category":"保健医療福祉行政論","question":"世界保健機関〈WHO〉憲章第 21 条に基づく国際保健規則〈IHR〉の目的で正しいのはどれか。","choices":["疾病の国際的伝播を最大限に防止する。","国民の生命、身体及び財産を災害から保護する。","低中所得国に対して人的・物的・技術的資源を提供する。","国民の健康を守る役割を担う各国の保健大臣の連携を強化する。"],"answer":0,"explanation":"正答は1「疾病の国際的伝播を最大限に防止する。」。制度・法規の問題では、根拠法令、実施主体、計画の策定主体、対象者を分けて考えます。この選択肢は問題文の制度上の位置づけに合っています。他の選択肢は、別制度の内容、別の実施主体、または根拠法令の取り違えです。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":528,"category":"成人・高齢者保健","question":"介護保険制度における国の役割はどれか。","choices":["介護認定審査会を設置する。","介護保険審査会を設置する。","介護保険の財源の 12.5 % を負担する。","区分支給限度基準額の上限額を定める。"],"answer":3,"explanation":"正答は4「区分支給限度基準額の上限額を定める。」。問題文が問う概念・制度・支援場面に最も合う選択肢です。他の選択肢は、対象や目的、実施主体、優先順位のいずれかが問題文と一致しないため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":529,"category":"保健医療福祉行政論","question":"災害対策における福祉避難所の説明で適切なのはどれか。","choices":["都道府県知事が開設する。","所得に応じて利用費が発生する。","負傷者の救護活動が目的である。","福祉避難所の確保・運営ガイドラインが策定されている。"],"answer":3,"explanation":"正答は4「福祉避難所の確保・運営ガイドラインが策定されている。」。制度・法規の問題では、根拠法令、実施主体、計画の策定主体、対象者を分けて考えます。この選択肢は問題文の制度上の位置づけに合っています。他の選択肢は、別制度の内容、別の実施主体、または根拠法令の取り違えです。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":530,"category":"産業保健","question":"平成 14 年（2002 年）と令和 4 年（2022 年）の労働力調査における女性の年齢階級別労働力率の推移を示す。令和 4 年（2022 年）の M 字カーブの底が、平成 14 年（2002 年）と比較して浅くなっている現象の説明で正しいのはどれか。","choices":["完全失業率の上昇","女性管理職の割合の増加","非正規雇用者の割合の増加","有配偶者の労働力率の上昇"],"answer":3,"explanation":"正答は4「有配偶者の労働力率の上昇」。問題文が問う概念・制度・支援場面に最も合う選択肢です。他の選択肢は、対象や目的、実施主体、優先順位のいずれかが問題文と一致しないため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":531,"category":"母子保健","question":"A さん（30 歳、女性、アルバイト）は、1 人暮らし。妊娠 8 週で妊娠届出のために、保健センターに来所した。「子どもは産みたいけれど、パートナーとは連絡がとれず出産費用や育児が心配」と話す。実父母は車で 1 時間のところに住む。本人は、10 歳代から気分障害があり精神科クリニックに通院し状態は落ち着いている。地区担当保健師の A さんへの支援で、最初に行うのはどれか。","choices":["出産や育児の準備状況を聞き、援助関係を形成する。","通院先の精神科クリニックと連携する。","出産予定の産婦人科医院と連携する。","経済的支援の相談窓口を紹介する。","A さんの実父母との調整を行う。"],"answer":0,"explanation":"正答は1「出産や育児の準備状況を聞き、援助関係を形成する。」。事例問題では、まず緊急性・安全確保・本人や家族の意向・支援関係の形成・関係機関連携の順に整理します。この選択肢は、問題文で示された困りごとやリスクに最も直接対応しており、次の支援につながるため最も適切です。他の選択肢は、介入が早すぎる、本人の状況把握が不足している、または優先順位が低いため不適切です。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":532,"category":"母子保健","question":"1 歳 6 か月児健康診査において、児の標準的な発達を確認するための質問で適切なのはどれか。","choices":["「ひとりでパンツを脱ぐことができますか」","「積み木を 8 個積むことができますか」","「こぼさないでひとりで食べますか」","「丸（円）をまねて描けますか」","「ひとりで歩きますか」"],"answer":4,"explanation":"正答は5「「ひとりで歩きますか」」。母子・学校保健の事例では、発達段階、安全性、保護者や児童生徒の不安、継続支援へのつなぎを優先して考えます。この選択肢は、対象者の状態を把握しながら必要な支援につなげる対応です。他の選択肢は、確認すべき情報が後回しになる、または支援の優先順位が低くなります。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":533,"category":"関係法規","question":"母子保健法について適切なのはどれか。","choices":["疾病対策を重視した法律である。","戦後の困窮児童の保護を目的として制定された。","特定妊婦の支援や保護について明記されている。","都道府県が基本的な母子保健サービスを提供する。","母性・乳児・幼児の健康保持と増進を目的とした法律である。"],"answer":4,"explanation":"正答は5「母性・乳児・幼児の健康保持と増進を目的とした法律である。」。制度・法規の問題では、根拠法令、実施主体、計画の策定主体、対象者を分けて考えます。この選択肢は問題文の制度上の位置づけに合っています。他の選択肢は、別制度の内容、別の実施主体、または根拠法令の取り違えです。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":534,"category":"感染症","question":"A 県ではヒト免疫不全ウイルス〈HIV〉感染症の届出数が減少し、後天性免疫不全症候群〈AIDS〉の届出数が増加している。この 2 つの届出に関する A 県の国籍、年齢の分布、感染経路は全国の傾向と同様である。A 県のエイズ対策担当者が取り組む対策で優先度が高いのはどれか。","choices":["休日の検査体制の充実","母子感染予防対策の強化","エイズ治療拠点病院の指定数の増加","エイズ患者の地域ケアシステムの構築","外国人向けの予防啓発パンフレットの配布"],"answer":0,"explanation":"正答は1「休日の検査体制の充実」。感染症の問題では、分類、届出、調査、公費負担、感染経路、接触者対応を分けて判断します。この選択肢は、問題文で求められている感染症対策の原則に合っています。他の選択肢は、感染症分類や対応時期、感染経路、保健所の役割がずれています。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":535,"category":"成人・高齢者保健","question":"特定保健指導の初回面接に対する評価をするために、初回面接を実施した後に自記式質問紙調査を行った。自己効力感の向上に該当する回答はどれか。","choices":["「継続して取り組むのは大変だ」","「健診時に指導も受けられて良い機会だった」","「現在の生活を続けると病気にかかると思った」","「自分が立てた目標は 6 か月で達成できると思う」","「実行すると病気になる可能性が低くなるかもしれない」"],"answer":3,"explanation":"正答は4「自分が立てた目標は6か月で達成できると思う」。自己効力感は、自分ならその行動を実行できるという見通しや自信です。目標達成への自信を表す発言が該当します。危機感、機会の評価、利益の認識とは区別します。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":536,"category":"公衆衛生看護学","question":"豪雨による河川の氾濫のため A 市 B 地区の 3 分の 1 の住民が被災し、被災直後に市の災害対策本部が設置された。被災当日の A 市の保健師の対応で優先度が高いのはどれか。","choices":["ボランティアの調整","家屋の消毒方法の指導","避難行動要支援者の安否確認","全戸訪問による健康調査の実施","避難所でのコミュニティづくり"],"answer":2,"explanation":"正答は3「避難行動要支援者の安否確認」。被災当日は生命・安全の確認が最優先です。特に避難行動要支援者は災害時に支援が遅れやすいため、安否確認の優先度が高くなります。ボランティア調整や健康調査、コミュニティづくりは少し後の段階で行います。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":537,"category":"疫学","question":"観察研究における分析疫学の検討内容はどれか。","choices":["喫煙習慣と運動習慣との関係","市区町村ごとのワクチン接種率","食中毒の発生件数と季節との関係","適正体重の維持と心疾患の発症との関係","ランダム化比較試験〈RCT〉による新薬の効果"],"answer":3,"explanation":"正答は4「適正体重の維持と心疾患の発症との関係」。この問題は、指標の定義と使い分けを問うものです。正答選択肢は、問題文で求められている比較・推定・関連の見方に合っています。他の選択肢は、別の統計指標を説明している、前提条件が異なる、または因果関係と関連を取り違えているため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":538,"category":"疫学","question":"あるコホート研究において得られた結果を表に示す。曝露群：罹患者数 125 人、観察時間の合計 25,000 人年。非曝露群：罹患者数 30 人、観察時間の合計 30,000 人年。観察時間 1,000 人年当たりの罹患率から求めた曝露による寄与危険の値はどれか。","choices":["0.20","0.25","1.25","4.0","5.0"],"answer":3,"explanation":"正答は4「4.0」。曝露群の罹患率は125/25,000人年×1,000＝5.0、非曝露群は30/30,000人年×1,000＝1.0です。寄与危険は曝露群の罹患率−非曝露群の罹患率なので、5.0−1.0＝4.0となります。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文","explanationImage":"assets/explain-kokushi-attributable-risk.png","explanationImageAlt":"曝露群と非曝露群の罹患率を計算し、寄与危険4.0を導く図"},{"id":539,"category":"保健統計学","question":"2 種類の数量データの相関で正しいのはどれか。","choices":["相関係数は外れ値の影響を受けにくい指標である。","相関係数が大きいことは因果関係が確からしいことを意味する。","統計的に有意な相関がある変数間には、臨床的に有意な関連がある。","相関があるということは因果関係があるということの十分条件である。","変数間の関係が U 字型の場合には相関係数での関連の評価はできない。"],"answer":4,"explanation":"正答は5「変数間の関係がU字型の場合には相関係数での関連の評価はできない」。相関係数は主に直線的な関連を見る指標です。U字型のような非線形の関係では、関連があっても相関係数では適切に評価できないことがあります。相関は因果関係を証明するものではありません。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":540,"category":"保健統計学","question":"出生に関する記述で正しいのはどれか。","choices":["合計特殊出生率が 2.60 を下回ると人口減少が始まる。","合計特殊出生率は人口年齢構成の影響を受けやすい指標である。","総再生産率は母の年齢別出生率を女児だけについて合計したものである。","平成 12 年（2000 年）に、日本では初めて合計特殊出生率が 2.0 を下回った。","令和 4 年（2022 年）の日本において、母の年齢階級別出生率が最も高いのは 25～29 歳である。"],"answer":2,"explanation":"正答は3「総再生産率は母の年齢別出生率を女児だけについて合計したものである。」。この問題は、指標の定義と使い分けを問うものです。正答選択肢は、問題文で求められている比較・推定・関連の見方に合っています。他の選択肢は、別の統計指標を説明している、前提条件が異なる、または因果関係と関連を取り違えているため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":541,"category":"保健医療福祉行政論","question":"地域ケアシステムの「共助」はどれか。 2 つ選べ。","choices":["経済的に困窮した高齢者が生活保護を受給する。","低所得のひとり親世帯が児童扶養手当を受給する。","健康づくりのために家族で毎朝ウォーキングを行う。","要介護 4 の高齢者が介護保険制度による訪問看護を利用する。","仕事中に受傷した骨折の治療費を労働者災害補償保険から受給する。"],"answers":[3,4],"answer":3,"explanation":"正答は4「介護保険制度による訪問看護」と5「労災保険からの受給」。共助は社会保険のように、保険料を出し合って支え合う仕組みです。生活保護や児童扶養手当は公助、家族のウォーキングは自助に近いです。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":542,"category":"公衆衛生看護学","question":"A 市では健康増進計画を策定するにあたり、住民の意見を反映させることとなった。用いる方法で適切なのはどれか。 2 つ選べ。","choices":["フォトボイス","モニタリング","マスターテーブル","コミュニティワーク","タウンミーティング"],"answers":[0,4],"answer":0,"explanation":"正答は1・5「フォトボイス／タウンミーティング」。この問題は、複数の正しい選択肢を同時に拾う問題です。正答選択肢はいずれも問題文の制度・事例条件に直接対応しています。一方、残りの選択肢は、対象、根拠法令、実施主体、時期、または支援の優先順位がずれているため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":543,"category":"産業保健","question":"労働安全衛生マネジメントシステムに関する指針で正しいのはどれか。2 つ選べ。","choices":["保健師が事業場の安全衛生計画を策定する。","衛生委員会が事業場の安全衛生方針を表明する。","請負関係を除いた事業場を 1 つの単位として実施する。","事業者が労働者の協力の下に安全衛生活動を実施する。","事業場における自主的な安全衛生活動の促進を目指す。"],"answers":[3,4],"answer":3,"explanation":"正答は4・5「事業者が労働者の協力の下に安全衛生活動を実施する。／事業場における自主的な安全衛生活動の促進を目指す。」。この問題は、複数の正しい選択肢を同時に拾う問題です。正答選択肢はいずれも問題文の制度・事例条件に直接対応しています。一方、残りの選択肢は、対象、根拠法令、実施主体、時期、または支援の優先順位がずれているため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":544,"category":"産業保健","question":"石綿障害予防規則に基づく対応で正しいのはどれか。 2 つ選べ。","choices":["石綿の作業記録は 5 年間保存しなければならない。","事業者は石綿作業主任者を選任するよう努めなければならない。","建築物等の解体作業の際は石綿の使用状況の事前調査が必要である。","石綿を取り扱う作業者の健康診断は 6 か月に 1 回実施する必要がある。","石綿を取り扱う作業者の健康管理手帳は労働基準監督署から交付される。"],"answers":[2,3],"answer":2,"explanation":"正答は3・4「建築物等の解体作業の際は石綿の使用状況の事前調査が必要である。／石綿を取り扱う作業者の健康診断は 6 か月に 1 回実施する必要がある。」。この問題は、複数の正しい選択肢を同時に拾う問題です。正答選択肢はいずれも問題文の制度・事例条件に直接対応しています。一方、残りの選択肢は、対象、根拠法令、実施主体、時期、または支援の優先順位がずれているため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":545,"category":"感染症","question":"再興感染症はどれか。 2 つ選べ。","choices":["結核","マラリア","ウエストナイル熱","後天性免疫不全症候群〈AIDS〉","新型コロナウイルス感染症〈COVID-19〉"],"answers":[0,1],"answer":0,"explanation":"正答は1・2「結核／マラリア」。この問題は、複数の正しい選択肢を同時に拾う問題です。正答選択肢はいずれも問題文の制度・事例条件に直接対応しています。一方、残りの選択肢は、対象、根拠法令、実施主体、時期、または支援の優先順位がずれているため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/tp250428-03_04_05.html"},{"title":"厚労省｜第111回 午前問題PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03a_01.pdf"},{"title":"厚労省｜第111回 正答値表PDF","url":"https://www.mhlw.go.jp/seisakunitsuite/bunya/kenkou_iryou/iryou/topics/dl/tp250428-03seitou.pdf"}],"type":"保健師国試原文"},{"id":546,"category":"公衆衛生看護学","question":"保健師が行う事業管理について正しいのはどれか。 2 つ選べ。","choices":["予算を編成する。","業務分担を指示する。","職員の能力評価を行う。","保健活動の評価を行う。","組織の体系図を作成する。"],"answers":[1,3],"answer":1,"explanation":"正答は2・4「業務分担を指示する。／保健活動の評価を行う。」。この問題は、複数の正しい選択肢を同時に拾う問題です。正答選択肢はいずれも問題文の制度・事例条件に直接対応しています。一方、残りの選択肢は、対象、根拠法令、実施主体、時期、または支援の優先順位がずれているため除外します。","source":"厚生労働省｜第111回 保健師国家試験 午前問題・正答値表","links":[{"title":"厚労省｜第111回 保健師国家試験 問題・正答","url":"https://www.mhlw.go.
