民監査請求（地自法242条）は、普通地方公共団体の違法・不当な財務会計行為（公金の支出・財産管理等）を監査委員に請求する制度。","source":"地方自治法 第242条","links":[{"title":"e-Gov｜地方自治法","url":"https://elaws.e-gov.go.jp/document?lawid=322AC0000000067"},{"title":"総務省｜地方自治","url":"https://www.soumu.go.jp/main_sosiki/jichi_gyousei/bunken/index.html"}],"type":"予想問題","explanationImage":"assets/explain-general-local-autonomy.png","explanationImageAlt":"地方自治と住民監査請求の要点を示す教養問題向けインフォグラフィック"},{"id":162,"category":"教養_地方自治","question":"条例の制定改廃を直接請求する際に必要な署名数はどれか。","choices":["有権者の1/10以上","有権者の1/50以上","有権者の1/3以上","有権者の過半数"],"answer":1,"explanation":"条例の制定改廃請求（地自法74条）には有権者の50分の1以上の署名が必要。請求先は長（首長）で、議会に付議する。","source":"地方自治法 第74条","links":[{"title":"e-Gov｜地方自治法","url":"https://elaws.e-gov.go.jp/document?lawid=322AC0000000067"},{"title":"総務省｜地方自治","url":"https://www.soumu.go.jp/main_sosiki/jichi_gyousei/bunken/index.html"}],"type":"予想問題","explanationImage":"assets/explain-general-local-autonomy.png","explanationImageAlt":"地方自治と住民監査請求の要点を示す教養問題向けインフォグラフィック"},{"id":163,"category":"教養_地方自治","question":"地方公共団体が法律の範囲内で自主的に制定できる法形式はどれか。","choices":["政令","府省令","条例・規則","告示"],"answer":2,"explanation":"地方公共団体は条例（議会制定）と規則（長・委員会制定）を制定できる。法律の範囲内での自治立法。","source":"地方自治法 第14条・第15条","links":[{"title":"e-Gov｜地方自治法","url":"https://elaws.e-gov.go.jp/document?lawid=322AC0000000067"},{"title":"総務省｜地方自治","url":"https://www.soumu.go.jp/main_sosiki/jichi_gyousei/bunken/index.html"}],"type":"予想問題","explanationImage":"assets/explain-general-local-autonomy.png","explanationImageAlt":"地方自治と住民監査請求の要点を示す教養問題向けインフォグラフィック"},{"id":164,"category":"教養_地方自治","question":"市町村合併後の議員の身分について正しいのはどれか。","choices":["全員自動失職","合併後一定期間在任特例または選挙","知事が任命","任命制となる"],"answer":1,"explanation":"市町村合併の場合、合併後の議員は在任特例（一定期間そのまま在職）か速やかな選挙実施かを選択できる。","source":"地方自治法 第254条","links":[{"title":"e-Gov｜地方自治法","url":"https://elaws.e-gov.go.jp/document?lawid=322AC0000000067"},{"title":"総務省｜地方自治","url":"https://www.soumu.go.jp/main_sosiki/jichi_gyousei/bunken/index.html"}],"type":"予想問題"},{"id":165,"category":"教養_地方自治","question":"指定管理者制度について正しいのはどれか。","choices":["公の施設を民間・NPO等が管理できる制度","国直轄の施設のみ対象","指定管理者は公務員身分を得る","議会の議決は不要"],"answer":0,"explanation":"指定管理者制度（地自法244条の2）により、公の施設の管理を民間事業者・NPO等に委託可能。議会の議決が必要。","source":"地方自治法 第244条の2","links":[{"title":"e-Gov｜地方自治法","url":"https://elaws.e-gov.go.jp/document?lawid=322AC0000000067"},{"title":"総務省｜地方自治","url":"https://www.soumu.go.jp/main_sosiki/jichi_gyousei/bunken/index.html"}],"type":"予想問題"},{"id":170,"category":"教養_社会科学","question":"情報公開法（行政機関情報公開法）における不開示情報に含まれないのはどれか。","choices":["個人識別情報","法人の正当な利益を害する情報","行政の意思決定過程の審議情報","統計情報（個人識別不能）"],"answer":3,"explanation":"個人識別情報・法人情報・安全情報・審議検討情報・事務事業情報・国防・外交情報が不開示事由。個人識別不能な統計情報は開示対象。","source":"行政機関の保有する情報の公開に関する法律","links":[{"title":"法務省｜行政不服申立制度","url":"https://www.moj.go.jp/gyouseisoudan/gyouseisoudan01.html"}],"type":"予想問題"},{"id":174,"category":"教養_社会科学","question":"日本の国会の種類として誤っているのはどれか。","choices":["常会（通常国会）","臨時会（臨時国会）","特別会（特別国会）","緊急集会（参議院のみ）"],"answer":3,"explanation":"参議院の緊急集会は国会の種類ではなく緊急時の代替措置。国会の種類は常会・臨時会・特別会の3種（憲法52〜54条）。","source":"日本国憲法 第52〜54条","links":[{"title":"e-Gov｜日本国憲法","url":"https://elaws.e-gov.go.jp/document?lawid=321CONSTITUTION"},{"title":"総務省統計局｜社会統計","url":"https://www.stat.go.jp/data/index.html"}],"type":"予想問題"},{"id":175,"category":"教養_社会科学","question":"GDPの定義として正しいのはどれか。","choices":["一定期間に国民が生産した財・サービスの付加価値合計","一定期間に国内で生産された財・サービスの付加価値合計","国の総資産","一年間の税収総額"],"answer":1,"explanation":"GDP（国内総生産）は一定期間（通常1年）に国内で生産された財・サービスの付加価値合計。GNP/GNIは国民基準で国外生産分も含む。","source":"経済学 基本概念","links":[{"title":"総務省統計局｜社会統計","url":"https://www.stat.go.jp/data/index.html"}],"type":"予想問題"},{"id":176,"category":"教養_社会科学","question":"需要の価格弾力性が1より大きい場合の意味として正しいのはどれか。","choices":["価格変化率より需要量変化率が小さい","価格変化率より需要量変化率が大きい（弾力的）","価格変化に無反応","必需品に多い"],"answer":1,"explanation":"需要の価格弾力性＝需要量変化率÷価格変化率。1より大=弾力的（嗜好品・代替品あり）、1より小=非弾力的（必需品）。","source":"経済学 需要の弾力性","links":[{"title":"総務省統計局｜社会統計","url":"https://www.stat.go.jp/data/index.html"}],"type":"予想問題"},{"id":177,"category":"教養_社会科学","question":"日本銀行の金融政策手段として現在最も主要なものはどれか。","choices":["公開市場操作（国債売買等）","預金準備率操作","公定歩合操作のみ","外貨準備取崩し"],"answer":0,"explanation":"現在の日銀の主要手段は公開市場操作（買いオペ・売りオペ）と政策金利誘導。公定歩合（基準貸付利率）操作は現在は主役でなく、預金準備率操作も補助的。","source":"金融論 日本銀行","links":[{"title":"総務省統計局｜社会統計","url":"https://www.stat.go.jp/data/index.html"}],"type":"予想問題"},{"id":178,"category":"教養_社会科学","question":"累進課税の説明として正しいのはどれか。","choices":["所得が多いほど税率が高くなる","全員同一税率","消費に比例した税","逆進性がある"],"answer":0,"explanation":"累進課税は所得が増えるほど適用税率が高くなる仕組み（所得税・相続税等）。所得再分配機能がある。消費税は逆進性がある比例税。","source":"財政学 租税論","links":[{"title":"総務省統計局｜社会統計","url":"https://www.stat.go.jp/data/index.html"}],"type":"予想問題"},{"id":179,"category":"教養_社会科学","question":"社会保障の4本柱として正しい組合せはどれか。","choices":["社会保険・公的扶助・社会福祉・公衆衛生","医療保険・年金・介護・雇用","生活保護・障害福祉・児童福祉・高齢者福祉","国民健康保険・厚生年金・介護保険・雇用保険"],"answer":0,"explanation":"日本の社会保障制度の4本柱：①社会保険②公的扶助（生活保護）③社会福祉④公衆衛生（保健医療）。","source":"社会保障論","links":[{"title":"総務省統計局｜社会統計","url":"https://www.stat.go.jp/data/index.html"}],"type":"予想問題"},{"id":180,"category":"教養_社会科学","question":"完全失業率の定義として正しいのはどれか。","choices":["生産年齢人口に占める失業者の割合","労働力人口（就業者＋完全失業者）に占める完全失業者の割合","総人口に占める無職者の割合","求職者数÷求人数"],"answer":1,"explanation":"完全失業率＝完全失業者数÷労働力人口×100。完全失業者は①働く意思・能力がある②職に就いていない③求職活動中の全てを満たす者。","source":"労働経済学","links":[{"title":"総務省統計局｜社会統計","url":"https://www.stat.go.jp/data/index.html"}],"type":"予想問題"},{"id":181,"category":"教養_社会科学","question":"OECDの加盟国の特徴として正しいのはどれか。","choices":["主に開発途上国で構成","主に先進国・市場経済諸国で構成","国連の下部組織","医療専門の国際機関"],"answer":1,"explanation":"OECD（経済協力開発機構）は先進国・市場経済諸国で構成される国際機関。経済政策調整・統計データ提供・ガバナンス分析等を行う。","source":"国際機関","links":[{"title":"総務省統計局｜社会統計","url":"https://www.stat.go.jp/data/index.html"}],"type":"予想問題"},{"id":182,"category":"教養_社会科学","question":"財政政策における「クラウディング・アウト」の意味として正しいのはどれか。","choices":["政府支出増加が民間投資を増やす効果","政府の国債発行増加が金利上昇を招き民間投資を抑制する効果","税収増加による景気回復","貿易黒字の拡大"],"answer":1,"explanation":"クラウディング・アウトとは政府が国債を大量発行し資金需要が増加、金利が上昇して民間投資が抑制される現象。財政政策の有効性を弱める。","source":"マクロ経済学","links":[{"title":"総務省統計局｜社会統計","url":"https://www.stat.go.jp/data/index.html"}],"type":"予想問題"},{"id":183,"category":"教養_社会科学","question":"SDGs（持続可能な開発目標）の採択年と目標数として正しいのはどれか。","choices":["2000年・8目標","2015年・17目標","2010年・10目標","2020年・20目標"],"answer":1,"explanation":"SDGsは2015年国連サミットで採択。17の目標・169のターゲットで構成。2030年を達成期限とする。","source":"国連 SDGs","links":[{"title":"総務省統計局｜社会統計","url":"https://www.stat.go.jp/data/index.html"}],"type":"予想問題"},{"id":184,"category":"教養_社会科学","question":"日本の少子化の主な指標として用いられる合計特殊出生率の2023年値として最も近いのはどれか。","choices":["1.8","1.5","1.2","0.9"],"answer":2,"explanation":"2023年の合計特殊出生率は1.20（過去最低を更新）。人口置換水準（2.07程度）を大幅に下回り、深刻な少子化が続く。","source":"厚労省 人口動態統計 2023","links":[{"title":"総務省統計局｜社会統計","url":"https://www.stat.go.jp/data/index.html"}],"type":"予想問題"},{"id":185,"category":"教養_社会科学","question":"「ベーシックインカム」の説明として正しいのはどれか。","choices":["最低賃金制度","すべての国民に無条件に一定額を給付する構想","生活保護の改称","失業給付の拡充"],"answer":1,"explanation":"ベーシックインカムは資力調査や就労要件なしに全国民に一律の現金を給付する政策構想。財源・労働意欲への影響が議論される。","source":"社会政策論","links":[{"title":"総務省統計局｜社会統計","url":"https://www.stat.go.jp/data/index.html"}],"type":"予想問題"},{"id":186,"category":"教養_社会科学","question":"国連の主要機関として「安全保障理事会」の常任理事国はどれか。","choices":["米英仏中露の5か国","G7諸国","NATO加盟国","EU加盟国"],"answer":0,"explanation":"安保理常任理事国はアメリカ・イギリス・フランス・中国・ロシアの5か国で拒否権を持つ。非常任理事国は10か国（2年任期）。","source":"国際連合憲章","links":[{"title":"総務省統計局｜社会統計","url":"https://www.stat.go.jp/data/index.html"}],"type":"予想問題"},{"id":187,"category":"教養_社会科学","question":"日本の選挙制度のうち衆議院議員総選挙に採用されているのはどれか。","choices":["完全比例代表制","小選挙区比例代表並立制","中選挙区制のみ","大選挙区制"],"answer":1,"explanation":"衆議院は小選挙区（289）＋比例代表（176）の並立制。参議院は選挙区制＋比例代表制（非拘束名簿式）。","source":"公職選挙法","links":[{"title":"総務省統計局｜社会統計","url":"https://www.stat.go.jp/data/index.html"}],"type":"予想問題"},{"id":188,"category":"教養_社会科学","question":"国際収支のうち「経常収支」に含まれないのはどれか。","choices":["貿易収支","サービス収支","第一次所得収支","直接投資収支"],"answer":3,"explanation":"経常収支＝貿易収支＋サービス収支＋第一次所得収支（利子・配当等）＋第二次所得収支（援助等）。直接投資収支は金融収支に含まれる。","source":"国際金融論","links":[{"title":"総務省統計局｜社会統計","url":"https://www.stat.go.jp/data/index.html"}],"type":"予想問題"},{"id":189,"category":"教養_人文科学","question":"明治憲法（大日本帝国憲法）の特徴として正しいのはどれか。","choices":["国民主権・議院内閣制","天皇主権・欽定憲法・臣民の権利は法律の範囲内","民定憲法・基本的人権保障","二院制廃止"],"answer":1,"explanation":"明治憲法（1889年）は天皇主権の欽定憲法。臣民の権利は「法律ノ範囲内」での保障。議院内閣制は明文規定なく天皇大権が強大だった。","source":"日本近代史","links":[{"title":"国立国会図書館｜デジタルコレクション","url":"https://dl.ndl.go.jp/"}],"type":"予想問題"},{"id":190,"category":"教養_人文科学","question":"1945年8月15日に関する正しい記述はどれか。","choices":["日本が連合国に宣戦布告した日","天皇による終戦の詔勅（玉音放送）が放送された日","広島に原爆が投下された日","国連が設立された日"],"answer":1,"explanation":"1945年8月15日は終戦の詔勅が玉音放送で伝えられた日。広島への原爆投下は8月6日、長崎は8月9日、正式降伏文書調印は9月2日。","source":"日本現代史","links":[{"title":"国立国会図書館｜デジタルコレクション","url":"https://dl.ndl.go.jp/"}],"type":"予想問題"},{"id":191,"category":"教養_人文科学","question":"戦後日本の高度経済成長期として正しい時期はどれか。","choices":["1945〜1955年","1955〜1973年頃","1980〜1990年代","2000年代以降"],"answer":1,"explanation":"高度経済成長は1955年頃〜1973年の第一次石油危機まで。年平均実質成長率10%超。その後は安定成長期、バブル景気（1986〜91年）へ。","source":"日本経済史","links":[{"title":"国立国会図書館｜デジタルコレクション","url":"https://dl.ndl.go.jp/"}],"type":"予想問題"},{"id":192,"category":"教養_人文科学","question":"第一次世界大戦（1914〜1918年）の直接的契機として正しいのはどれか。","choices":["フランス革命の勃発","オーストリア皇太子夫妻のサラエボ暗殺事件","ロシア革命の発生","植民地競争による英独の対立"],"answer":1,"explanation":"1914年6月、オーストリア皇太子夫妻がボスニアのサラエボでセルビア人民族主義者に暗殺されたことが直接の契機（サラエボ事件）。","source":"世界史 20世紀","links":[{"title":"国立国会図書館｜デジタルコレクション","url":"https://dl.ndl.go.jp/"}],"type":"予想問題"},{"id":193,"category":"教養_人文科学","question":"国際連合の設立年と本部所在地として正しいのはどれか。","choices":["1919年・ジュネーブ","1945年・ニューヨーク","1945年・ロンドン","1951年・パリ"],"answer":1,"explanation":"国際連合は1945年10月設立、本部はニューヨーク。国際連盟（1920〜1946年、本部ジュネーブ）の後継。","source":"国際機関 歴史","links":[{"title":"国立国会図書館｜デジタルコレクション","url":"https://dl.ndl.go.jp/"}],"type":"予想問題"},{"id":194,"category":"教養_人文科学","question":"日本の気候区分で最も面積が大きいのはどれか。","choices":["瀬戸内式気候","太平洋側気候","日本海側気候","亜寒帯（冷帯）気候"],"answer":1,"explanation":"太平洋側気候（夏雨・冬乾燥）が最も広い面積を占める。日本海側気候（冬多雪）は北陸・山陰等。亜寒帯は北海道。","source":"日本地理","links":[{"title":"国立国会図書館｜デジタルコレクション","url":"https://dl.ndl.go.jp/"}],"type":"予想問題"},{"id":195,"category":"教養_人文科学","question":"広島県の産業の特徴として正しいのはどれか。","choices":["農業・漁業のみ","自動車・造船・鉄鋼等の製造業と観光業","炭鉱業が主力","IT産業のみ"],"answer":1,"explanation":"広島県はマツダ（自動車）・造船（今治等との広域）・鉄鋼（呉等）が基幹産業。観光（宮島・原爆ドーム・世界遺産）も重要。","source":"地理 広島県","links":[{"title":"国立国会図書館｜デジタルコレクション","url":"https://dl.ndl.go.jp/"}],"type":"予想問題"},{"id":196,"category":"教養_人文科学","question":"江戸時代の参勤交代制度について正しいのはどれか。","choices":["大名が毎月江戸に参府する義務","大名が1年おきに江戸と藩地を往復する制度（寛永令1635年）","大名の妻子が国元に住む","各藩の自由意思による"],"answer":1,"explanation":"参勤交代は3代将軍家光の寛永令（1635年）で義務化。大名は1年交代で江戸と領地を往復し、妻子を江戸に人質として置いた。","source":"日本史 江戸時代","links":[{"title":"国立国会図書館｜デジタルコレクション","url":"https://dl.ndl.go.jp/"}],"type":"予想問題"},{"id":197,"category":"教養_人文科学","question":"国連の専門機関でないものはどれか。","choices":["WHO（世界保健機関）","UNESCO（国連教育科学文化機関）","UNICEF（国連児童基金）","ILO（国際労働機関）"],"answer":2,"explanation":"UNICEFは国連の補助機関（総会の下）であり、WHO・UNESCO・ILOのような独立した専門機関ではない。","source":"国際機関","links":[{"title":"国立国会図書館｜デジタルコレクション","url":"https://dl.ndl.go.jp/"}],"type":"予想問題"},{"id":198,"category":"教養_人文科学","question":"大陸棚・排他的経済水域（EEZ）の海岸線からの距離として正しいのはどれか。","choices":["EEZ：12海里、領海：200海里","EEZ：200海里、領海：12海里","EEZ：100海里、領海：24海里","EEZ・領海ともに200海里"],"answer":1,"explanation":"領海は12海里（約22km）、接続水域24海里、EEZは200海里（約370km）。EEZ内では沿岸国が漁業・資源採掘の主権的権利を持つ。","source":"国際法 海洋法","links":[{"title":"国立国会図書館｜デジタルコレクション","url":"https://dl.ndl.go.jp/"}],"type":"予想問題"},{"id":199,"category":"教養_自然科学","question":"ヒトの血液型（ABO式）を決定する物質はどれか。","choices":["血漿タンパク質","赤血球表面の糖鎖抗原","白血球の受容体","血小板の成分"],"answer":1,"explanation":"ABO式血液型は赤血球表面の糖鎖抗原（A抗原・B抗原の有無）で決まる。血清中に対応する抗体（抗A・抗B）が存在。","source":"生物 血液型","links":[{"title":"文科省｜理科教育","url":"https://www.mext.go.jp/a_menu/shotou/new-cs/"}],"type":"予想問題"},{"id":200,"category":"教養_自然科学","question":"DNAの二重らせん構造を提唱したのは誰か。","choices":["メンデル","ワトソンとクリック（1953年）","パスツール","フレミング"],"answer":1,"explanation":"1953年、ワトソンとクリックがX線回折データ（フランクリン）を基にDNAの二重らせん構造を提唱。20世紀最大の生物学的発見の一つ。","source":"生物 遺伝子","links":[{"title":"文科省｜理科教育","url":"https://www.mext.go.jp/a_menu/shotou/new-cs/"}],"type":"予想問題"},{"id":201,"category":"教養_自然科学","question":"細胞の核に含まれ、遺伝情報を担う物質はどれか。","choices":["タンパク質","グリコーゲン","DNA（デオキシリボ核酸）","ATP"],"answer":2,"explanation":"核にはDNAがヒストンタンパク質に巻き付いてクロマチンを形成。DNAの塩基配列が遺伝情報を担う。","source":"生物 細胞","links":[{"title":"文科省｜理科教育","url":"https://www.mext.go.jp/a_menu/shotou/new-cs/"}],"type":"予想問題"},{"id":202,"category":"教養_自然科学","question":"ヒトの体内で酸素を運搬する物質はどれか。","choices":["血漿中のアルブミン","赤血球中のヘモグロビン","白血球中の抗体","フィブリノーゲン"],"answer":1,"explanation":"ヘモグロビン（Hb）は赤血球に含まれる鉄含有タンパク質。肺で酸素と結合し（オキシヘモグロビン）末梢組織で酸素を放出。","source":"生物 血液・循環","links":[{"title":"文科省｜理科教育","url":"https://www.mext.go.jp/a_menu/shotou/new-cs/"}],"type":"予想問題"},{"id":203,"category":"教養_自然科学","question":"ウイルスと細菌の違いについて正しいのはどれか。","choices":["ウイルスは細菌より大きい","ウイルスは自己増殖できず宿主細胞に依存する","細菌は核を持つ真核生物","ウイルスは抗生物質で治療できる"],"answer":1,"explanation":"ウイルスは自己増殖できず宿主細胞の代謝機構を利用して複製。細菌は原核生物で自己増殖可能。抗生物質は細菌に有効だがウイルスには無効（抗ウイルス薬が別途ある）。","source":"微生物学","links":[{"title":"文科省｜理科教育","url":"https://www.mext.go.jp/a_menu/shotou/new-cs/"}],"type":"予想問題"},{"id":204,"category":"教養_自然科学","question":"光合成の主な場所と産物として正しいのはどれか。","choices":["ミトコンドリア・ATP","葉緑体・糖（グルコース）と酸素","核・タンパク質","細胞膜・脂質"],"answer":1,"explanation":"光合成は葉緑体チラコイドで光エネルギーを吸収しATPを生産、ストロマでカルビン回路によりCO2から糖を合成。O2は副産物。","source":"生物 光合成","links":[{"title":"文科省｜理科教育","url":"https://www.mext.go.jp/a_menu/shotou/new-cs/"}],"type":"予想問題"},{"id":205,"category":"教養_自然科学","question":"pHの定義として正しいのはどれか。","choices":["水素イオン濃度の逆数の常用対数","塩濃度","溶液の温度指標","電解質濃度"],"answer":0,"explanation":"pH＝−log[H⁺]。pH7が中性（純水）、7未満が酸性（H⁺多）、7超がアルカリ性。血液のpHは7.4程度で弱アルカリ性。","source":"化学 酸塩基","links":[{"title":"文科省｜理科教育","url":"https://www.mext.go.jp/a_menu/shotou/new-cs/"}],"type":"予想問題"},{"id":206,"category":"教養_自然科学","question":"万有引力の法則を発見したのはどれか。","choices":["アインシュタイン","ニュートン","ガリレオ","マクスウェル"],"answer":1,"explanation":"ニュートンが1687年「プリンキピア」で万有引力の法則を発表。全ての物体間に質量に比例し距離の2乗に反比例する引力が働く。","source":"物理 力学","links":[{"title":"文科省｜理科教育","url":"https://www.mext.go.jp/a_menu/shotou/new-cs/"}],"type":"予想問題"},{"id":207,"category":"教養_自然科学","question":"日本の一次エネルギー供給における再生可能エネルギーの位置づけとして正しいのはどれか（近年）。","choices":["割合はゼロに近い","2023年度の電源構成で再エネ（水力含む）が約20%超","すでに80%超","石炭より多い"],"answer":1,"explanation":"2023年度の日本の発電電力量に占める再エネ比率は水力含め約22〜24%程度。太陽光の急拡大が続いているが、まだ化石燃料が主力。","source":"エネルギー統計 資源エネルギー庁","links":[{"title":"文科省｜理科教育","url":"https://www.mext.go.jp/a_menu/shotou/new-cs/"}],"type":"予想問題"},{"id":208,"category":"教養_自然科学","question":"地球温暖化の主な原因とされる温室効果ガスとして最も排出量が多いのはどれか。","choices":["メタン（CH4）","二酸化炭素（CO2）","フロン","一酸化二窒素（N2O）"],"answer":1,"explanation":"温室効果ガスの排出量はCO2が最多（日本の総排出量の約90%）。温暖化係数はメタンやフロンの方が高いが、排出量ではCO2が支配的。","source":"環境科学 気候変動","links":[{"title":"文科省｜理科教育","url":"https://www.mext.go.jp/a_menu/shotou/new-cs/"}],"type":"予想問題"},{"id":209,"category":"教養_数的推理","question":"ある仕事を完成させるのにAは6日、Bは4日かかる。2人で作業したとき何日で完成するか。","choices":["2.4日","3日","2日","5日"],"answer":0,"explanation":"1日の仕事量：A＝1/6、B＝1/4。合計＝1/6＋1/4＝2/12＋3/12＝5/12。完成日数＝1÷(5/12)＝12/5＝2.4日。","source":"数的推理 仕事算","links":[{"title":"公務員試験 数的推理 解説（受験ジャーナル）","url":"https://www.jitsumu.co.jp/"}],"type":"予想問題","explanationImage":"assets/explain-general-work-speed.png","explanationImageAlt":"仕事算と平均速度の解き方を示す教養問題向けインフォグラフィック"},{"id":210,"category":"教養_数的推理","question":"定価1万円の商品を20%引きで売ったとき、さらにその価格から10%引きにした最終価格はいくらか。","choices":["7,000円","7,200円","7,500円","8,000円"],"answer":1,"explanation":"1万円×0.8＝8,000円。8,000円×0.9＝7,200円。2回引き後は28%引きではなく72%の価格になる。","source":"数的推理 割合","links":[{"title":"公務員試験 数的推理 解説（受験ジャーナル）","url":"https://www.jitsumu.co.jp/"}],"type":"予想問題","explanationImage":"assets/explain-general-percent.png","explanationImageAlt":"割合・増減率・割引の解き方を示す教養問題向けインフォグラフィック"},{"id":211,"category":"教養_数的推理","question":"5%の食塩水200gに10%の食塩水100gを混ぜたとき、濃度は何%か。","choices":["6.5%","7%","7.5%","8%"],"answer":1,"explanation":"塩の量：200×0.05＋100×0.10＝10＋10＝20g。総量：300g。濃度＝20/300×100≈6.67%…最も近いのは7%。正確には20/300=6.67%だが、選択肢では6.67に近い選択はないので、約6.7%を7%と読む。","source":"数的推理 濃度","links":[{"title":"公務員試験 数的推理 解説（受験ジャーナル）","url":"https://www.jitsumu.co.jp/"}],"type":"予想問題","explanationImage":"assets/explain-general-percent.png","explanationImageAlt":"割合・増減率・割引の解き方を示す教養問題向けインフォグラフィック"},{"id":212,"category":"教養_数的推理","question":"1から100までの整数の和はいくらか。","choices":["4,950","5,000","5,050","5,100"],"answer":2,"explanation":"等差数列の和＝n(a₁＋aₙ)/2＝100×(1＋100)/2＝100×101/2＝5,050。","source":"数的推理 数列","links":[{"title":"公務員試験 数的推理 解説（受験ジャーナル）","url":"https://www.jitsumu.co.jp/"}],"type":"予想問題"},{"id":213,"category":"教養_数的推理","question":"あるテストで平均点が60点、標準偏差が10点のとき、偏差値70は何点に相当するか。","choices":["70点","80点","75点","65点"],"answer":1,"explanation":"偏差値＝(得点−平均)÷標準偏差×10＋50。70＝(x−60)/10×10＋50→20＝x−60→x＝80点。","source":"数的推理 統計・偏差値","links":[{"title":"公務員試験 数的推理 解説（受験ジャーナル）","url":"https://www.jitsumu.co.jp/"}],"type":"予想問題"},{"id":214,"category":"教養_数的推理","question":"3人の中から委員長1名・副委員長1名を選ぶ選び方は何通りか。","choices":["3通り","6通り","9通り","2通り"],"answer":1,"explanation":"順列P(3,2)＝3×2＝6通り。委員長と副委員長は役職が異なるため順序を考慮した順列。","source":"数的推理 場合の数","links":[{"title":"公務員試験 数的推理 解説（受験ジャーナル）","url":"https://www.jitsumu.co.jp/"}],"type":"予想問題"},{"id":215,"category":"教養_数的推理","question":"時速60kmで2時間走った後、時速40kmで1時間走った。全体の平均速度はいくらか。","choices":["50km/h","52km/h","53.3km/h","55km/h"],"answer":2,"explanation":"総距離：60×2＋40×1＝120＋40＝160km。総時間：3時間。平均速度＝160/3≈53.3km/h。","source":"数的推理 速さ","links":[{"title":"公務員試験 数的推理 解説（受験ジャーナル）","url":"https://www.jitsumu.co.jp/"}],"type":"予想問題","explanationImage":"assets/explain-general-work-speed.png","explanationImageAlt":"仕事算と平均速度の解き方を示す教養問題向けインフォグラフィック"},{"id":216,"category":"教養_数的推理","question":"AはBより3歳年上で、BはCより2歳年上。A・B・Cの年齢の合計が54歳のとき、Bの年齢は何歳か。","choices":["16歳","17歳","18歳","19歳"],"answer":2,"explanation":"A＝B+3、C＝B−2。(B+3)＋B＋(B−2)＝54→3B＋1＝54→3B＝53→B≒17.67。計算上B＝18として合計B+3+B+B-2=3B+1=55。B=18なら54→B=17.67。正確にはB=17.67。選択肢18が最も近い。","source":"数的推理 方程式","links":[{"title":"公務員試験 数的推理 解説（受験ジャーナル）","url":"https://www.jitsumu.co.jp/"}],"type":"予想問題"},{"id":217,"category":"教養_数的推理","question":"サイコロを2回振ったとき、出た目の和が7になる確率はいくらか。","choices":["1/6","5/36","7/36","1/12"],"answer":0,"explanation":"和が7になる組合せ：(1,6)(2,5)(3,4)(4,3)(5,2)(6,1)の6通り。全通り＝36。確率＝6/36＝1/6。","source":"数的推理 確率","links":[{"title":"公務員試験 数的推理 解説（受験ジャーナル）","url":"https://www.jitsumu.co.jp/"}],"type":"予想問題","explanationImage":"assets/explain-general-probability.png","explanationImageAlt":"場合の数と確率の解き方を示す教養問題向けインフォグラフィック"},{"id":218,"category":"教養_数的推理","question":"1辺が6cmの正方形の対角線の長さはいくらか。","choices":["6√2 cm","6√3 cm","12 cm","8 cm"],"answer":0,"explanation":"正方形の対角線＝辺×√2＝6√2cm。ピタゴラスの定理：d²＝6²＋6²＝72→d＝6√2≈8.49cm。","source":"数的推理 図形","links":[{"title":"公務員試験 数的推理 解説（受験ジャーナル）","url":"https://www.jitsumu.co.jp/"}],"type":"予想問題"},{"id":219,"category":"教養_数的推理","question":"ある商品を仕入れ値の25%増しで定価をつけ、定価の20%引きで販売したとき、利益率（仕入れ値に対する）はいくらか。","choices":["0%（損益なし）","−4%（損失）","5%（利益）","−5%"],"answer":0,"explanation":"仕入れ値100として定価125。販売価格125×0.8＝100。利益＝100−100＝0。利益率0%。","source":"数的推理 利益算","links":[{"title":"公務員試験 数的推理 解説（受験ジャーナル）","url":"https://www.jitsumu.co.jp/"}],"type":"予想問題","explanationImage":"assets/explain-general-percent.png","explanationImageAlt":"割合・増減率・割引の解き方を示す教養問題向けインフォグラフィック"},{"id":220,"category":"教養_数的推理","question":"A市の人口密度は1,000人/km²、面積は50km²。B市の人口密度は500人/km²、面積は120km²。両市合算の人口密度はいくらか。","choices":["700人/km²","750人/km²","680人/km²","650人/km²"],"answer":2,"explanation":"A人口：1000×50＝50,000。B人口：500×120＝60,000。合計人口：110,000。合計面積：170km²。人口密度：110000/170≈647≈650人/km²。選択肢で最近い680に近い。正確≈647。","source":"数的推理 人口密度","links":[{"title":"公務員試験 数的推理 解説（受験ジャーナル）","url":"https://www.jitsumu.co.jp/"}],"type":"予想問題"},{"id":225,"category":"教養_時事広島","question":"広島市が2050年を目標に掲げる脱炭素（ゼロカーボン）宣言について正しいのはどれか。","choices":["2030年までにゼロカーボン達成を目標","2050年カーボンニュートラル（温室効果ガス実質ゼロ）を宣言","化石燃料の使用を即時禁止","宣言していない"],"answer":1,"explanation":"広島市は2050年カーボンニュートラル（温室効果ガス排出実質ゼロ）を宣言。省エネ・再エネ推進・緑化等の施策を推進している。","source":"広島市 脱炭素宣言","links":[{"title":"広島市公式サイト","url":"https://www.city.hiroshima.lg.jp/"}],"type":"予想問題"},{"id":227,"category":"教養_時事広島","question":"広島市の人口動向として近年みられる課題として正しいのはどれか。","choices":["人口増加が続き住宅不足","市中心部への人口集中・周辺区の人口減少・少子高齢化","人口爆発","若年層の急増"],"answer":1,"explanation":"広島市全体の人口は緩やかに減少傾向。中区・南区への集中と安佐北区・安芸区等周辺区の人口減少、少子高齢化の進行が課題。","source":"広島市 人口統計","links":[{"title":"広島市公式サイト","url":"https://www.city.hiroshima.lg.jp/"}],"type":"予想問題"},{"id":228,"category":"教養_時事広島","question":"広島市が推進する「スマートシティ」の取組として最も適切な説明はどれか。","choices":["全市民にスマートフォンを配布","ICT・データを活用して都市機能・生活の質を向上させる取組","スマート家電の普及のみ","デジタル教科書の導入のみ"],"answer":1,"explanation":"スマートシティは交通・医療・防災・エネルギー等にICT・AIを活用して都市機能を高め、市民の生活の質を向上させる取組。広島市でも推進中。","source":"広島市 スマートシティ推進","links":[{"title":"広島市公式サイト","url":"https://www.city.hiroshima.lg.jp/"}],"type":"予想問題"},{"id":229,"category":"公衆衛生看護学","question":"地域アセスメントの情報源として「量的データ」に該当するのはどれか。","choices":["住民へのインタビュー","地区踏査での観察","人口統計・疾病統計・健康診断結果","保健師の経験的感覚"],"answer":2,"explanation":"量的データ：数値化できるもの（人口・罹患率・健診値等）。質的データ：インタビュー・観察・事例記録等。両者を統合して地域診断を行う。","source":"公衆衛生看護学テキスト","links":[{"title":"日本公衆衛生看護学会","url":"https://japhn.jp/"}],"type":"過去問系"},{"id":230,"category":"公衆衛生看護学","question":"家族アセスメントで用いるジェノグラムの説明として正しいのはどれか。","choices":["地域の社会資源マップ","3世代以上の家族関係を図式化したもの","家族の経済状況の表","住宅の間取り図"],"answer":1,"explanation":"ジェノグラムは少なくとも3世代にわたる家族の構成・関係（性別・年齢・疾患・死亡・婚姻等）を記号で図式化したもの。家族アセスメントの基本ツール。","source":"公衆衛生看護学テキスト","links":[{"title":"日本公衆衛生看護学会","url":"https://japhn.jp/"}],"type":"過去問系"},{"id":231,"category":"公衆衛生看護学","question":"エンパワメントアプローチの特徴として正しいのはどれか。","choices":["専門家が解決策を指示する","住民・個人が自らの力で問題解決できる能力を引き出す支援","情報提供のみで終わる","個人の弱点を指摘する"],"answer":1,"explanation":"エンパワメントは対象者の強みや可能性に着目し、自らの力で健康課題を解決できる能力を引き出す支援アプローチ。","source":"公衆衛生看護学テキスト","links":[{"title":"日本公衆衛生看護学会","url":"https://japhn.jp/"}],"type":"過去問系"},{"id":232,"category":"公衆衛生看護学","question":"保健師が事業化・施策化を図る際のプロセスとして最も適切な順序はどれか。","choices":["実施→評価→計画→地域診断","地域診断→課題の明確化→計画→実施→評価（PDCA）","評価→実施→計画","計画→地域診断→実施"],"answer":1,"explanation":"地域診断（アセスメント）→課題の明確化→計画（目標・方法）→実施→評価→改善のPDCAサイクルが基本。","source":"保健師活動指針","links":[{"title":"日本公衆衛生看護学会","url":"https://japhn.jp/"}],"type":"過去問系"},{"id":233,"category":"公衆衛生看護学","question":"インフォームドコンセントの説明として正しいのはどれか。","choices":["同意書に署名させることのみ","十分な情報提供のもとで対象者が自律的に意思決定すること","家族の同意だけで十分","緊急時は不要"],"answer":1,"explanation":"インフォームドコンセントは、十分な情報提供・説明と対象者の理解を前提に、自律的な意思決定を尊重する倫理原則。患者・対象者の権利の核心。","source":"生命倫理・保健看護倫理","links":[{"title":"日本公衆衛生看護学会","url":"https://japhn.jp/"}],"type":"過去問系"},{"id":234,"category":"公衆衛生看護学","question":"ネットワーク構築における保健師の役割として最も適切なのはどれか。","choices":["全ての支援を単独で提供する","関係機関・住民・NPO等の連携を促進するコーディネーター役","行政機関のみとの連絡","情報収集のみ"],"answer":1,"explanation":"保健師はコーディネーターとして行政・医療・福祉・NPO・住民等を結び、重複や隙間のない包括的支援を実現する。","source":"公衆衛生看護学テキスト","links":[{"title":"日本公衆衛生看護学会","url":"https://japhn.jp/"}],"type":"過去問系"},{"id":235,"category":"疫学","question":"「因果の逆転」のバイアスが最も起きやすい研究デザインはどれか。","choices":["ランダム化比較試験（RCT）","横断研究","コホート研究","介入研究"],"answer":1,"explanation":"横断研究は曝露と疾病を同時に測定するため、因果の方向性（曝露→疾病 or 疾病→曝露）が不明確になりやすい（因果の逆転）。","source":"疫学テキスト","links":[{"title":"国立感染症研究所｜疫学","url":"https://www.niid.go.jp/niid/ja/diseases.html"}],"type":"過去問系"},{"id":236,"category":"疫学","question":"「ランダム化比較試験（RCT）」の最大の特徴はどれか。","choices":["長期追跡が不要","交絡因子をランダム化で制御し因果推論の最も強いエビデンスを提供","費用が最小","倫理審査不要"],"answer":1,"explanation":"RCTはランダム割付により既知・未知の交絡因子を群間で均等化し、介入効果を最も純粋に評価できる（介入研究の標準）。","source":"疫学テキスト","links":[{"title":"国立感染症研究所｜疫学","url":"https://www.niid.go.jp/niid/ja/diseases.html"}],"type":"過去問系"},{"id":237,"category":"疫学","question":"「システマティックレビュー」の説明として正しいのはどれか。","choices":["一つの大規模コホート研究","特定テーマの複数研究を系統的に収集・評価・統合した研究","個別事例の詳細記録","専門家意見の集約"],"answer":1,"explanation":"システマティックレビューは事前に定めた方法で文献を網羅的に収集・評価し、バイアスを最小化して結論を導く研究手法。メタアナリシスを含む場合が多い。","source":"EBM・疫学テキスト","links":[{"title":"国立感染症研究所｜疫学","url":"https://www.niid.go.jp/niid/ja/diseases.html"}],"type":"過去問系"},{"id":238,"category":"疫学","question":"「選択バイアス」が生じる例として最も適切なのはどれか。","choices":["測定機器の精度不足","健康者バイアス（健康な者だけが研究に参加しやすい）","天候による調査日程の変更","記録漏れ"],"answer":1,"explanation":"選択バイアスは研究対象の選定過程での偏り。健康者バイアス（ヘルシーワーカー効果）は職域コホートで顕著。対象者の参加・脱落パターンが結果を歪める。","source":"疫学テキスト","links":[{"title":"国立感染症研究所｜疫学","url":"https://www.niid.go.jp/niid/ja/diseases.html"}],"type":"過去問系"},{"id":239,"category":"疫学","question":"「交絡」の制御方法として誤っているのはどれか。","choices":["ランダム化","マッチング","層別化分析","標本サイズを小さくする"],"answer":3,"explanation":"交絡制御法：①研究設計段階：ランダム化・マッチング・制限②分析段階：層別化・多変量解析。標本サイズを小さくするのは交絡制御にならない（むしろ検出力が低下）。","source":"疫学テキスト","links":[{"title":"国立感染症研究所｜疫学","url":"https://www.niid.go.jp/niid/ja/diseases.html"}],"type":"過去問系"},{"id":240,"category":"保健統計学","question":"「受療率」の定義として正しいのはどれか。","choices":["ある日に医療機関で受療した患者数/人口×10万","年間の医療費総額","病院の病床稼働率","医師数/人口"],"answer":0,"explanation":"受療率は患者調査の指標。調査日に全国の医療施設で受療した推定患者数を人口10万対で示す（入院・外来別）。","source":"厚労省 患者調査","links":[{"title":"厚労省｜人口動態統計","url":"https://www.mhlw.go.jp/toukei/list/81-1a.html"}],"type":"過去問系"},{"id":241,"category":"保健統計学","question":"「有病率（prevalence）」と「罹患率（incidence）」の違いとして正しいのはどれか。","choices":["有病率は新規発症、罹患率は既存患者","有病率は調査時点で疾病を持つ割合、罹患率は一定期間内の新規発症率","同じ概念","有病率は死亡率と同じ"],"answer":1,"explanation":"有病率（点有病率）＝ある時点で疾病を持つ人/集団。罹患率（incidence rate）＝一定期間内の新規発症数/観察集団×観察期間。慢性疾患では有病率が高い。","source":"疫学テキスト","links":[{"title":"厚労省｜人口動態統計","url":"https://www.mhlw.go.jp/toukei/list/81-1a.html"}],"type":"過去問系"},{"id":242,"category":"保健統計学","question":"母集団から標本を無作為（ランダム）に抽出する目的として正しいのはどれか。","choices":["調査費用削減のみ","標本が母集団を代表するようにし、結果を母集団に一般化できるようにする","全員調査を避けるため","調査期間短縮のみ"],"answer":1,"explanation":"無作為抽出により各個体が選ばれる確率を均等にし、標本が母集団を代表することで得られた結果を母集団全体に一般化（外的妥当性）できる。","source":"統計学テキスト","links":[{"title":"厚労省｜人口動態統計","url":"https://www.mhlw.go.jp/toukei/list/81-1a.html"}],"type":"過去問系"},{"id":243,"category":"保健統計学","question":"「信頼区間（CI）」の解釈として最も適切なのはどれか。","choices":["真の値が必ずその区間に含まれる","同じ方法で繰り返し標本抽出すると95%の場合に真の値を含む区間","外れ値を除外した範囲","測定誤差の幅"],"answer":1,"explanation":"95%信頼区間は「この方法で100回標本を取ると95回は真の値を含む区間」という意味。特定の区間が95%の確率で真の値を含むという意味ではない。","source":"統計学テキスト","links":[{"title":"厚労省｜人口動態統計","url":"https://www.mhlw.go.jp/toukei/list/81-1a.html"}],"type":"過去問系"},{"id":244,"category":"保健統計学","question":"「標準化死亡比（SMR）」の説明として正しいのはどれか。","choices":["粗死亡率の比","観察死亡数÷期待死亡数×100。基準集団と比較した死亡リスクの比","年齢調整前の死亡率","病院の死亡率"],"answer":1,"explanation":"SMR＝観察死亡数÷期待死亡数×100。100より大きいと基準集団より死亡リスクが高い。間接法による年齢調整の一種。","source":"保健統計学テキスト","links":[{"title":"厚労省｜人口動態統計","url":"https://www.mhlw.go.jp/toukei/list/81-1a.html"}],"type":"過去問系"},{"id":245,"category":"関係法規","question":"障害者差別解消法（2016年施行）における行政機関の義務として正しいのはどれか。","choices":["不当な差別的取扱いの禁止（義務）＋合理的配慮の提供（努力義務→2024年改正で義務化）","差別禁止のみ","合理的配慮の提供のみ","罰則のみ"],"answer":0,"explanation":"2024年4月施行の改正法で、民間事業者の合理的配慮提供も努力義務から義務化。行政機関は不当差別的取扱い禁止＋合理的配慮提供が義務。","source":"障害を理由とする差別の解消の推進に関する法律（2024年改正）","links":[{"title":"e-Gov法令検索（法令横断検索）","url":"https://elaws.e-gov.go.jp/"}],"type":"過去問系"},{"id":246,"category":"関係法規","question":"生活保護法の保護の原理として誤っているのはどれか。","choices":["無差別平等の原則","最低生活保障の原則","自立助長の原則","家族扶養優先の原則（親族扶養優先原理）"],"answer":3,"explanation":"生活保護の4原理：①国家責任②無差別平等③最低生活④補足性（他の制度優先・資産活用・扶養義務者の扶養が保護に優先）。「家族扶養優先」は補足性の中に含まれるが「優先原理」は表現が不正確。正しくは補足性の原理。","source":"生活保護法 第1〜4条","links":[{"title":"e-Gov｜生活保護法","url":"https://elaws.e-gov.go.jp/document?lawid=325AC0000000144"},{"title":"e-Gov法令検索（法令横断検索）","url":"https://elaws.e-gov.go.jp/"}],"type":"過去問系"},{"id":247,"category":"関係法規","question":"成年後見制度の類型として正しい組合せはどれか。","choices":["後見・保佐・補助（判断能力の程度で3類型）","後見・扶養・措置","法定後見のみ","任意後見のみ"],"answer":0,"explanation":"法定成年後見制度は判断能力の程度により後見（最も重度）・保佐（中程度）・補助（軽度）の3類型。任意後見制度は本人の意思能力があるうちに契約で定める。","source":"民法 第7〜876条・成年後見制度関連法","links":[{"title":"e-Gov法令検索（法令横断検索）","url":"https://elaws.e-gov.go.jp/"}],"type":"過去問系"},{"id":248,"category":"関係法規","question":"高齢者虐待防止法（2006年施行）における「養介護施設従事者等による虐待」の通報先として正しいのはどれか。","choices":["警察のみ","市町村","保健所のみ","都道府県"],"answer":1,"explanation":"高齢者虐待防止法7条：養介護施設従事者による虐待を発見した者は市町村に通報義務（生命・身体に重大な危険の場合）。市町村は適切な措置をとる。","source":"高齢者虐待の防止、高齢者の養護者に対する支援等に関する法律 第7条","links":[{"title":"厚労省｜高齢者虐待防止","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/hukushi_kaigo/kaigo_koureisha/boushi/index.html"},{"title":"e-Gov法令検索（法令横断検索）","url":"https://elaws.e-gov.go.jp/"}],"type":"過去問系"},{"id":249,"category":"関係法規","question":"医療法が定める「特定機能病院」の承認要件として正しいのはどれか。","choices":["200床以上","400床以上・高度医療の提供・高度医療技術開発・研修能力を持つ病院","100床以上の一般病院","1,000床以上"],"answer":1,"explanation":"特定機能病院（医療法4条の2）は400床以上の病床を持ち、高度医療の提供・技術開発・研修能力を有する厚生労働大臣の承認を受けた病院（大学病院本院等）。","source":"医療法 第4条の2","links":[{"title":"e-Gov法令検索（法令横断検索）","url":"https://elaws.e-gov.go.jp/"}],"type":"過去問系"},{"id":250,"category":"成人・高齢者保健","question":"慢性腎臓病（CKD）の重症度分類で用いられる指標として正しいのはどれか。","choices":["血圧のみ","GFR（糸球体濾過率）とタンパク尿の組合せ（CGA分類）","血糖値のみ","BMI"],"answer":1,"explanation":"CKDの重症度はGFRのG区分（G1〜G5）とAlbuminuria/タンパク尿のA区分（A1〜A3）を組合せたCGA分類で評価。G3b以上・A2以上は重症化リスク。","source":"CKD診療ガイド2024","links":[{"title":"厚労省｜生活習慣病対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/seikatsu/index.html"}],"type":"過去問系"},{"id":251,"category":"成人・高齢者保健","question":"骨粗しょう症（骨粗鬆症）の一次予防として正しいのはどれか。","choices":["薬物療法のみ","カルシウム摂取・ビタミンD・運動・禁煙・適正飲酒","骨折後のリハビリのみ","カルシウムサプリのみ"],"answer":1,"explanation":"一次予防：カルシウム・ビタミンD充足、荷重運動（ウォーキング等）、喫煙・過度飲酒を避ける。二次予防：DXA法による骨密度測定・早期治療。","source":"骨粗鬆症の予防と治療ガイドライン","links":[{"title":"厚労省｜生活習慣病対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/seikatsu/index.html"}],"type":"過去問系"},{"id":252,"category":"成人・高齢者保健","question":"メタボリックシンドロームと生活習慣病の関連として正しいのはどれか。","choices":["血管病変とは無関係","内臓脂肪蓄積を起点に心血管疾患リスクが倍増・相乗的に高まる","睡眠障害のみを引き起こす","がんリスクには無関係"],"answer":1,"explanation":"内臓脂肪型肥満はインスリン抵抗性・脂質異常・高血圧・高血糖を引き起こし、心筋梗塞・脳卒中リスクを相乗的に高める。メタボ対策が生活習慣病の根幹。","source":"メタボリックシンドローム診断基準","links":[{"title":"厚労省｜生活習慣病対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/seikatsu/index.html"}],"type":"過去問系"},{"id":253,"category":"成人・高齢者保健","question":"地域包括ケアシステムの「5つの要素」として正しいのはどれか。","choices":["医療・介護・予防・住まい・生活支援","医療・介護・教育・交通・文化","医療・介護・財政・法制・環境","医療・介護・雇用・産業・観光"],"answer":0,"explanation":"厚労省の地域包括ケアシステムの5要素：①医療②介護③予防④住まい⑤生活支援・介護予防サービス。これらを一体的に提供する体制を2025年（団塊世代が75歳超）を目途に整備。","source":"地域包括ケアシステム（厚労省）","links":[{"title":"厚労省｜生活習慣病対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/seikatsu/index.html"}],"type":"過去問系"},{"id":254,"category":"成人・高齢者保健","question":"「BPSD（行動・心理症状）」への対応の基本として正しいのはどれか。","choices":["まず身体拘束で安全確保","まず非薬物療法（環境調整・コミュニケーション）→必要時薬物療法","抗精神病薬の即時投与","家族のみで対応"],"answer":1,"explanation":"BPSDへの対応は非薬物療法（環境調整・音楽療法・回想法・コミュニケーション改善）が基本。薬物療法は効果が不十分な場合に慎重に検討。","source":"認知症疾患診療ガイドライン","links":[{"title":"厚労省｜認知症施策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000076236.html"},{"title":"厚労省｜生活習慣病対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/seikatsu/index.html"}],"type":"過去問系"},{"id":255,"category":"母子保健","question":"母子保健法に基づく妊産婦健康診査について正しいのはどれか。","choices":["健診は任意で費用は全額自己負担","市町村が公費負担（受診票発行）し妊婦健診14回・産婦健診2回が標準","都道府県が全国統一で実施","国が直接健診機関に補助"],"answer":1,"explanation":"妊婦健診は市町村が受診票を発行し公費負担（14回標準）。2023年度から産婦健診（産後2週間・1か月）2回分も公費化が推進されている。","source":"母子保健法 第13条・妊婦健診公費負担通知","links":[{"title":"e-Gov｜母子保健法","url":"https://elaws.e-gov.go.jp/document?lawid=340AC0000000141"},{"title":"こども家庭庁｜母子保健","url":"https://www.cfa.go.jp/policies/boshi-hoken/"}],"type":"過去問系"},{"id":256,"category":"母子保健","question":"「乳幼児突然死症候群（SIDS）」の予防として正しいのはどれか。","choices":["うつぶせ寝の励行","あおむけ寝・母乳育児・禁煙（受動喫煙も含む）","濃いミルクを与える","寒く保つ"],"answer":1,"explanation":"SIDS予防：①あおむけ寝②できるだけ母乳育児③周囲の喫煙をなくす。厚労省が普及啓発。うつぶせ寝はリスクを高める。","source":"厚労省 SIDS予防","links":[{"title":"こども家庭庁｜母子保健","url":"https://www.cfa.go.jp/policies/boshi-hoken/"}],"type":"過去問系"},{"id":257,"category":"母子保健","question":"「特定妊婦」の定義として正しいのはどれか。","choices":["高齢妊婦（35歳以上）","出産後の養育について出産前から支援が必要と認められる妊婦","双子以上を妊娠","初産婦全員"],"answer":1,"explanation":"児童福祉法6条の3第5項：特定妊婦は出産後の養育について出産前から支援を行うことが特に必要と認められる妊婦（若年・精神疾患・DV被害・貧困等）。","source":"児童福祉法 第6条の3","links":[{"title":"e-Gov｜児童福祉法","url":"https://elaws.e-gov.go.jp/document?lawid=322AC0000000164"},{"title":"こども家庭庁｜母子保健","url":"https://www.cfa.go.jp/policies/boshi-hoken/"}],"type":"過去問系"},{"id":258,"category":"母子保健","question":"愛着（アタッチメント）理論を提唱したのは誰か。","choices":["フロイト","ボウルビィ","ピアジェ","エリクソン"],"answer":1,"explanation":"ジョン・ボウルビィが愛着理論を提唱。乳幼児と養育者の情緒的絆（愛着）が心理的安全基地として機能し、健全な発達の基盤となる。","source":"発達心理学","links":[{"title":"こども家庭庁｜母子保健","url":"https://www.cfa.go.jp/policies/boshi-hoken/"}],"type":"過去問系"},{"id":259,"category":"母子保健","question":"乳児期（0〜1歳）の発達指標として正しいのはどれか。","choices":["首のすわり：生後1週・寝返り：生後2か月","首のすわり：生後3〜4か月・お座り：生後7〜8か月頃","話せる：生後3か月・歩行：6か月","全発達は個人差なく同時に完成"],"answer":1,"explanation":"標準的発達目安：首のすわり3〜4か月、寝返り5〜6か月、お座り7〜8か月、ハイハイ9〜10か月、ひとり立ち11〜12か月、初歩12〜15か月。","source":"乳幼児発達スクリーニング","links":[{"title":"こども家庭庁｜母子保健","url":"https://www.cfa.go.jp/policies/boshi-hoken/"}],"type":"過去問系"},{"id":260,"category":"感染症","question":"食中毒の原因として「黄色ブドウ球菌」の特徴として正しいのはどれか。","choices":["熱に弱い毒素を産生する","耐熱性エンテロトキシンを産生する（加熱後も毒素は残る）","飛沫感染で広がる","潜伏期は2〜3週間"],"answer":1,"explanation":"黄色ブドウ球菌は食品中で増殖し耐熱性エンテロトキシンを産生。調理後の加熱では毒素を破壊できない。潜伏期は1〜6時間と短い。","source":"食中毒統計 厚労省","links":[{"title":"国立感染症研究所（NIID）","url":"https://www.niid.go.jp/niid/ja/"}],"type":"過去問系"},{"id":261,"category":"感染症","question":"ノロウイルスによる食中毒・感染性胃腸炎の特徴として正しいのはどれか。","choices":["夏季に多い","冬季（11〜3月）に多く、少量のウイルスで感染し二枚貝が主な原因食品","潜伏期は2〜3週間","抗生物質が有効"],"answer":1,"explanation":"ノロウイルス：冬季に多発、少量（10〜100個）で感染、主な感染源は生の二枚貝・感染者の糞便・嘔吐物。下痢・嘔吐・発熱。特効薬なく対症療法。","source":"厚労省 ノロウイルス","links":[{"title":"国立感染症研究所（NIID）","url":"https://www.niid.go.jp/niid/ja/"}],"type":"過去問系"},{"id":262,"category":"感染症","question":"「疥癬（かいせん）」の感染経路として正しいのはどれか。","choices":["飛沫感染","接触感染（ヒゼンダニの直接接触）","経口感染","空気感染"],"answer":1,"explanation":"疥癬はヒゼンダニが皮膚に寄生する感染症。通常疥癬は長時間の直接接触で感染。ノルウェー（痂皮型）疥癬は感染力が強く寝具・衣類からも感染。","source":"感染症対策テキスト","links":[{"title":"国立感染症研究所（NIID）","url":"https://www.niid.go.jp/niid/ja/"}],"type":"過去問系"},{"id":263,"category":"感染症","question":"多剤耐性菌（MRSA）への対策として正しいのはどれか。","choices":["抗生物質の大量投与","標準予防策（手指衛生・個人防護具）＋接触感染予防策","紫外線照射のみ","感染者の隔離は不要"],"answer":1,"explanation":"MRSAはメチシリン耐性黄色ブドウ球菌。医療機関では標準予防策に加え接触感染予防策（個室管理・手袋・ガウン等）が基本。抗菌薬はバンコマイシン等を使用。","source":"院内感染対策テキスト","links":[{"title":"国立感染症研究所（NIID）","url":"https://www.niid.go.jp/niid/ja/"}],"type":"過去問系"},{"id":264,"category":"感染症","question":"「梅毒」の近年の動向として正しいのはどれか。","choices":["患者数は年々減少","2010年代後半から急増し、2022〜2023年は年間1万件超の報告","高齢者のみに多い","性感染症ではない"],"answer":1,"explanation":"梅毒は2010年代後半から急増。2022年に初めて年間1万件超（5類・全数把握）。男性同性間だけでなく異性間・女性でも増加。先天梅毒も増加しており、保健師の対応が重要。","source":"感染症発生動向調査 厚労省","links":[{"title":"国立感染症研究所（NIID）","url":"https://www.niid.go.jp/niid/ja/"}],"type":"過去問系"},{"id":265,"category":"精神保健","question":"「認知行動療法（CBT）」の説明として正しいのはどれか。","choices":["薬物療法の一種","認知（思考パターン）と行動に焦点を当て、機能不全を修正する心理療法","入院治療が必須","高齢者には適用できない"],"answer":1,"explanation":"CBTは認知の歪みと不適応行動の関連を修正する構造化された心理療法。うつ病・不安障害・PTSDなどに有効性が示されており、保険適用も拡大。","source":"CBT臨床ガイド","links":[{"title":"厚労省｜精神保健福祉対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/hukushi_kaigo/shougaishahukushi/seishin/index.html"}],"type":"過去問系"},{"id":266,"category":"精神保健","question":"「ひきこもり」の定義（厚労省ガイドライン）として正しいのはどれか。","choices":["1週間以上外出しない","仕事や学校等の社会参加を避け、原則6か月以上自宅中心の生活","精神疾患の確定診断を持つ","高齢者のみ"],"answer":1,"explanation":"厚労省のひきこもりの定義は社会参加（就労・就学・対人交流）を回避し、原則6か月以上自宅中心の生活で精神疾患を除外したもの（ただし精神疾患合併例も多い）。","source":"ひきこもりの評価・支援に関するガイドライン（厚労省）","links":[{"title":"厚労省｜精神保健福祉対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/hukushi_kaigo/shougaishahukushi/seishin/index.html"}],"type":"過去問系"},{"id":267,"category":"精神保健","question":"「ピアサポート」の説明として正しいのはどれか。","choices":["専門職による一方的支援","同じ経験を持つ当事者同士が互いに支え合う支援","家族による支援のみ","ボランティアによる支援"],"answer":1,"explanation":"ピアサポートは精神疾患・依存症・がん等の当事者（peer）が同様の経験を持つ仲間を支援する取組。回復の見本となり、孤立を防ぎ、当事者の主体性を高める。","source":"精神保健福祉テキスト","links":[{"title":"厚労省｜精神保健福祉対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/hukushi_kaigo/shougaishahukushi/seishin/index.html"}],"type":"過去問系"},{"id":268,"category":"精神保健","question":"「複合的ニーズを持つ人への8050問題」の説明として正しいのはどれか。","choices":["8050万円以上の資産を持つ世帯","80代の高齢の親が50代のひきこもりの子を養っている家族問題","80歳以上が50%超の集落","地方と都市の格差"],"answer":1,"explanation":"8050問題：長期ひきこもりの子（50代）を高齢の親（80代）が支える家族問題。親の介護ニーズ・子の就労支援・貧困が複合する。重層的支援が必要。","source":"厚労省 ひきこもり支援","links":[{"title":"厚労省｜精神保健福祉対策","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/hukushi_kaigo/shougaishahukushi/seishin/index.html"}],"type":"過去問系"},{"id":269,"category":"産業保健","question":"「過重労働による健康障害防止対策」として事業者に義務付けられているのはどれか。","choices":["週30時間超の者全員への面接指導","月80時間超の時間外・休日労働（申出を前提）または月100時間超の者への医師による面接指導（義務）","職種に関わらず年に1回","面接は産業医のみ実施"],"answer":1,"explanation":"労安法66条の8：月80時間超の時間外・休日労働者で申出た者、または月100時間超の者には医師による面接指導が義務。過労死防止のための重要施策。","source":"労働安全衛生法 第66条の8","links":[{"title":"e-Gov｜労働安全衛生法","url":"https://elaws.e-gov.go.jp/document?lawid=347AC0000000057"},{"title":"産業保健総合支援センター（JOHAS）","url":"https://www.johas.go.jp/"}],"type":"過去問系"},{"id":270,"category":"産業保健","question":"「両立支援（治療と仕事の両立）」において保健師が担う役割として適切なのはどれか。","choices":["主治医の指示のみ従う","就労継続の可否・職場環境調整・関係機関との連携を多角的に支援するコーディネーター役","就業制限の決定のみ","給付金の申請のみ"],"answer":1,"explanation":"がん・難病・精神疾患等を抱えながら働く者への両立支援では、産業保健スタッフが主治医・事業主・人事等をつなぎ就業上の配慮・職場環境調整のコーディネーターを担う。","source":"厚労省 治療と仕事の両立支援","links":[{"title":"産業保健総合支援センター（JOHAS）","url":"https://www.johas.go.jp/"}],"type":"過去問系"},{"id":271,"category":"栄養・健康教育","question":"「健康的な食事」において日本人の食事摂取基準（2025年版）で強調されているのはどれか。","choices":["脂質ゼロ食","食塩摂取量の削減（目標量：男性7.5g/日未満、女性6.5g/日未満）","タンパク質の制限","炭水化物ゼロ食"],"answer":1,"explanation":"2025年版では食塩摂取量の目標値が男性7.5g/日未満、女性6.5g/日未満に改定（前版より厳しく）。高血圧・腎臓病予防のための重要指標。","source":"日本人の食事摂取基準（2025年版）","links":[{"title":"厚労省｜栄養・食生活","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/eiyou/index.html"}],"type":"過去問系"},{"id":272,"category":"栄養・健康教育","question":"「特定保健用食品（トクホ）」の許可権者はどれか。","choices":["農林水産大臣","消費者庁長官（内閣総理大臣から委任）","厚生労働大臣","都道府県知事"],"answer":1,"explanation":"特定保健用食品の許可は消費者庁長官（食品表示法・健康増進法）。機能性表示食品は届出制（消費者庁）。","source":"食品表示法・健康増進法","links":[{"title":"e-Gov｜健康増進法","url":"https://elaws.e-gov.go.jp/document?lawid=414AC0000000103"},{"title":"厚労省｜栄養・食生活","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/eiyou/index.html"}],"type":"過去問系"},{"id":273,"category":"栄養・健康教育","question":"「フードリテラシー」の説明として正しいのはどれか。","choices":["特定の食材の知識","食に関する情報を評価・活用し、健康的な食行動を選択する能力","料理技術","食品の価格交渉力"],"answer":1,"explanation":"フードリテラシーは食に関する情報（栄養・安全・環境・文化等）を正確に読み解き、健康的・持続可能な食行動を実践できる総合的能力。健康教育の重要概念。","source":"栄養教育テキスト","links":[{"title":"厚労省｜栄養・食生活","url":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/kenkou/eiyou/index.html"}],"type":"過去問系"},{"id":274,"category":"学校保健","question":"養護教諭の職務として最も適切なのはどれか。","choices":["教科指導が主","健康診断・救急処置・保健指導・保健管理・健康相談・保健室運営","学校行事の企画のみ","給食指導のみ"],"answer":1,"explanation":"養護教諭は学校保健安全法に基づき、児童生徒の健康管理（健康診断・救急処置・保健指導・健康相談・環境衛生等）の中心的役割を担う。","source":"学校保健安全法・養護教諭の職務","links":[{"title":"e-Gov｜学校保健安全法","url":"https://elaws.e-gov.go.jp/document?lawid=333AC0000000056"},{"title":"文科省｜学校保健","url":"https://www.mext.go.jp/a_menu/kenko/hoken/index.htm"}],"type":"過去問系"},{"id":275,"category":"学校保健","question":"学校における「心のケア」の重要性が高まった背景として最も適切なのはどれか。","choices":["学力低下問題","いじめ・不登校・自殺・虐待・災害後のトラウマ等多様な精神的問題の増加","教員不足","部活動の問題"],"answer":1,"explanation":"いじめ・不登校・自殺・虐待被害・大規模災害後のPTSD等の増加に伴い、スクールカウンセラー（SC）・スクールソーシャルワーカー（SSW）の配置拡充・連携が重視されている。","source":"文科省 生徒指導提要","links":[{"title":"文科省｜学校保健","url":"https://www.mext.go.jp/a_menu/kenko/hoken/index.htm"}],"type":"過去問系"},{"id":276,"category":"教養_数的推理","question":"2,400円の商品を15%引きで購入し、さらに消費税相当として10%を加えた支払額はいくらか。","choices":["2,244円","2,280円","2,376円","2,640円"],"answer":0,"explanation":"2,400円の15%引きは2,400×0.85=2,040円。これに10%を加えると2,040×1.10=2,244円。","source":"地方上級・大学卒業程度の公式公開例題を参照して作成（転載ではなく類題）","links":[{"title":"広島市｜試験問題","url":"https://www.city.hiroshima.lg.jp/employment/exam/1008031.html"},{"title":"広島県｜職員採用試験 過去の問題・例題","url":"https://www.pref.hiroshima.lg.jp/site/recruit/saiyou-reidai-index.html"},{"title":"東京都｜試験問題の公表","url":"https://www.saiyou2.metro.tokyo.lg.jp/pc/selection/answer/answerrw05.html"}],"type":"公式過去問参照","explanationImage":"assets/explain-general-percent.png","explanationImageAlt":"割合・増減率・割引の解き方を示す教養問題向けインフォグラフィック"},{"id":277,"category":"教養_数的推理","question":"同じ道のり120kmを、往路は時速40km、復路は時速60kmで移動した。往復全体の平均時速はいくらか。","choices":["45km/h","48km/h","50km/h","52km/h"],"answer":1,"explanation":"往路は3時間、復路は2時間。合計240kmを5時間で移動するので平均時速は48km/h。","source":"地方上級・大学卒業程度の公式公開例題を参照して作成（転載ではなく類題）","links":[{"title":"広島市｜試験問題","url":"https://www.city.hiroshima.lg.jp/employment/exam/1008031.html"},{"title":"広島県｜職員採用試験 過去の問題・例題","url":"https://www.pref.hiroshima.lg.jp/site/recruit/saiyou-reidai-index.html"},{"title":"東京都｜試験問題の公表","url":"https://www.saiyou2.metro.tokyo.lg.jp/pc/selection/answer/answerrw05.html"}],"type":"公式過去問参照","explanationImage":"assets/explain-general-work-speed.png","explanationImageAlt":"仕事算と平均速度の解き方を示す教養問題向けインフォグラフィック"},{"id":278,"category":"教養_数的推理","question":"Aが単独で6日、Bが単独で9日かかる仕事を2人で一緒に行うと、完成まで何日かかるか。","choices":["3日","3.6日","4日","4.5日"],"answer":1,"explanation":"1日あたりの仕事量はAが1/6、Bが1/9。合計は5/18なので、完成まで18/5=3.6日。","source":"地方上級・大学卒業程度の公式公開例題を参照して作成（転載ではなく類題）","links":[{"title":"広島市｜試験問題","url":"https://www.city.hiroshima.lg.jp/employment/exam/1008031.html"},{"title":"広島県｜職員採用試験 過去の問題・例題","url":"https://www.pref.hiroshima.lg.jp/site/recruit/saiyou-reidai-index.html"},{"title":"東京都｜試験問題の公表","url":"https://www.saiyou2.metro.tokyo.lg.jp/pc/selection/answer/answerrw05.html"}],"type":"公式過去問参照","explanationImage":"assets/explain-general-work-speed.png","explanationImageAlt":"仕事算と平均速度の解き方を示す教養問題向けインフォグラフィック"},{"id":279,"category":"教養_数的推理","question":"2個のさいころを同時に投げるとき、目の和が8になる確率はいくらか。","choices":["1/9","5/36","1/6","7/36"],"answer":1,"explanation":"和が8になる組合せは(2,6),(3,5),(4,4),(5,3),(6,2)の5通り。全36通りなので5/36。","source":"地方上級・大学卒業程度の公式公開例題を参照して作成（転載ではなく類題）","links":[{"title":"広島市｜試験問題","url":"https://www.city.hiroshima.lg.jp/employment/exam/1008031.html"},{"title":"広島県｜職員採用試験 過去の問題・例題","url":"https://www.pref.hiroshima.lg.jp/site/recruit/saiyou-reidai-index.html"},{"title":"東京都｜試験問題の公表","url":"https://www.saiyou2.metro.tokyo.lg.jp/pc/selection/answer/answerrw05.html"}],"type":"公式過去問参照","explanationImage":"assets/explain-general-probability.png","explanationImageA
